<script>
const $=id=>document.getElementById(id);
const ALL=(window.IDIOMS||[]);
const MAINS=ALL.filter(x=>x.m);
const byZh={}; ALL.forEach(x=>{ if(x.m&&!byZh[x.zh]) byZh[x.zh]=x; });
const POOL={1:[],2:[],3:[]}; MAINS.forEach(x=>{ if(POOL[x.lv]) POOL[x.lv].push(x); });
$('footN').textContent=ALL.length.toLocaleString();

/* ---------- 學習篇（網格＋分頁 tab） ---------- */
const PS=200, PAGES=Math.ceil(ALL.length/PS);
let curPage=0;
function deacc(s){ return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase(); }
function buildTabs(){
  let h='';
  for(let i=0;i<PAGES;i++){ const a=i*PS+1, b=Math.min((i+1)*PS,ALL.length); h+='<button data-pg="'+i+'">'+a+'–'+b+'</button>'; }
  $('pgtabs').innerHTML=h;
  $('pgtabs').querySelectorAll('button').forEach(btn=>btn.onclick=()=>{ curPage=+btn.dataset.pg; $('q').value=''; renderGrid(); });
}
function filterItems(raw){
  const q=raw.toLowerCase(), qa=deacc(raw).replace(/\s/g,'');
  return ALL.filter(x=>{
    if(x.zh.includes(raw)) return true;
    if(qa && deacc(x.py).replace(/\s/g,'').includes(qa)) return true;
    if(x.zhu && x.zhu.join('').includes(q)) return true;
    return false;
  });
}
function renderGrid(){
  const raw=$('q').value.trim(); const searching=!!raw;
  let items;
  if(searching){ items=filterItems(raw); $('pgtabs').style.display='none';
    $('cnt').textContent='搜尋到 '+items.length.toLocaleString()+' 則'; }
  else{ items=ALL.slice(curPage*PS,(curPage+1)*PS); $('pgtabs').style.display='flex';
    const a=curPage*PS+1, b=Math.min((curPage+1)*PS,ALL.length);
    $('cnt').textContent='第 '+a+'–'+b+' 則 · 全 '+ALL.length.toLocaleString()+' 則（依首字筆畫）'; }
  $('pgtabs').querySelectorAll('button').forEach(bt=>bt.classList.toggle('on',+bt.dataset.pg===curPage && !searching));
  const g=$('grid'); g.innerHTML='';
  if(!items.length){ g.innerHTML='<div class="empty">查無成語，換個關鍵字試試</div>'; return; }
  const frag=document.createDocumentFragment();
  items.forEach(x=>{ const c=document.createElement('div'); c.className='cell'+(x.m?'':' var');
    c.textContent=x.zh; c.title=(x.st===99?'':x.st+'畫'); c.onclick=()=>openDetail(x); frag.appendChild(c); });
  g.appendChild(frag); g.scrollTop=0;
}
$('q').addEventListener('input', renderGrid);
const ZTONES=['ˊ','ˇ','ˋ','˙'];   // 二/三/四聲、輕聲；一聲無符號
function zhuHtml(z){
  let tone='', base=z;
  for(const t of ZTONES){ if(z.indexOf(t)>=0){ tone=t; base=z.split(t).join(''); break; } }
  const neu = tone==='˙';
  const toneSpan = tone ? '<span class="vz-tone">'+tone+'</span>' : '';
  const baseSpan = '<span class="vz-base">'+base+'</span>';
  // 輕聲在上方，其餘聲調在右側
  return '<span class="vz'+(neu?' neu':'')+'">'+(neu?toneSpan+baseSpan:baseSpan+toneSpan)+'</span>';
}
function openDetail(x){
  const s=$('sheet'); let h='';
  h+='<div class="xrow"><button class="xclose" id="closeBtn" aria-label="關閉">✕</button></div>';
  h+='<div class="vidiom">';
  const chars=[...x.zh]; const zhu=x.zhu||[];
  chars.forEach((c,i)=>{ h+='<div class="vchar"><span class="vc">'+c+'</span>'+
    (zhu[i]?zhuHtml(zhu[i]):'')+'</div>'; });
  h+='</div>';
  const pyRow='<div class="drow"><div class="k">拼音</div><div class="dpy">'+(x.py||'')+'</div></div>';
  if(x.m){
    h+='<div class="drow"><div class="k">意思</div><div class="v">'+(x.sem||x.def||'')+'</div></div>';
    if(x.def && x.def!==x.sem) h+='<div class="drow"><div class="k">釋義（教育部《成語典》）</div><div class="v">'+x.def+'</div></div>';
    if(x.story) h+='<div class="dstory">📖 '+x.story+'</div>';
    if(x.ex&&x.ex.length){ h+='<div class="drow"><div class="k">例句</div>'; x.ex.forEach(e=>h+='<div class="dex">'+e+'</div>'); h+='</div>'; }
    h+=pyRow;   // 拼音放在例句下方
    if(x.syn&&x.syn.length){ h+='<div class="drow"><div class="k">近義成語</div><div class="dsyn">'+x.syn.map(w=>'<span>'+w+'</span>').join('')+'</div></div>'; }
  } else {
    h+='<div class="drow"><div class="k">異體 / 參考詞語</div><div class="v">這是常見的另一種寫法'+(x.ref?('，同「<b>'+x.ref+'</b>」'):'')+'。</div></div>';
    h+=pyRow;
    if(x.ref&&byZh[x.ref]) h+='<button class="jump" id="jumpBtn">看主條「'+x.ref+'」 →</button>';
  }
  h+='<div class="dsrc">釋義／出處引自教育部《成語典》（CC BY-ND 3.0 臺灣）。</div>';
  s.innerHTML=h; $('overlay').classList.add('on');
  $('closeBtn').onclick=closeDetail;
  const jb=$('jumpBtn'); if(jb) jb.onclick=()=>{ closeDetail(); openDetail(byZh[x.ref]); };
}
function closeDetail(){ $('overlay').classList.remove('on'); }
$('overlay').addEventListener('click', e=>{ if(e.target===$('overlay')) closeDetail(); });

/* ---------- 遊戲篇 ---------- */
const QN={1:5,2:10,3:10};
let game=null;
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickDistinct(pool, n, exclude){
  const set=new Set(exclude.map(x=>x.zh)); const out=[]; let guard=0;
  while(out.length<n && guard++<800){ const c=rand(pool); if(!set.has(c.zh)){ set.add(c.zh); out.push(c); } }
  return out;
}
function buildQuestions(level){
  const pool=POOL[level]; const n=QN[level];
  const picks=shuffle(pool.slice()).slice(0,n);
  return picks.map(it=>{
    const useCloze = it.ex && it.ex.length && Math.random()<0.5;
    const distract=pickDistinct(pool.length>=8?pool:MAINS, 3, [it]);
    const opts=shuffle([it, ...distract]);
    if(useCloze){
      const ex=rand(it.ex).split(it.zh).join('＿＿＿');
      return {type:'克漏字', html:'把成語填進空格：<br><span class="blank">'+ex+'</span>', ansZh:it.zh, opts};
    }
    return {type:'看意思猜成語', html:'哪個成語的意思是：<br><span class="mean">'+(it.sem||it.def)+'</span>', ansZh:it.zh, opts};
  });
}
function startGame(level){
  game={level, qs:buildQuestions(level), i:0, score:0, streak:0};
  $('playHome').style.display='none'; $('playEnd').style.display='none'; $('playGame').style.display='';
  renderDots(); showQ();
}
function renderDots(){ let h=''; for(let k=0;k<game.qs.length;k++) h+='<i id="dot'+k+'"></i>'; $('dots').innerHTML=h; markDot(); }
function markDot(){ game.qs.forEach((q,k)=>{ const d=$('dot'+k); if(!d) return; d.className='';
  if(q._ok!=null) d.classList.add(q._ok?'ok':'no'); if(k===game.i) d.classList.add('now'); }); }
function showQ(){
  const q=game.qs[game.i];
  $('qtype').textContent='第 '+(game.i+1)+' / '+game.qs.length+' 題 · '+q.type;
  $('qtext').innerHTML=q.html; $('gfb').textContent=''; $('gfb').className='gfb'; $('gnext').style.visibility='hidden';
  $('gscore').textContent='⭐ '+game.score;
  const box=$('gopts'); box.innerHTML='';
  q.opts.forEach(o=>{ const b=document.createElement('button'); b.className='gopt'; b.textContent=o.zh;
    b.onclick=()=>answer(o.zh,b,q); box.appendChild(b); });
  markDot();
}
const CHEER=['太棒了！🎉','答對囉！👏','好厲害！🌟','就是這個！✨','你好強！🔥'];
const MISS=['再想想～','差一點！','沒關係，記起來！','下次一定對！'];
function answer(zh,btn,q){
  if(q._done) return; q._done=true;
  const ok=(zh===q.ansZh); q._ok=ok;
  document.querySelectorAll('#gopts .gopt').forEach(b=>{ b.disabled=true;
    if(b.textContent===q.ansZh) b.classList.add('correct'); else if(b===btn) b.classList.add('wrong'); });
  if(ok){ game.score++; game.streak++; $('gfb').textContent=rand(CHEER)+(game.streak>=3?(' 連對 '+game.streak+'！'):''); $('gfb').className='gfb g'; }
  else { game.streak=0; $('gfb').textContent=rand(MISS)+' 正解：'+q.ansZh; $('gfb').className='gfb b'; }
  $('gscore').textContent='⭐ '+game.score;
  $('gnext').style.visibility='visible'; markDot();
}
$('gnext').onclick=()=>{ game.i++; if(game.i>=game.qs.length) endGame(); else showQ(); };
function endGame(){
  $('playGame').style.display='none'; $('playEnd').style.display='';
  const n=game.qs.length, s=game.score, pct=s/n;
  $('endScore').textContent=s+' / '+n+' 分';
  $('endStars').textContent= pct>=0.9?'⭐⭐⭐': pct>=0.6?'⭐⭐': pct>=0.3?'⭐':'☆';
  $('endEmo').textContent= pct>=0.9?'🏆': pct>=0.6?'🎉': pct>=0.3?'💪':'🌱';
  $('endMsg').textContent= pct>=0.9?'太厲害了，成語高手！': pct>=0.6?'表現很好，繼續加油！': pct>=0.3?'不錯喔，多玩幾次就更熟了！':'沒關係，慢慢學就會進步！';
}
document.querySelectorAll('.lvcard').forEach(c=>c.onclick=()=>startGame(+c.dataset.l));
$('againBtn').onclick=()=>startGame(game.level);
$('backBtn').onclick=()=>{ $('playEnd').style.display='none'; $('playGame').style.display='none'; $('playHome').style.display=''; };

/* ---------- 分頁 ---------- */
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
  const t=b.dataset.tab;
  $('tabLearn').style.display=t==='learn'?'':'none';
  $('tabPlay').style.display=t==='play'?'':'none';
});

buildTabs(); renderGrid();
</script>
