<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>成語闖關</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1c2430; --sub:#5b6675; --line:#e3e8ef; --paper:#fbf7ef;
    --brand:#b5642a; --brand2:#d98a3d; --brand-ink:#fff; --good:#1f9d63; --bad:#d64545; --gold:#e6a817;
    --btn:#eef1f5; --btn-ink:#26303c; --shadow:0 1px 2px rgba(20,30,45,.06),0 10px 28px rgba(20,30,45,.07);
    --lv1:#3f9d5a; --lv2:#d98a3d; --lv3:#c0503f;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0e131a; --card:#161d27; --ink:#e8edf3; --sub:#9aa6b4; --line:#25303d; --paper:#1b222c;
    --brand:#d38a4c; --brand2:#e0a05e; --btn:#1e2734; --btn-ink:#dbe3ec;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 30px rgba(0,0,0,.4);}}
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding:max(14px,env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom));}
  .wrap{max-width:560px; margin:0 auto}
  header{text-align:center; margin:4px 0 14px}
  h1{font-size:24px; margin:0; letter-spacing:4px}
  .tabs{display:flex; gap:8px; margin-bottom:14px}
  .tabs button{flex:1; border:1px solid var(--line); background:var(--card); color:var(--sub);
    padding:13px; border-radius:14px; font-size:16px; font-weight:800; letter-spacing:2px; cursor:pointer; transition:.15s}
  .tabs button.on{background:var(--brand); color:var(--brand-ink); border-color:var(--brand)}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:16px}

  /* 學習篇 */
  .searchbar{display:flex; gap:8px; align-items:center; margin-bottom:10px}
  .searchbar input{flex:1; border:1px solid var(--line); background:var(--paper); color:var(--ink);
    padding:12px 14px; border-radius:12px; font-size:16px; outline:none}
  .cnt{font-size:12.5px; color:var(--sub); text-align:center; margin-bottom:8px}
  .pgtabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:8px; -webkit-overflow-scrolling:touch}
  .pgtabs button{flex:none; border:1px solid var(--line); background:var(--card); color:var(--sub); padding:6px 11px; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap}
  .pgtabs button.on{background:var(--brand); color:#fff; border-color:var(--brand)}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(70px,1fr)); gap:6px; max-height:62vh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px}
  .cell{border:1px solid var(--line); border-radius:8px; padding:8px 2px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; background:var(--card); line-height:1.2; word-break:keep-all}
  .cell:hover{background:var(--paper); border-color:var(--brand2)}
  .cell.var{color:var(--sub); border-style:dashed}
  .empty{text-align:center; color:var(--sub); padding:30px 0; grid-column:1/-1}

  /* 詳情 modal */
  .overlay{position:fixed; inset:0; background:rgba(15,20,28,.55); display:none; align-items:flex-end; justify-content:center; z-index:20}
  .overlay.on{display:flex}
  .sheet{background:var(--card); width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
    border-radius:20px 20px 0 0; padding:18px 18px calc(22px + env(safe-area-inset-bottom)); animation:up .22s ease}
  @keyframes up{from{transform:translateY(24px);opacity:.4}to{transform:none;opacity:1}}
  @media(min-width:560px){.overlay{align-items:center}.sheet{border-radius:20px}}
  .xrow{position:sticky; top:0; z-index:3; display:flex; justify-content:flex-end;
    background:linear-gradient(var(--card),var(--card) 68%,transparent); padding:4px 0 6px; margin:-6px 0 0}
  .xclose{width:36px; height:36px; border-radius:50%; border:1px solid var(--line); background:var(--card);
    color:var(--sub); font-size:17px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center}
  .xclose:hover{background:var(--paper); color:var(--ink)}
  .vidiom{display:flex; flex-direction:column; align-items:center; gap:10px; padding:2px 0 4px}
  .vchar{display:flex; align-items:center; gap:12px}
  .vchar .vc{font-size:42px; font-weight:800; line-height:1; min-width:46px; text-align:center}
  /* 直式注音：注音符號直排，聲調符號排在右側（輕聲在上方） */
  .vz{display:inline-flex; align-items:center; gap:2px; color:var(--brand2); font-weight:600}
  .vz.neu{flex-direction:column; gap:0}
  .vz .vz-base{writing-mode:vertical-rl; text-orientation:upright; font-size:16px; letter-spacing:2px; line-height:1.05}
  .vz .vz-tone{font-size:16px; line-height:1}
  .dpy{color:var(--brand2); font-size:16px; font-weight:600; letter-spacing:.5px}
  .drow{margin-top:14px; border-top:1px dashed var(--line); padding-top:11px}
  .drow .k{font-size:12px; color:var(--sub); font-weight:700; margin-bottom:3px}
  .drow .v{font-size:15px}
  .dstory{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-top:12px; font-size:14.5px; line-height:1.75}
  .dex{font-size:14.5px; color:var(--ink); padding:5px 0}
  .dex::before{content:"「"} .dex::after{content:"」"}
  .dsyn{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px}
  .dsyn span{font-size:12.5px; background:var(--btn); color:var(--btn-ink); border-radius:8px; padding:3px 9px}
  .dclose{width:100%; margin-top:16px; border:0; border-radius:13px; background:var(--ink); color:var(--bg); padding:14px; font-size:15px; font-weight:700; cursor:pointer}
  .jump{border:1px solid var(--brand); background:transparent; color:var(--brand); border-radius:10px; padding:8px 14px; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px}
  .dsrc{font-size:11.5px; color:var(--sub); margin-top:12px; line-height:1.6}

  /* 遊戲篇 */
  .levels{display:flex; flex-direction:column; gap:12px}
  .lvcard{border:2px solid var(--line); border-radius:16px; padding:16px 18px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:.12s; background:var(--card)}
  .lvcard:active{transform:scale(.99)}
  .lvcard .emo{font-size:34px}
  .lvcard .t{font-size:18px; font-weight:800}
  .lvcard .d{font-size:13px; color:var(--sub)}
  .lvcard[data-l="1"]{border-color:color-mix(in srgb,var(--lv1) 45%,var(--line))}
  .lvcard[data-l="2"]{border-color:color-mix(in srgb,var(--lv2) 45%,var(--line))}
  .lvcard[data-l="3"]{border-color:color-mix(in srgb,var(--lv3) 45%,var(--line))}
  .gtop{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
  .dots{display:flex; gap:5px; flex-wrap:wrap}
  .dots i{width:9px; height:9px; border-radius:50%; background:var(--line); display:block}
  .dots i.ok{background:var(--good)} .dots i.no{background:var(--bad)} .dots i.now{background:var(--brand); transform:scale(1.25)}
  .gscore{font-size:14px; font-weight:800; color:var(--brand)}
  .qtype{font-size:12.5px; color:var(--sub); font-weight:700; letter-spacing:1px}
  .qtext{font-size:19px; line-height:1.8; background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:18px 16px; text-align:center; margin:8px 0 4px}
  .qtext .blank{color:var(--brand); font-weight:800; letter-spacing:2px}
  .qtext .mean{color:var(--ink); font-weight:700}
  .gopts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px}
  .gopt{border:1px solid var(--line); background:var(--card); border-radius:14px; padding:17px 8px; font-size:20px; font-weight:800; letter-spacing:3px; cursor:pointer; color:var(--ink); transition:.12s}
  .gopt:active{transform:scale(.97)}
  .gopt.correct{border-color:var(--good); background:color-mix(in srgb,var(--good) 14%,var(--card))}
  .gopt.wrong{border-color:var(--bad); background:color-mix(in srgb,var(--bad) 14%,var(--card))}
  .gfb{min-height:40px; text-align:center; margin-top:12px; font-size:17px; font-weight:800}
  .gfb.g{color:var(--good)} .gfb.b{color:var(--bad)}
  .gnext{width:100%; margin-top:8px; border:0; border-radius:13px; background:var(--brand); color:#fff; padding:15px; font-size:16px; font-weight:800; cursor:pointer; visibility:hidden}
  .endscreen{text-align:center; padding:14px 6px}
  .endscreen .big{font-size:54px}
  .endscreen .sc{font-size:34px; font-weight:900; color:var(--brand); margin:6px 0}
  .endscreen .stars{font-size:28px; letter-spacing:4px; margin:4px 0 10px}
  .endscreen .msg{font-size:16px; color:var(--sub); margin-bottom:16px}
  .endbtns{display:flex; gap:10px}
  .endbtns button{flex:1; border:0; border-radius:13px; padding:14px; font-size:15px; font-weight:800; cursor:pointer}
  .b-again{background:var(--brand); color:#fff} .b-back{background:var(--btn); color:var(--btn-ink)}
  .foot{text-align:center; color:var(--sub); font-size:11px; margin-top:16px; line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>成語闖關</h1></header>
  <div class="tabs">
    <button data-tab="learn" class="on">📖 學習篇</button>
    <button data-tab="play">🎮 遊戲篇</button>
  </div>

  <!-- 學習篇 -->
  <div id="tabLearn">
    <div class="card">
      <div class="searchbar">
        <input id="q" type="search" placeholder="搜尋成語或拼音，例如：畫蛇 / hua" autocomplete="off">
      </div>
      <div class="pgtabs" id="pgtabs"></div>
      <div class="cnt" id="cnt"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- 遊戲篇 -->
  <div id="tabPlay" style="display:none">
    <div class="card" id="playHome">
      <div class="levels">
        <div class="lvcard" data-l="1"><div class="emo">🐣</div><div><div class="t">初級 · 5 題</div><div class="d">常見好記的成語，暖身開始！</div></div></div>
        <div class="lvcard" data-l="2"><div class="emo">🦊</div><div><div class="t">中級 · 10 題</div><div class="d">再進一步，考考你的實力</div></div></div>
        <div class="lvcard" data-l="3"><div class="emo">🐉</div><div><div class="t">高級 · 10 題</div><div class="d">挑戰難的成語，當個成語高手！</div></div></div>
      </div>
    </div>

    <div class="card" id="playGame" style="display:none">
      <div class="gtop">
        <div class="dots" id="dots"></div>
        <div class="gscore" id="gscore">⭐ 0</div>
      </div>
      <div class="qtype" id="qtype"></div>
      <div class="qtext" id="qtext"></div>
      <div class="gopts" id="gopts"></div>
      <div class="gfb" id="gfb"></div>
      <button class="gnext" id="gnext">下一題 →</button>
    </div>

    <div class="card" id="playEnd" style="display:none">
      <div class="endscreen">
        <div class="big" id="endEmo">🎉</div>
        <div class="sc" id="endScore"></div>
        <div class="stars" id="endStars"></div>
        <div class="msg" id="endMsg"></div>
        <div class="endbtns">
          <button class="b-again" id="againBtn">再玩一次</button>
          <button class="b-back" id="backBtn">換難度</button>
        </div>
      </div>
    </div>
  </div>

  <div class="foot">
    資料：教育部《成語典》（創用 CC 姓名標示–禁止改作 3.0 臺灣，逐字引用未改作）。<br>
    收錄 <span id="footN"></span> 則（含異體）。難度為字頻概估，非官方分級。
  </div>
</div>

<!-- 詳情 -->
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

hǎi lāo zhēn","st":3,"m":0,"ref":"海底撈針","id":372},{"zh":"大發雷霆","zhu":["ㄉㄚˋ","ㄈㄚ","ㄌㄟˊ","ㄊㄧㄥˊ"],"py":"dà fā léi tíng","st":3,"m":1,"sem":"形容大發脾氣，大聲責罵。","def":"盛怒時大聲斥責，聲如雷霆，令人驚恐","story":"據《三國志．卷五八．吳書．陸遜傳》載，漢獻帝建安十年，曹操擊殺袁紹長子袁譚，其弟袁熙、袁尚投奔遼東小國烏桓","ex":["我看老總在辦公室裡大發雷霆，我就沒敢走進去。","他父親要知道他做了這許多錯事，一定會大發雷霆。"],"syn":["怒不可遏","勃然大怒","暴跳如雷"],"lv":2,"id":373},{"zh":"大繆不然","zhu":["ㄉㄚˋ","ㄇㄧㄡˋ","ㄅㄨˋ","ㄖㄢˊ"],"py":"dà miù bù rán","st":3,"m":0,"ref":"大謬不然","id":374},{"zh":"大義滅親","zhu":["ㄉㄚˋ","ㄧˋ","ㄇㄧㄝˋ","ㄑㄧㄣ"],"py":"dà yì miè qīn","st":3,"m":1,"sem":"比喻為了維護公理正義，不徇私情，滅了犯罪的親人，或讓他們接受法律制裁。褒義。","def":"指為了維護公理正義，不徇私情，滅了犯罪的親人，或讓他們接受法律制裁","story":"據《左傳．隱公四年》載，州吁是春秋時代衛國莊公與寵妾所生的兒子，莊公非常寵愛他，大夫石碏（ㄑㄩㄝˋ）曾經勸諫莊公不要把州吁給寵壞了，但是莊公不聽，州吁也因此養成好戰驕奢的個性","ex":["歷史上那些能大義滅親的人物，都是令人敬佩的。","這次因為他父親大義滅親出面作證，才能定他的罪。"],"syn":["以義割恩"],"lv":2,"id":375},{"zh":"大聲疾呼","zhu":["ㄉㄚˋ","ㄕㄥ","ㄐㄧˊ","ㄏㄨ"],"py":"dà shēng jí hū","st":3,"m":1,"sem":"大聲而急切地呼喊。＆比喻大力地提倡、號召。","def":"疾，急促。「大聲疾呼」指大聲而急促的呼喊。語本唐．韓愈〈後十九日復上書〉。後亦用「大聲疾呼」比喻大力地提倡、號召。","story":"「大聲疾呼」的「疾」，原為急促的意思，整個詞語則是指大聲而急促的呼喊，見於唐人韓愈的〈後十九日復上書〉，內容中有一段話說道：「其既危且亟矣，大其聲而疾呼矣，閤下其亦聞而見之矣，其將往而全之歟！抑將安而不救歟！」這段話的意思是：當您看到有人陷於極度的危難，也聽到他大聲而急促地呼救，您將會過去施予援手，或是視而不見，見死不…","ex":["儘管我在後面不斷地大聲疾呼，他依然頭也不回地跑了出去。","正當大家都在熟睡的時候，中庭突然傳來有人大聲疾呼：「失火了！失火了！」"],"syn":["奔走呼號","振臂高呼","登高一呼"],"lv":2,"id":376},{"zh":"大腹便便","zhu":["ㄉㄚˋ","ㄈㄨˋ","ㄆㄧㄢˊ","ㄆㄧㄢˊ"],"py":"dà fù pián pián","st":3,"m":1,"sem":"大肚子顯得肥胖而凸出的樣子。","def":"大肚子顯得肥胖而凸出的樣子","story":"漢代邊韶，字孝先，陳留浚儀人","ex":["婦女懷胎幾個月後，就會顯得大腹便便，行動極不方便。","日本相撲選手個個大腹便便，力大如牛，令人望而生畏。"],"syn":["腦滿腸肥"],"lv":2,"id":377},{"zh":"大言不慚","zhu":["ㄉㄚˋ","ㄧㄢˊ","ㄅㄨˋ","ㄘㄢˊ"],"py":"dà yán bù cán","st":3,"m":1,"sem":"形容人說大話而不感到難為情。貶義。","def":"說大話而不感到難為情","story":"「大言」是指誇大不實的言論","ex":["論能力他表現平平，可是大言不慚的功夫倒是一流。","老王最喜歡說些大言不慚的話，來吹捧自己的能力。"],"syn":["大吹大擂","夸夸其談","自吹自擂"],"lv":1,"id":378},{"zh":"大言聳聽","zhu":["ㄉㄚˋ","ㄧㄢˊ","ㄙㄨㄥˇ","ㄊㄧㄥ"],"py":"dà yán sǒng tīng","st":3,"m":0,"ref":"危言聳聽","id":379},{"zh":"大謬不然","zhu":["ㄉㄚˋ","ㄇㄧㄡˋ","ㄅㄨˋ","ㄖㄢˊ"],"py":"dà miù bù rán","st":3,"m":1,"sem":"大錯特錯，與事實完全不符。","def":"謬，錯誤。「大謬不然」指大錯特錯，與事實完全不符。語出漢．司馬遷〈報任少卿書〉。 △「奮不顧身」、「戴盆望天」","story":"西漢史學家司馬遷是太史令司馬談之子，在父親過世後繼承父志，繼任太史令，從事編載史事兼掌天象曆法的工作","ex":["過去的人們一直認為太陽繞地球轉動，其實大謬不然。","大家都以為老王很有錢，其實大謬不然，他只不過裝闊罷了。"],"syn":["大錯特錯","荒謬絕倫"],"lv":1,"id":380},{"zh":"大逆不道","zhu":["ㄉㄚˋ","ㄋㄧˋ","ㄅㄨˋ","ㄉㄠˋ"],"py":"dà nì bù dào","st":3,"m":1,"sem":"指違反倫常，罪惡深重。貶義。","def":"指謀反背叛，罪大惡極","story":"「大逆不道」原作「大逆無道」","ex":["這種大逆不道之徒，天理難容！","他竟然棄父母於不顧，真是大逆不道！"],"syn":["罪大惡極","離經叛道"],"lv":1,"id":381},{"zh":"大逆無道","zhu":["ㄉㄚˋ","ㄋㄧˋ","ㄨˊ","ㄉㄠˋ"],"py":"dà nì wú dào","st":3,"m":0,"ref":"大逆不道","id":382},{"zh":"大道康莊","zhu":["ㄉㄚˋ","ㄉㄠˋ","ㄎㄤ","ㄓㄨㄤ"],"py":"dà dào kāng zhuāng","st":3,"m":0,"ref":"康莊大道","id":383},{"zh":"大驚小怪","zhu":["ㄉㄚˋ","ㄐㄧㄥ","ㄒㄧㄠˇ","ㄍㄨㄞˋ"],"py":"dà jīng xiǎo guài","st":3,"m":1,"sem":"形容為一些不足為奇的小事而過分聲張、驚怪。","def":"形容為一些不足為奇的小事而過分聲張、驚怪","story":"「大驚小怪」一語當從「驚怪」變化而來","ex":["東西用久了難免會壞，燈泡不亮，不用這麼大驚小怪。","孩子只是有點感冒，不必大驚小怪地到處求神問卜吧！"],"syn":["少見多怪","失驚打怪","蜀犬吠日","粵犬吠雪"],"lv":2,"id":384},{"zh":"子虛烏有","zhu":["ㄗˇ","ㄒㄩ","ㄨ","ㄧㄡˇ"],"py":"zǐ xū wū yǒu","st":3,"m":1,"sem":"比喻為假設而非實有的事物。","def":"子虛和烏有都是漢代司馬相如〈子虛賦〉中虛構的人物","story":"司馬相如是西漢著名的辭賦家，年輕時，曾在梁孝王處當了幾年的門客","ex":["他講的那些故事只是子虛烏有，你居然會相信？","為了行騙，他子虛烏有地對外宣稱自己是個富豪之子。"],"syn":["莫須有"],"lv":2,"id":385},{"zh":"孑然一身","zhu":["ㄐㄧㄝˊ","ㄖㄢˊ","ㄧ","ㄕㄣ"],"py":"jié rán yī shēn","st":3,"m":1,"sem":"形容孤獨一個人。","def":"孑然，孤獨的樣子","story":"「孑然一身」源自「孑然」一詞，見於三國吳陸瑁進呈孫權的奏章","ex":["他在臺灣，無親無故的，又沒有成家，至今仍是孑然一身。","他孑然一身，住在一間破爛的小木屋，身體虛弱多病，境遇十分凄涼。"],"syn":["形單影隻","形影相弔","孤苦伶仃","煢煢孑立"],"lv":1,"id":386},{"zh":"寸步不離","zhu":["ㄘㄨㄣˋ","ㄅㄨˋ","ㄅㄨˋ","ㄌㄧˊ"],"py":"cùn bù bù lí","st":3,"m":1,"sem":"比喻關係密切，總是在一起。","def":"緊緊跟隨著，一小步也不離開","story":"「寸步不離」是說緊緊相隨，連一小步都不離開，這個詞語見於《太平廣記．卷三八九．陸東美》引錄的《述異記》","ex":["這隻小花狗每次見了弟弟，就寸步不離地跟在他身後。","媽媽一進家門，妹妹就寸步不離地黏著她，要她一塊兒玩。"],"syn":["出入相隨","如影隨形","如膠似漆","形影不離","形影相隨"],"lv":1,"id":387},{"zh":"寸草不留","zhu":["ㄘㄨㄣˋ","ㄘㄠˇ","ㄅㄨˋ","ㄌㄧㄡˊ"],"py":"cùn cǎo bù liú","st":3,"m":1,"sem":"比喻消滅殆盡。","def":"連一點小草都不存留，比喻消滅殆盡","story":"「寸草不留」原指連一點小草都不存留，宋．樓鑰〈英老真贊〉中有「大地一變，直教寸草不留」二句，即是指萬物被破壞殆盡，一根草也不留下","ex":["他一氣之下，把院子裡整得寸草不留。","英勇 ㄕㄨㄟˇ","ㄔㄤˊ"],"py":"shān gāo shuǐ cháng","st":3,"m":1,"sem":"比喻人品高潔，垂範久遠。＆比喻情誼或恩德深厚。＆形容山水景色秀麗。","def":"(一)彼此間有高山、大河阻隔","story":"「山高水長」的意思有兩層，第一層是「山很高，水很長」，形容多所阻礙，例如唐代劉禹錫〈望賦〉中寫到「龍門不見兮雲霧蒼蒼，喬木何許兮山高水長」，句中的「喬木」指故鄉，「山高水長」是指路途遙遠，多所阻隔","ex":["先生之風山高水長，垂範久遠。","先生的仁風德化，山高水長，世人共仰。"],"syn":["光風霽月","高山仰止","德高望重","德隆望尊","嶽峙淵渟"],"lv":1,"id":410},{"zh":"川流不息","zhu":["ㄔㄨㄢ","ㄌㄧㄡˊ","ㄅㄨˋ","ㄒㄧˊ"],"py":"chuān liú bù xí","st":3,"m":1,"sem":"形容連綿不絕。","def":"像河川般奔流不停，比喻時光無止盡地流逝","story":"「川流不息」原本的意思是指河川水流永不停歇","ex":["這條大街上，人來人往，川流不息。","展覽會場內參觀人潮川流不息，場面十分熱烈。"],"syn":["車水馬龍","絡繹不絕","熙來攘往"],"lv":1,"id":411},{"zh":"川流不舍","zhu":["ㄔㄨㄢ","ㄌㄧㄡˊ","ㄅㄨˋ","ㄕㄜˇ"],"py":"chuān liú bù shě","st":3,"m":0,"ref":"川流不息","id":412},{"zh":"已精求精","zhu":["ㄧˇ","ㄐㄧㄥ","ㄑㄧㄡˊ","ㄐㄧㄥ"],"py":"yǐ jīng qiú jīng","st":3,"m":0,"ref":"精益求精","id":413},{"zh":"弓影杯蛇","zhu":["ㄍㄨㄥ","ㄧㄥˇ","ㄅㄟ","ㄕㄜˊ"],"py":"gōng yǐng bēi shé","st":3,"m":0,"ref":"杯弓蛇影","id":414},{"zh":"弓影浮杯","zhu":["ㄍㄨㄥ","ㄧㄥˇ","ㄈㄨˊ","ㄅㄟ"],"py":"gōng yǐng fú bēi","st":3,"m":0,"ref":"杯弓蛇影","id":415},{"zh":"弓藏鳥盡","zhu":["ㄍㄨㄥ","ㄘㄤˊ","ㄋㄧㄠˇ","ㄐㄧㄣˋ"],"py":"gōng cáng niǎo jìn","st":3,"m":0,"ref":"鳥盡弓藏","id":416},{"zh":"弓開得勝","zhu":["ㄍㄨㄥ","ㄎㄞ","ㄉㄜˊ","ㄕㄥˋ"],"py":"gōng kāi dé shèng","st":3,"m":0,"ref":"旗開得勝","id":417},{"zh":"才傾八斗","zhu":["ㄘㄞˊ","ㄑㄧㄥ","ㄅㄚ","ㄉㄡˇ"],"py":"cái qīng bā dǒu","st":3,"m":0,"ref":"才高八斗","id":418},{"zh":"才堪倚馬","zhu":["ㄘㄞˊ","ㄎㄢ","ㄧˇ","ㄇㄚˇ"],"py":"cái kān yǐ mǎ","st":3,"m":0,"ref":"倚馬可待","id":419},{"zh":"才富八斗","zhu":["ㄘㄞˊ","ㄈㄨˋ","ㄅㄚ","ㄉㄡˇ"],"py":"cái fù bā dǒu","st":3,"m":0,"ref":"才高八斗","id":420},{"zh":"才盡江淹","zhu":["ㄘㄞˊ","ㄐㄧㄣˋ","ㄐㄧㄤ","ㄧㄢ"],"py":"cái jìn jiāng yān","st":3,"m":0,"ref":"江郎才盡","id":421},{"zh":"才高倚馬","zhu":["ㄘㄞˊ","ㄍㄠ","ㄧˇ","ㄇㄚˇ"],"py":"cái gāo yǐ mǎ","st":3,"m":0,"ref":"倚馬可待","id":422},{"zh":"才高八斗","zhu":["ㄘㄞˊ","ㄍㄠ","ㄅㄚ","ㄉㄡˇ"],"py":"cái gāo bā dǒu","st":3,"m":1,"sem":"比喻人才學極高。","def":"比喻才學極高","story":"「才高八斗」原作「八斗之才」","ex":["聽君一席話，始知才高八斗語非假。","他演講時，博徵古今，真是才高八斗。"],"syn":["立地書櫥","腹笥便便","飽學之士","滿腹經綸","學富五車"],"lv":2,"id":423},{"zh":"不三不四","zhu":["ㄅㄨˋ","ㄙㄢ","ㄅㄨˋ","ㄙˋ"],"py":"bù sān bù sì","st":4,"m":1,"sem":"指不正經、不像樣。","def":"指不正經、不像樣","story":"成語裡常可見到數字「三」和「四」結合使用，透過這種組構方式而產生的成語，往往都具有特殊的語義內涵，例如「三」和「四」在「朝三暮四」、「三從四德」中是用以表示實指","ex":["這篇稿子被改到不三不四，以致面目全非。","他痛改前非，不再和那些不三不四的人往來。"],"syn":[],"lv":1,"id":424},{"zh":"不中抬舉","zhu":["ㄅㄨˋ","ㄓㄨㄥˋ","ㄊㄞˊ","ㄐㄩˇ"],"py":"bù zhòng tái jǔ","st":4,"m":0,"ref":"不識抬舉","id":425},{"zh":"不事邊幅","zhu":["ㄅㄨˋ","ㄕˋ","ㄅㄧㄢ","ㄈㄨˊ"],"py":"bù shì biān fú","st":4,"m":0,"ref":"不修邊幅","id":426},{"zh":"不二法門","zhu":["ㄅㄨˋ","ㄦˋ","ㄈㄚˇ","ㄇㄣˊ"],"py":"bù èr fǎ mén","st":4,"m":1,"sem":"比喻唯一的方法或途徑。","def":"佛教用語。不二，不是兩個極端；法門，修行入道的門徑。「不二法門」指觀察事物的道理，要離開相對的兩個極端的看法，才能得其實在，所以「不二法門」是指到達絕對真理的方法。語出《維摩詰所說經．卷中．入不二法門品第九》。後用「不二…","story":"不二，不是兩個極端，也就是唯一，絕對的","ex":["多讀多寫是學習寫作的不二法門。","合群敬業是讓工作愉快的不二法門。"],"syn":["必由之路"],"lv":1,"id":427},{"zh":"不二門","zhu":["ㄅㄨˋ","ㄦˋ","ㄇㄣˊ"],"py":"bù èr mén","st":4,"m":0,"ref":"不二法門","id":428},{"zh":"不修邊幅","zhu":["ㄅㄨˋ","ㄒㄧㄡ","ㄅㄧㄢ","ㄈㄨˊ"],"py":"bù xiū biān fú","st":4,"m":1,"sem":"形容不講究衣飾儀容。＆形容不拘形式小節。","def":"「不修邊幅」，典源本作「修飾邊幅」，指修整布帛邊緣，使它變得整齊","story":"「修飾邊幅」原指修整布帛邊緣使它變得整齊，在典源中用來比喻講究衣飾儀容或形式小節","ex":["他向來不修邊幅，滿頭亂髮，穿著邋遢。","他要老是不修邊幅，我看會娶不到老婆的。"],"syn":["不衫不履","首如飛蓬","蓬頭垢面","不拘小節","放浪不羈"],"lv":1,"id":429},{"zh":"不倫不類","zhu":["ㄅㄨˋ","ㄌㄨㄣˊ","ㄅㄨˋ","ㄌㄟˋ"],"py":"bù lún bù lèi","st":4,"m":1,"sem":"形容事物不成體統。貶義。","def":"「不倫不類」有兩種解，一是不合道理、法式，二是不像樣","story":"《公羊傳》是春秋三傳之一，舊題為子夏弟子公羊高所撰，是專為解釋孔子的《春秋》所作的，後世有許多學者為之註疏訓詁，其中所記載的內容亦經常被文人加以引用討論","ex":["他聽對方話說得不倫不類，就藉口離開了。","你不要跟那些不倫不類的人交朋友，小心被帶壞。"],"syn":["不三不四","非驢非馬"],"lv":1,"id":430},{"zh":"不值一文","zhu":["ㄅㄨˋ","ㄓˊ","ㄧ","ㄨㄣˊ"],"py":"bù zhí yī wén","st":4,"m":0,"ref":"一錢不值","id":431},{"zh":"不值一錢","zhu":["ㄅㄨˋ","ㄓˊ","ㄧ","ㄑㄧㄢˊ"],"py":"bù zhí yī qián","st":4,"m":0,"ref":"一錢不值","id":432},{"zh":"不值半文","zhu":["ㄅㄨˋ","ㄓˊ","ㄅㄢˋ","ㄨㄣˊ"],"py":"bù zhí bàn wén","st":4,"m":0,"ref":"一錢不值","id":433},{"zh":"不假思慮","zhu":["ㄅㄨˋ","ㄐㄧㄚˇ","ㄙ","ㄌㄩˋ"],"py":"bù jiǎ sī lǜ","st":4,"m":0,"ref":"不假思索","id":434},{"zh":"不假思索","zhu":["ㄅㄨˋ","ㄐㄧㄚˇ","ㄙ","ㄙㄨㄛˇ"],"py":"bù jiǎ sī suǒ","st":4,"m":1,"sem":"指不經過思考探求，立即做出反應。","def":"假，借。「不假思索」指不經過思考探求，立即做出反應。語出宋．黃榦〈復黃會卿書〉。","story":"宋人黃榦在寫給好友的一封回信中，提到他細讀《中庸》一書的心得","ex":["老王說話總是不假思索，因此得罪了許多人。","聽到河裡有人在呼救，救生員不假思索地就跳下去救人。"],"syn":[],"lv":1,"id":435},{"zh":"不假思量","zhu":["ㄅㄨˋ","ㄐㄧㄚˇ","ㄙ","ㄌㄧㄤˊ"],"py":"bù jiǎ sī liáng","st":4,"m":0,"ref":"不假思索","id":436},{"zh":"不入時宜","zhu":["ㄅㄨˋ","ㄖㄨˋ","ㄕˊ","ㄧˊ"],"py":"bù rù shí yí","st":4,"m":0,"ref":"不合時宜","id":437},{"zh":"不入獸穴，安得獸子","zhu":["ㄅㄨˋ","ㄖㄨˋ","ㄕㄡˋ","ㄒㄩㄝˋ","ㄢ","ㄉㄜˊ","ㄕㄡˋ","ㄗˇ"],"py":"bù rù shòu xuè ān dé shòu zǐ","st":4,"m":0,"ref":"不入虎穴，焉得虎子","id":438},{"zh":"不入虎穴，不得虎子","zhu":["ㄅㄨˋ","ㄖㄨˋ","ㄏㄨˇ","ㄒㄩㄝˋ","ㄅㄨˋ","ㄉㄜˊ","ㄏㄨˇ","ㄗˇ"],"py":"bù rù hǔ xuè bù dé hǔ zǐ","st":4,"m":0,"ref":"不入虎穴，焉得虎子","id":439},{"zh":"不入虎穴，焉得虎子","zhu":["ㄅㄨˋ","ㄖㄨˋ","ㄏㄨˇ","ㄒㄩㄝˋ","ㄧㄢ","ㄉㄜˊ","ㄏㄨˇ","ㄗˇ"],"py":"bù rù hǔ xuè yān dé hǔ zǐ","st":4,"m":1,"sem":"比喻想要達到目標就必須冒險。","def":"不深入老虎的巢穴，無法捉到小老虎","story":"班超是東漢名將，為班彪之子，班固之弟","ex":["既然本著不入虎穴，焉得虎子的決心前來，不達目的絕不回頭。","俗話說：「不入虎穴，焉得虎子。」如果不親赴匪穴，如何救得了人質？"],"syn":[],"lv":1,"id":440},{"zh":"不共之仇","zhu":["ㄅㄨˋ","ㄍㄨㄥˋ","ㄓ","ㄔㄡˊ"],"py":"bù gòng zhī chóu","st":4,"m":0,"ref":"不共戴天","id":441},{"zh":"不共天地","zhu":["ㄅㄨˋ","ㄍㄨㄥˋ","ㄊㄧㄢ","ㄉㄧˋ"],"py":"bù gòng tiān dì","st":4,"m":0,"ref":"不共戴天","id":442},{"zh":"不共戴天","zhu":["ㄅㄨˋ","ㄍㄨㄥˋ","ㄉㄞˋ","ㄊㄧㄢ"],"py":"bù gòng dài tiān","st":4,"m":1,"sem":"比喻仇恨極深。","def":"不與殺父的仇人共存於世間","story":"「不共戴天」這句成語原本的意思就是「不和仇人頂著同樣的天」，「天」只有一個，所以也就是不和仇人共存於世間的意思","ex":["父仇不共戴天，非報不可。","此恨如同不共戴天，難解難消了。"],"syn":["水火不容","冰炭不容","你死我活","勢不兩立","勢如水火","勢如冰炭"],"lv":1,"id":443},{"zh":"不加可否","zhu":["ㄅㄨˋ","ㄐㄧㄚ","ㄎㄜˇ","ㄈㄡˇ"],"py":"bù jiā kě fǒu","st":4,"m":0,"ref":"不置可否","id":444},{"zh":"不加思索","zhu":["ㄅㄨˋ","ㄐㄧㄚ","ㄙ","ㄙㄨㄛˇ"],"py":"bù jiā sī suǒ","st":4,"m":0,"ref":"不假思索","id":445},{"zh":"不加點","zhu":["ㄅㄨˋ","ㄐㄧㄚ","ㄉㄧㄢˇ"],"py":"bù jiā diǎn","st":4,"m":0,"ref":"文不加點","id":446},{"zh":"不動聲氣","zhu":["ㄅㄨˋ","ㄉㄨㄥˋ","ㄕㄥ","ㄑㄧˋ"],"py":"bù dòng shēng qì","st":4,"m":0,"ref":"不動聲色","id":447},{"zh":"不動聲色","zhu":["ㄅㄨˋ","ㄉㄨㄥˋ","ㄕㄥ","ㄙㄜˋ"],"py":"bù dòng shēng sè","st":4,"m":1,"sem":"形容人遇事不張揚的冷靜態度。","def":"一聲不響，不流露感情","story":"「不動聲色」原作「不發聲色」","ex":["他要以為我不動聲色就表示屈服，那他就搞錯了！","別看他不動聲色的樣子，其實他內心也是緊張極了。"],"syn":["不露聲色"],"lv":1,"id":448},{"zh":"不勝枚舉","zhu":["ㄅㄨˋ","ㄕㄥ","ㄇㄟˊ","ㄐㄩˇ"],"py":"bù shēng méi jǔ","st":4,"m":1,"sem":"事物太多，不能一一舉出。","def":"勝，音ㄕㄥ，盡","story":"「不勝枚舉」原作「不可枚舉」","ex":["巴黎市區中處處可見街頭藝術家，而且崛起於此地的名人不勝枚舉。","哥哥向來品學兼優，在各項競賽中也是無往不利，所獲獎項多得不勝枚舉。"],"syn":["不可悉數","不可勝數"],"lv":1,"id":449},{"zh":"不即不離","zhu":["ㄅㄨˋ","ㄐㄧˊ","ㄅㄨˋ","ㄌㄧˊ"],"py":"bù jí bù lí","st":4,"m":1,"sem":"指人、事、物之間既不太近，但也不太遠的關係。","def":"即，接近。「不即不離」指兩者間的關係不是完全相近或等同，但也不是分離的。＃語出《大方廣圓覺修多羅了義經》。後用「不即不離」來指人、事、物之間既不太近，但也不太遠的關係。亦用來指作品內容不過於直接，亦不過於含蓄。","story":"《大方廣圓覺修多羅了義經》，唐．佛陀多羅譯，常被稱為《圓覺經》，這部經典的內容是釋迦牟尼佛為文殊、普賢等十二位菩薩宣說圓覺的妙理以及觀行方法","ex":["為了保護長官安全，隨扈們不即不離地跟隨著。","他倆表面雖維持不即不離，但實際上卻是關係匪淺。"],"syn":[],"lv":1,"id":450},{"zh":"不取一芥","zhu":["ㄅㄨˋ","ㄑㄩˇ","ㄧ","ㄐㄧㄝˋ"],"py":"bù qǔ yī jiè","st":4,"m":0,"ref":"一介不取","id":451},{"zh":"不受抬舉","zhu":["ㄅㄨˋ","ㄕㄡˋ","ㄊㄞˊ","ㄐㄩˇ"],"py":"bù shòu tái jǔ","st":4,"m":0,"ref":"不識抬舉","id":452},{"zh":"不可一世","zhu":["ㄅㄨˋ","ㄎㄜˇ","ㄧ","ㄕˋ"],"py":"bù kě yī shì","st":4,"m":1,"sem":"指人驕橫自大，目空一切，以為他人無與倫比。貶義。","def":"可，讚許、稱是","story":"根據宋代羅大經撰寫的《鶴林玉露》記載，王安石年少時，狂傲自滿，以為無人能及","ex":["他恃才傲物，不可一世，狂妄的言行令人厭惡。","他騎在馬上，睥睨四周的神情，儼然不可一世。"],"syn":["目中無人","目空一切","目無餘子","妄自尊大","自命不凡","自高自大"],"lv":1,"id":453},{"zh":"不可思議","zhu":["ㄅㄨˋ","ㄎㄜˇ","ㄙ","ㄧˋ"],"py":"bù kě sī yì","st":4,"m":1,"sem":"比喻出乎常情，令人無法想像，難以理解。","def":"佛教用語，指不可思慮言說的境界","story":"《維摩詰說經》為姚秦時鳩摩羅什所譯，約在魏晉時代傳入中國，頗受知識份子的歡迎","ex":["看到他歷劫歸來，每個人都直呼不可思議。","沈浸在山嵐裡的杜鵑花，真是美得不可思議。"],"syn":["匪夷所思","難以置信"],"lv":1,"id":454},{"zh":"不可擢髮","zhu":["ㄅㄨˋ","ㄎㄜˇ","ㄓㄨㄛˊ","ㄈㄚˇ"],"py":"bù kě zhuó fǎ","st":4,"m":0,"ref":"擢髮難數","id":455},{"zh":"不可救療","zhu":["ㄅㄨˋ","ㄎㄜˇ","ㄐㄧㄡˋ","ㄌㄧㄠˊ"],"py":"bù kě jiù liáo","st":4,"m":0,"ref":"不可救藥","id":456},{"zh":"不可救藥","zhu":["ㄅㄨˋ","ㄎㄜˇ","ㄐㄧㄡˋ","ㄧㄠˋ"],"py":"bù kě jiù yào","st":4,"m":1,"sem":"病重無藥可醫治。＆比喻到了無法挽救的地步。","def":"病重無藥可醫治","story":"《詩經》是最早的詩歌總集","ex":["他這病來得好猛，一下子就被宣布不可救藥了。","醫生向家屬說明患者得的是絕症，已經不可救藥了。"],"syn":["病入膏肓","不堪造就","朽木不可雕"],"lv":1,"id":457},{"zh":"不可枚舉","zhu" hì kě fǒu","st":4,"m":1,"sem":"形容不表示任何意見。","def":"不說可以，也不說不可以","story":"「不置可否」就是對事情的是非對錯，不表示可或否","ex":["對於他提出的建議，長官一直不置可否，讓人急得不得了。","下屬提出意見時，他總是不置可否地敷衍，顯得很沒有誠意。"],"syn":["不置一詞","含糊其詞","模稜兩可"],"lv":1,"id":511},{"zh":"不翼而飛","zhu":["ㄅㄨˋ","ㄧˋ","ㄦˊ","ㄈㄟ"],"py":"bù yì ér fēi","st":4,"m":1,"sem":"比喻物品無故遺失。","def":"「不翼而飛」之「不」，典源作「無」","story":"「不翼而飛」原作「無翼而飛」","ex":["擺在飯桌上的錢，突然不翼而飛。","咦？我明明將眼鏡擺在桌上，怎麼會不翼而飛了呢？"],"syn":[],"lv":1,"id":512},{"zh":"不肯一世","zhu":["ㄅㄨˋ","ㄎㄣˇ","ㄧ","ㄕˋ"],"py":"bù kěn yī shì","st":4,"m":0,"ref":"不可一世","id":513},{"zh":"不能為力","zhu":["ㄅㄨˋ","ㄋㄥˊ","ㄨㄟˊ","ㄌㄧˋ"],"py":"bù néng wéi lì","st":4,"m":0,"ref":"無能為力","id":514},{"zh":"不脛而走","zhu":["ㄅㄨˋ","ㄐㄧㄥˋ","ㄦˊ","ㄗㄡˇ"],"py":"bù jìng ér zǒu","st":4,"m":1,"sem":"比喻事物不用推廣，也能迅速傳播。","def":"「不脛而走」之「脛」，典源作「足」","story":"據《韓詩外傳》卷六記載，春秋時，有一天晉國的國君晉平公搭船遊樂，在玩得開心之餘感嘆說：「要如何能招得賢士，與他們共度這良辰美景呢！」這時，划船的船夫盍胥聽到後，趁機跪下回答說：「得不到賢士，是因大王您不愛好他們啊！您看海裡的寶珠、山裡的美玉都沒有腳，您卻能擁有他們，這是因為您喜愛他們啊！而賢士有腳卻不到您身邊來，這完全…","ex":["公司財務危機的消息不脛而走，弄得人心惶惶。","影劇圈的新聞再怎麼封鎖，就是會不脛而走，真是奇怪！"],"syn":[],"lv":1,"id":515},{"zh":"不脛而馳","zhu":["ㄅㄨˋ","ㄐㄧㄥˋ","ㄦˊ","ㄔˊ"],"py":"bù jìng ér chí","st":4,"m":0,"ref":"不脛而走","id":516},{"zh":"不脩邊幅","zhu":["ㄅㄨˋ","ㄒㄧㄡ","ㄅㄧㄢ","ㄈㄨˊ"],"py":"bù xiū biān fú","st":4,"m":0,"ref":"不修邊幅","id":517},{"zh":"不苟言笑","zhu":["ㄅㄨˋ","ㄍㄡˇ","ㄧㄢˊ","ㄒㄧㄠˋ"],"py":"bù gǒu yán xiào","st":4,"m":1,"sem":"不隨便談笑，態度嚴肅。","def":"苟，隨便。「不苟言笑」指不隨便談笑，態度嚴肅。語本《禮記．曲禮上》。 △「一本正經」","story":"《禮記》是一本記述古代禮儀的書籍，其中的〈曲禮〉篇是講述日常生活所應做到的小節，有一段就是在教導為人子女者與父母相處時的禮節，在家裡時不能處在尊貴的西南方，坐位時不能坐在正中，行走時不能走在中間，站立時不能在門中央","ex":["他平日不苟言笑，很少與人閒聊。","他看起來不苟言笑，所以沒人敢招惹他。"],"syn":["一本正經","不苟言談"],"lv":1,"id":518},{"zh":"不著邊際","zhu":["ㄅㄨˋ","ㄓㄨㄛˊ","ㄅㄧㄢ","ㄐㄧˋ"],"py":"bù zhuó biān jì","st":4,"m":1,"sem":"比喻言論空泛或想法不切實際。","def":"四邊都靠不了岸","story":"「不著邊際」原指船在水中央，四邊都靠不了岸","ex":["他說話一向不著邊際，讓人難以掌握重點。","他提的這些方法都不著邊際，沒有一個可行的。"],"syn":["不切實際","天南地北","海說神聊","漫無邊際"],"lv":1,"id":519},{"zh":"不見書傳","zhu":["ㄅㄨˋ","ㄐㄧㄢˋ","ㄕㄨ","ㄓㄨㄢˋ"],"py":"bù jiàn shū zhuàn","st":4,"m":0,"ref":"不見經傳","id":520},{"zh":"不見經傳","zhu":["ㄅㄨˋ","ㄐㄧㄢˋ","ㄐㄧㄥ","ㄓㄨㄢˋ"],"py":"bù jiàn jīng zhuàn","st":4,"m":1,"sem":"比喻沒有名氣。＆比喻缺乏根據，沒有來歷。","def":"以往的典籍中從未記載過","story":"「不見經傳」原作「不見書傳」","ex":["今年參展的畫家，雖多半名不見經傳，但作品水準都很高。","他只是一位名不見經傳的小人物，但說的話卻比你們這些有頭有臉的人還要合情合理。"],"syn":["沒沒無聞","湮沒無聞"],"lv":1,"id":521},{"zh":"不言而喻","zhu":["ㄅㄨˋ","ㄧㄢˊ","ㄦˊ","ㄩˋ"],"py":"bù yán ér yù","st":4,"m":1,"sem":"事態明顯，不待說明即可曉悟。","def":"事態明顯，不待說明即可曉悟","story":"根據《孟子．盡心上》記載，孟子認為君子的自然本性，無論是處於富貴或是窮困之中，都不會改變","ex":["他老年得子，快樂的心情自是不言而喻。","父母對孩子的責任與愛護，可說是不言而喻。"],"syn":["顯而易見"],"lv":1,"id":522},{"zh":"不言而明","zhu":["ㄅㄨˋ","ㄧㄢˊ","ㄦˊ","ㄇㄧㄥˊ"],"py":"bù yán ér míng","st":4,"m":0,"ref":"不言而喻","id":523},{"zh":"不謀同辭","zhu":["ㄅㄨˋ","ㄇㄡˊ","ㄊㄨㄥˊ","ㄘˊ"],"py":"bù móu tóng cí","st":4,"m":0,"ref":"不謀而合","id":524},{"zh":"不謀而合","zhu":["ㄅㄨˋ","ㄇㄡˊ","ㄦˊ","ㄏㄜˊ"],"py":"bù móu ér hé","st":4,"m":1,"sem":"事前未經商量，後來意見作為卻一致。","def":"事前未經商量，後來意見作為卻一致","story":"「不謀而合」原作「不謀而同」，見於《漢書．卷一○○．敘傳上》","ex":["這個產品的企劃方向，和目前的市場需求不謀而合。","這對好朋友的默契十足，所做出的決定總是不謀而合。"],"syn":["不約而同"],"lv":1,"id":525},{"zh":"不謀而同","zhu":["ㄅㄨˋ","ㄇㄡˊ","ㄦˊ","ㄊㄨㄥˊ"],"py":"bù móu ér tóng","st":4,"m":0,"ref":"不謀而合","id":526},{"zh":"不識一丁","zhu":["ㄅㄨˋ","ㄕˋ","ㄧ","ㄉㄧㄥ"],"py":"bù shì yī dīng","st":4,"m":0,"ref":"目不識丁","id":527},{"zh":"不識丁","zhu":["ㄅㄨˋ","ㄕˋ","ㄉㄧㄥ"],"py":"bù shì dīng","st":4,"m":0,"ref":"目不識丁","id":528},{"zh":"不識之無","zhu":["ㄅㄨˋ","ㄕˋ","ㄓ","ㄨˊ"],"py":"bù shì zhī wú","st":4,"m":1,"sem":"比喻不識字或毫無學問。","def":"連「之」、「無」二字都不認識，比喻不識字或毫無學問","story":"唐代詩人白居易在寫給友人的信中，說到自己六、七個月大時，即能辨別「之」、「無」二字","ex":["脫盲教育就要不識之無的民眾，從此能讀能寫。","連這種興學的事他都要反對，難怪會遭到不識之無之譏了。"],"syn":["目不識丁","胸無點墨"],"lv":1,"id":529},{"zh":"不識抬舉","zhu":["ㄅㄨˋ","ㄕˋ","ㄊㄞˊ","ㄐㄩˇ"],"py":"bù shì tái jǔ","st":4,"m":1,"sem":"指責人不接受或不自知別人的禮遇優待。","def":"指責人不接受或不自知別人的禮遇優待","story":"「不識抬舉」的「抬舉」，是指別人對自己的看重和禮遇，「不識抬舉」是用來指責人不接受或不自知別人的禮遇優待","ex":["我當你是朋友，才願意幫你，你別不識抬舉。","見他這麼不識抬舉，大家也就不再多說，懶得理會了。"],"syn":["不知好歹"],"lv":1,"id":530},{"zh":"不識時務","zhu":["ㄅㄨˋ","ㄕˋ","ㄕˊ","ㄨˋ"],"py":"bù shì shí wù","st":4,"m":1,"sem":"比喻不知利用時運以求通達。＆形容不了解眼前狀況的愚魯態度。","def":"比喻不知利用時運以求通達","story":"據《後漢書．卷三六．鄭范陳賈張列傳．張霸》載，東漢的張霸是一個很有才學的文人，他七歲時就能通曉《春 滅","zhu":["ㄊㄧㄢ","ㄓㄨ","ㄉㄧˋ","ㄇㄧㄝˋ"],"py":"tiān zhū dì miè","st":4,"m":1,"sem":"形容所作所為天地所不容。","def":"誅，殺。滅，消滅。「天誅地滅」指所作所為天地不容。多用於發誓、賭咒。語出宋．朱暉《絕倒錄．養脾丸》。","story":"「天誅地滅」多用於發誓、賭咒，如違誓言咒語，必為天地所殺，形容所作所為，天地不容","ex":["他壞事做盡，卻毫無悔改之心，必遭天誅地滅。","你掏空公司資產，惡意倒閉，害了這麼多人妻離子散，必遭天誅地滅。"],"syn":["天打雷劈","天理不容"],"lv":1,"id":644},{"zh":"天造地設","zhu":["ㄊㄧㄢ","ㄗㄠˋ","ㄉㄧˋ","ㄕㄜˋ"],"py":"tiān zào dì shè","st":4,"m":1,"sem":"天然所成就的。＆形容人或事物彼此配合得自然得體，渾然天成。","def":"天然所成就的","story":"「天造地設」指事物乃天地的力量所形成，也就是天然所形成的","ex":["太魯閣峽谷壯麗的景色，鬼斧神工，天造地設。","這裡是人間的香格里拉，是天造地設的好地方！"],"syn":["鬼斧神工","渾然天成"],"lv":1,"id":645},{"zh":"天長地久","zhu":["ㄊㄧㄢ","ㄔㄤˊ","ㄉㄧˋ","ㄐㄧㄡˇ"],"py":"tiān cháng dì jiǔ","st":4,"m":1,"sem":"形容時間的長久無止盡。","def":"指天地永恆無窮的存在","story":"老子，姓李，名耳，字聃，春秋楚國人，曾任周朝守藏室之史，後世以為道家始祖","ex":["朋友之間有良好的溝通，友誼方能天長地久。","熱戀中的情侶，總希望彼此的感情可以天長地久。"],"syn":[],"lv":1,"id":646},{"zh":"天長地老","zhu":["ㄊㄧㄢ","ㄔㄤˊ","ㄉㄧˋ","ㄌㄠˇ"],"py":"tiān cháng dì lǎo","st":4,"m":0,"ref":"天長地久","id":647},{"zh":"天長地遠","zhu":["ㄊㄧㄢ","ㄔㄤˊ","ㄉㄧˋ","ㄩㄢˇ"],"py":"tiān cháng dì yuǎn","st":4,"m":0,"ref":"天長地久","id":648},{"zh":"天香國色","zhu":["ㄊㄧㄢ","ㄒㄧㄤ","ㄍㄨㄛˊ","ㄙㄜˋ"],"py":"tiān xiāng guó sè","st":4,"m":0,"ref":"國色天香","id":649},{"zh":"天馬行空","zhu":["ㄊㄧㄢ","ㄇㄚˇ","ㄒㄧㄥˊ","ㄎㄨㄥ"],"py":"tiān mǎ xíng kōng","st":4,"m":1,"sem":"比喻文才氣勢豪放，不受拘束。褒義。＆形容浮誇不著邊際。","def":"天馬，指天帝所乘的神馬","story":"漢武帝時以李延年為協律都尉，詔司馬相如等作〈郊祀歌〉十九章，用來祭祀天地、宗廟等，典源所收為第十章〈天馬〉","ex":["畫家運筆有如天馬行空，飄逸自然。","蘇軾詩文，豪邁奔放，猶如天馬行空。"],"syn":["行雲流水","不著邊際"],"lv":1,"id":650},{"zh":"天驚石破","zhu":["ㄊㄧㄢ","ㄐㄧㄥ","ㄕˊ","ㄆㄛˋ"],"py":"tiān jīng shí pò","st":4,"m":0,"ref":"石破天驚","id":651},{"zh":"太山壓卵","zhu":["ㄊㄞˋ","ㄕㄢ","ㄧㄚ","ㄌㄨㄢˇ"],"py":"tài shān yā luǎn","st":4,"m":0,"ref":"泰山壓卵","id":652},{"zh":"孔席不暖","zhu":["ㄎㄨㄥˇ","ㄒㄧˊ","ㄅㄨˋ","ㄋㄨㄢˇ"],"py":"kǒng xí bù nuǎn","st":4,"m":0,"ref":"席不暇暖","id":653},{"zh":"少不更事","zhu":["ㄕㄠˋ","ㄅㄨˋ","ㄍㄥ","ㄕˋ"],"py":"shào bù gēng shì","st":4,"m":1,"sem":"形容年紀輕，經歷世事少，欠缺經驗。","def":"更事，經歷世事","story":"西晉末年，外族入侵，懷、愍（ㄇㄧㄣˇ）兩帝先後被俘","ex":["他自謙少不更事，其實做事很成熟穩重。","會惹出這些麻煩，都是因為他少不更事。"],"syn":["羽毛未豐","初出茅廬","乳臭未乾"],"lv":1,"id":654}, ":["稱心如意"],"lv":1,"id":708},{"zh":"心滿願足","zhu":["ㄒㄧㄣ","ㄇㄢˇ","ㄩㄢˋ","ㄗㄨˊ"],"py":"xīn mǎn yuàn zú","st":4,"m":0,"ref":"心滿意足","id":709},{"zh":"心無二想","zhu":["ㄒㄧㄣ","ㄨˊ","ㄦˋ","ㄒㄧㄤˇ"],"py":"xīn wú èr xiǎng","st":4,"m":0,"ref":"心無二用","id":710},{"zh":"心無二用","zhu":["ㄒㄧㄣ","ㄨˊ","ㄦˋ","ㄩㄥˋ"],"py":"xīn wú èr yòng","st":4,"m":1,"sem":"指專注做某事，不分心。","def":"心思無法同時用在兩件事上","story":"「心無二用」，典源作「心不兩用」","ex":["不管是讀書或工作，唯有心無二用才能有所收穫。","山路崎嶇、濃霧密布，駕駛務必心無二用，隨時注意路況。"],"syn":[],"lv":1,"id":711},{"zh":"心無兩用","zhu":["ㄒㄧㄣ","ㄨˊ","ㄌㄧㄤˇ","ㄩㄥˋ"],"py":"xīn wú liǎng yòng","st":4,"m":0,"ref":"心無二用","id":712},{"zh":"心照不宣","zhu":["ㄒㄧㄣ","ㄓㄠˋ","ㄅㄨˋ","ㄒㄩㄢ"],"py":"xīn zhào bù xuān","st":4,"m":1,"sem":"彼此心裡明白，不必言語說明。","def":"彼此心裡明白，不必言語說明","story":"心照，是彼此心裡明白，出現在文獻中的時代相當早","ex":["默契是慢慢培養的，彼此「心照不宣」。","他們兩人心裡其實都清楚，只是彼此不說，心照不宣罷了。"],"syn":["心知肚明","心照神交","心領神會"],"lv":1,"id":713},{"zh":"心煩意亂","zhu":["ㄒㄧㄣ","ㄈㄢˊ","ㄧˋ","ㄌㄨㄢˋ"],"py":"xīn fán yì luàn","st":4,"m":1,"sem":"心情煩躁，思緒凌亂。","def":"「心煩意亂」之「意」，典源作「慮」","story":"「心煩意亂」原作「心煩慮亂」","ex":["外頭吵雜的聲音，讓他心煩意亂，根本念不下書。","一直沒接到男友的電話，讓她心煩意亂，無法專注於工作。"],"syn":["心亂如麻"],"lv":1,"id":714},{"zh":"心煩意悶","zhu":["ㄒㄧㄣ","ㄈㄢˊ","ㄧˋ","ㄇㄣ"],"py":"xīn fán yì mēn","st":4,"m":0,"ref":"心煩意亂","id":715},{"zh":"心煩意躁","zhu":["ㄒㄧㄣ","ㄈㄢˊ","ㄧˋ","ㄗㄠˋ"],"py":"xīn fán yì zào","st":4,"m":0,"ref":"心煩意亂","id":716},{"zh":"心煩慮亂","zhu":["ㄒㄧㄣ","ㄈㄢˊ","ㄌㄩˋ","ㄌㄨㄢˋ"],"py":"xīn fán lǜ luàn","st":4,"m":0,"ref":"心煩意亂","id":717},{"zh":"心爽神怡","zhu":["ㄒㄧㄣ","ㄕㄨㄤˇ","ㄕㄣˊ","ㄧˊ"],"py":"xīn shuǎng shén yí","st":4,"m":0,"ref":"心曠神怡","id":718},{"zh":"心狂意亂","zhu":["ㄒㄧㄣ","ㄎㄨㄤˊ","ㄧˋ","ㄌㄨㄢˋ"],"py":"xīn kuáng yì luàn","st":4,"m":0,"ref":"心煩意亂","id":719},{"zh":"心猨意馬","zhu":["ㄒㄧㄣ","ㄩㄢˊ","ㄧˋ","ㄇㄚˇ"],"py":"xīn yuán yì mǎ","st":4,"m":0,"ref":"心猿意馬","id":720},{"zh":"心猿意馬","zhu":["ㄒㄧㄣ","ㄩㄢˊ","ㄧˋ","ㄇㄚˇ"],"py":"xīn yuán yì mǎ","st":4,"m":1,"sem":"心意反覆不定。＆心思不專注集中。","def":"心思如猿猴不定地跳躍、快馬四處地奔馳而難以控制","story":"《參同契》是一本將《周易》易理、「黃老」、「爐火」三者道理參合為一的煉丹修仙之作，因此又稱為《周易參同契》，托言《易經》中的卦象，結合黃老學說，以闡明煉丹（即爐火）的原理和方法，是道教最早有系統論述煉丹的書籍","ex":["做事要專心，不可心猿意馬，魂不守舍。","男女朋友，用情須專一，不能心猿意馬，見一個愛一個。"],"syn":["心不在焉","心神不定","三心二意","反覆不定","見異思遷"],"lv":1,"id":721},{"zh":"心直口快","zhu":["ㄒㄧㄣ","ㄓˊ","ㄎㄡˇ","ㄎㄨㄞˋ"],"py":"xīn zhí kǒu kuài","st":4,"m":1,"sem":"形容性情直率，說話不隱諱。","def":"性情直率，說話不隱諱","story":"「心直口快 」之「直」是「直率」，整個詞語即指性情直率，所以說起話來無所隱暪，誠實表達自己的想法，見於文天祥〈紀事詩序〉中，為蒙古大將伯顏對文天祥的讚美","ex":["我一向心直口快，若有得罪之處，請多加包涵。","小明的性格就是心直口快，對什麼都沒有顧忌。"],"syn":["快人快語","直言無隱","直腸直肚"],"lv":1,"id":722},{"zh":"心直嘴快","zhu":["ㄒㄧㄣ","ㄓˊ","ㄗㄨㄟˇ","ㄎㄨㄞˋ"],"py":"xīn zhí zuǐ kuài","st":4,"m":0,"ref":"心直口快","id":723},{"zh":"心移神曠","zhu":["ㄒㄧㄣ","ㄧˊ","ㄕㄣˊ","ㄎㄨㄤˋ"],"py":"xīn yí shén kuàng","st":4,"m":0,"ref":"心曠神怡","id":724},{"zh":"心腸鐵石","zhu":["ㄒㄧㄣ","ㄔㄤˊ","ㄊㄧㄝˇ","ㄕˊ"],"py":"xīn cháng tiě shí","st":4,"m":0,"ref":"鐵石心腸","id":725},{"zh":"心腹之患","zhu":["ㄒㄧㄣ","ㄈㄨˋ","ㄓ","ㄏㄨㄢˋ"],"py":"xīn fù zhī huàn","st":4,"m":1,"sem":"形容致命的禍患或隱藏在內部的危害。","def":"形容致命的禍患或隱藏在內部的危害","story":"「心腹之患」原作「心腹之疾」、「腹心之疾」","ex":["如果對這種小人你都不處置，終究會成為心腹之患的。","他心裡想：「哪天把這心腹之患除掉，方能高枕無憂。」"],"syn":["心腹大患"],"lv":1,"id":726},{"zh":"心腹之疾","zhu":["ㄒㄧㄣ","ㄈㄨˋ","ㄓ","ㄐㄧˊ"],"py":"xīn fù zhī jí","st":4,"m":0,"ref":"心腹之患","id":727},{"zh":"心腹相照","zhu":["ㄒㄧㄣ","ㄈㄨˋ","ㄒㄧㄤ","ㄓㄠˋ"],"py":"xīn fù xiāng zhào","st":4,"m":0,"ref":"肝膽相照","id":728},{"zh":"心花怒放","zhu":["ㄒㄧㄣ","ㄏㄨㄚ","ㄋㄨˋ","ㄈㄤˋ"],"py":"xīn huā nù fàng","st":4,"m":1,"sem":"形容心情極其快活。","def":"形容心情極其快活","story":"「心花怒放」這句成語以花朵比喻心情，用「怒放」來形容心情極其高興、快活","ex":["經理一番讚美的話，說得他心花怒放。","他正在客廳心花怒放地談他獲獎的經過。"],"syn":["欣喜若狂","笑逐顏開","興高采烈"],"lv":1,"id":729},{"zh":"心花怒發","zhu":["ㄒㄧㄣ","ㄏㄨㄚ","ㄋㄨˋ","ㄈㄚ"],"py":"xīn huā nù fā","st":4,"m":0,"ref":"心花怒放","id":730},{"zh":"心花怒開","zhu":["ㄒㄧㄣ","ㄏㄨㄚ","ㄋㄨˋ","ㄎㄞ"],"py":"xīn huā nù kāi","st":4,"m":0,"ref":"心花怒放","id":731},{"zh":"心血來潮","zhu":["ㄒㄧㄣ","ㄒㄧㄝˇ","ㄌㄞˊ","ㄔㄠˊ"],"py":"xīn xiě lái cháo","st":4,"m":1,"sem":"形容突然興起的念頭。","def":"思緒像浪潮般地突起","story":"「心血來潮 」指思緒像浪潮般地突起，原指神仙對人事的感應與預知","ex":["在回家的路上，我突然心血來潮想買一束花送給妻子。","他做事缺乏計畫，常常心血來潮地想到什麼就做什麼。"],"syn":["靈機一動"],"lv":1,"id":732},{"zh":"心迴意轉","zhu":["ㄒㄧㄣ","ㄏㄨㄟˊ","ㄧˋ","ㄓㄨㄢˇ"],"py":"xīn huí yì zhuǎn","st":4,"m":0,"ref":"回心轉意","id":733},{"zh":"心靈福至","z ","zhu":["ㄕㄡˇ","ㄅㄨˋ","ㄕˋ","ㄐㄩㄢˋ"],"py":"shǒu bù shì juàn","st":4,"m":1,"sem":"形容人勤奮好學。","def":"手裡總是拿著書卷","story":"漢獻帝建安二十五年，曹操死後，曹丕繼位為魏王，不久即竄位而自立為帝","ex":["讀書手不釋卷固然好，但適時的休息也是很重要。","他一生酷愛讀書，就是躺在病床上，仍舊手不釋卷。"],"syn":["孜孜不倦","學而不厭"],"lv":1,"id":748},{"zh":"手卷不釋","zhu":["ㄕㄡˇ","ㄐㄩㄢˋ","ㄅㄨˋ","ㄕˋ"],"py":"shǒu juàn bù shì","st":4,"m":0,"ref":"手不釋卷","id":749},{"zh":"手忙腳亂","zhu":["ㄕㄡˇ","ㄇㄤˊ","ㄐㄧㄠˇ","ㄌㄨㄢˋ"],"py":"shǒu máng jiǎo luàn","st":4,"m":1,"sem":"形容做事慌亂，失了條理。","def":"形容做事慌亂，失了條理","story":"在所引典源中，禪師開示信眾，開悟須要及時，不能耽誤，切莫等到報應當頭，才如落入滾水鍋中的螃蟹那般忙亂慌張，即使生有八足也不管用","ex":["時間快到了，他才手忙腳亂地準備出門。","看你手忙腳亂的樣子，還是讓別人來做吧！"],"syn":["七手八腳","手足無措","張皇失措"],"lv":2,"id":750},{"zh":"手忙足亂","zhu":["ㄕㄡˇ","ㄇㄤˊ","ㄗㄨˊ","ㄌㄨㄢˋ"],"py":"shǒu máng zú luàn","st":4,"m":0,"ref":"手忙腳亂","id":751},{"zh":"手無寸刃","zhu":["ㄕㄡˇ","ㄨˊ","ㄘㄨㄣˋ","ㄖㄣˋ"],"py":"shǒu wú cùn rèn","st":4,"m":0,"ref":"手無寸鐵","id":752},{"zh":"手無寸鐵","zhu":["ㄕㄡˇ","ㄨˊ","ㄘㄨㄣˋ","ㄊㄧㄝˇ"],"py":"shǒu wú cùn tiě","st":4,"m":1,"sem":"形容手上沒有拿任何武器。","def":"「手無寸鐵」之「鐵」，典源作「刃」","story":"「手無寸鐵」原作「手無寸刃」","ex":["對方來勢洶洶，我們手無寸鐵，先退了再說吧！","這些匪徒何等可惡！連手無寸鐵的老百姓都不放過！"],"syn":["赤手空拳","隻手空拳"],"lv":1,"id":753},{"zh":"手無尺鐵","zhu":["ㄕㄡˇ","ㄨˊ","ㄔˇ","ㄊㄧㄝˇ"],"py":"shǒu wú chǐ tiě","st":4,"m":0,"ref":"手無寸鐵","id":754},{"zh":"手腳無措","zhu":["ㄕㄡˇ","ㄐㄧㄠˇ","ㄨˊ","ㄘㄨㄛˋ"],"py":"shǒu jiǎo wú cuò","st":4,"m":0,"ref":"手足無措","id":755},{"zh":"手舞足蹈","zhu":["ㄕㄡˇ","ㄨˇ","ㄗㄨˊ","ㄉㄠˋ"],"py":"shǒu wǔ zú dào","st":4,"m":1,"sem":"揮手舉足，舞動跳躍。＆形容高興到了極點。","def":"揮手舉足，舞動跳躍","story":"《詩經》是最早的詩歌總集","ex":["小孩子往往會邊看著電視，邊學著歌星手舞足蹈。","看到小女兒在舞蹈教室裡手舞足蹈的樣子，她不禁露出欣慰的微笑。"],"syn":["喜不自勝","載歌載舞","興高采烈","歡欣鼓舞"],"lv":2,"id":756},{"zh":"手足失措","zhu":["ㄕㄡˇ","ㄗㄨˊ","ㄕ","ㄘㄨㄛˋ"],"py":"shǒu zú shī cuò","st":4,"m":0,"ref":"手足無措","id":757},{"zh":"手足無措","zhu":["ㄕㄡˇ","ㄗㄨˊ","ㄨˊ","ㄘㄨㄛˋ"],"py":"shǒu zú wú cuò","st":4,"m":1,"sem":"形容人惶恐不安，不知如何是好。","def":"「不知所措」之「措」，典源作「錯」","story":"《史記．卷四七．孔子世家》有一段記載：衛靈公死後，衛人立蒯聵（ㄎㄨㄞˇ ㄎㄨㄟˋ）之子輒，是為出公","ex":["喜歡朝令夕改的主管，常常使得下屬手足無措。","突遇家中變故，誰都難免手足無措，不知如何是好。"],"syn":["手忙腳亂","不知所措","六神無主","張皇失措","驚慌失措"],"lv":1,"id":758},{"zh ,"禍福與共"],"lv":2,"id":1195},{"zh":"休戚與共","zhu":["ㄒㄧㄡ","ㄑㄧ","ㄩˇ","ㄍㄨㄥˋ"],"py":"xiū qī yǔ gòng","st":6,"m":1,"sem":"形容彼此同甘共苦。","def":"彼此關係密切，憂愁喜樂、禍害幸福都關聯在一起","story":"《國語．周語下》曾提到一段故事：孫周是晉襄公的曾孫，因為受到在位的晉厲公排擠，而避難到周王室，擔任單襄公的家臣","ex":["夫妻本就是休戚與共，有福同享，有難也要同當。","如今大家就像在一艘船上，生死存亡，休戚與共，還分什麼彼此？"],"syn":["休戚相關","息息相關","脣齒相依","禍福與共"],"lv":3,"id":1196},{"zh":"先發制人","zhu":["ㄒㄧㄢ","ㄈㄚ","ㄓˋ","ㄖㄣˊ"],"py":"xiān fā zhì rén","st":6,"m":1,"sem":"凡事先下手取得先機，才能制伏對方。","def":"凡事先下手取得先機，才能制伏對方","story":"據《史記．卷七．項羽本紀》載，秦朝末年，項梁和他的姪子項羽住在吳中，因為項梁足智多謀，兩人頗受地方敬重","ex":["在戰場上對決，要先發制人，搶得先機。","想不到對方一出手，就先發制人將他的軍。"],"syn":[],"lv":1,"id":1197},{"zh":"先知之明","zhu":["ㄒㄧㄢ","ㄓ","ㄓ","ㄇㄧㄥˊ"],"py":"xiān zhī zhī míng","st":6,"m":0,"ref":"先見之明","id":1198},{"zh":"先聲奪人","zhu":["ㄒㄧㄢ","ㄕㄥ","ㄉㄨㄛˊ","ㄖㄣˊ"],"py":"xiān shēng duó rén","st":6,"m":1,"sem":"謂先張大聲威，以挫敗敵人士氣。","def":"謂先張大聲威，以挫敗敵人士氣","story":"「先聲奪人」指先張大自己的聲威，藉以挫敗敵人的士氣","ex":["我們既知對方實力，談判時要先聲奪人，掌控優勢。","敵我雙方實力相當，只有先聲奪人，才能穩操勝算。"],"syn":["先發制人"],"lv":1,"id":1199},{"zh":"先見之明","zhu":["ㄒㄧㄢ","ㄐㄧㄢˋ","ㄓ","ㄇㄧㄥˊ"],"py":"xiān jiàn zhī míng","st":6,"m":1,"sem":"指具備預先洞察事物的能力。","def":"明，眼力。「先見之明」指具備預先洞察事物的能力。語出《後漢書．卷五四．楊震列傳》。","story":"東漢名臣楊彪，是一位忠於朝廷又有正義感的大臣","ex":["一個具備先見之明的經營者，總是能洞燭商機，開發出新產品。","多虧了他的先見之明，降低庫存，公司才能躲開這次的經濟衝擊。"],"syn":[],"lv":1,"id":1200},{"zh":"光天化日","zhu":["ㄍㄨㄤ","ㄊㄧㄢ","ㄏㄨㄚˋ","ㄖˋ"],"py":"guāng tiān huà rì","st":6,"m":1,"sem":"指政治清明的太平盛世。＆比喻在大白天裡，人人都看得清楚的場合。","def":"「光天」，指陽光普照之天","story":"「光天化日」係由「光天」及「化日」二詞組合而成","ex":["堯舜的光天化日，國泰民安，是古代帝王政治的典範。","在光天化日的世代，人民才有多餘的金錢與時間從事休閒活動。"],"syn":["青天白日","大庭廣眾","眾目睽睽"],"lv":1,"id":1201},{"zh":"光怪陸離","zhu":["ㄍㄨㄤ","ㄍㄨㄞˋ","ㄌㄨˋ","ㄌㄧˊ"],"py":"guāng guài lù lí","st":6,"m":1,"sem":"形容現象離奇怪異，色彩參差錯雜。","def":"「光怪」，離奇怪異的樣子","story":"「光怪陸離」係由「光怪」及「陸離」二語組合而成","ex":["這個雕像館的作品光怪陸離，讓人看得眼花撩亂。","看到這種光怪陸離的情景，每個人都感到莫名其妙。"],"syn":["千奇百怪","五光十色","五花八門","奇形怪狀","斑駁陸離"],"lv":3,"id":1202},{"zh":"光明磊落","zhu":["ㄍㄨㄤ","ㄇㄧㄥˊ","ㄌㄟˇ","ㄌㄨㄛˋ"],"py":"guāng míng lěi luò","st":6,"m":1,"sem":"形容心地無私，胸懷坦蕩。","def":"磊落，坦蕩。「光明磊落」形容心地無私，胸懷坦蕩。※語或出《朱子語類．卷七四．易．上繫上》。 △「光明正大」","story":"「磊落」是光明坦直的意思，「光明磊落」則是心地光明無私，胸懷坦蕩","ex":["他一生做事光明磊落，深受眾人敬仰。","為人要光明磊落，不能做一絲虧心事。"],"syn":["不愧屋漏","不欺暗室","光明正大","襟懷坦蕩"],"lv":2,"id":1203},{"zh":"光風霽月","zhu":["ㄍㄨㄤ","ㄈㄥ","ㄐㄧˋ","ㄩㄝˋ"],"py":"guāng fēng jì yuè","st":6,"m":1,"sem":"形容雨過天青後的明淨景象。＆形容人品光明磊落。褒義。","def":"霽月，指雨後的明月","story":"「光風霽月」原作「霽月光風」","ex":["秋雨過後，一片光風霽月，正適合納涼吟詩。","在這光風霽月的夜晚，獨自漫步湖邊，欣賞夜色，真令人陶醉。"],"syn":["風清月朗","光明正大","光明磊落","冰壺秋月","風清月朗","淵渟嶽峙"],"lv":2,"id":1204},{"zh":"全無忌憚","zhu":["ㄑㄩㄢˊ","ㄨˊ","ㄐㄧˋ","ㄉㄢˋ"],"py":"quán wú jì dàn","st":6,"m":0,"ref":"肆無忌憚","id":1205},{"zh":"全軍覆沒","zhu":["ㄑㄩㄢˊ","ㄐㄩㄣ","ㄈㄨˋ","ㄇㄛˋ"],"py":"quán jūn fù mò","st":6,"m":1,"sem":"比喻完全喪失或澈底失敗。","def":"軍隊全部被消滅，無人倖免","story":"「全軍覆沒」原作「舉軍盡沒」","ex":["我軍這次出征，一定要讓敵人全軍覆沒。","因為相信錯誤的情報，我方差點全軍覆沒。"],"syn":["片甲不回"],"lv":3,"id":1206},{"zh":"再接再厲","zhu":["ㄗㄞˋ","ㄐㄧㄝ","ㄗㄞˋ","ㄌㄧˋ"],"py":"zài jiē zài lì","st":6,"m":1,"sem":"比喻勇往直前，不因挫折而懈怠。","def":"「再接再厲」之「厲」，典源作「礪」，音義同","story":"「再接再厲」原作「再接再礪」","ex":["我們絕不怕失敗，再接再厲，越挫越勇。","我們將再接再厲，製作更精采的節目，答謝大家。"],"syn":["勇往直前","堅持不懈","奮起直追"],"lv":3,"id":1207},{"zh":"再接再礪","zhu":["ㄗㄞˋ","ㄐㄧㄝ","ㄗㄞˋ","ㄌㄧˋ"],"py":"zài jiē zài lì","st":6,"m":0,"ref":"再接再厲","id":1208},{"zh":"再見天日","zhu":["ㄗㄞˋ","ㄐㄧㄢˋ","ㄊㄧㄢ","ㄖˋ"],"py":"zài jiàn tiān rì","st":6,"m":0,"ref":"重見天日","id":1209},{"zh":"冰散瓦解","zhu":["ㄅㄧㄥ","ㄙㄢˋ","ㄨㄚˇ","ㄐㄧㄝˇ"],"py":"bīng sàn wǎ jiě","st":6,"m":0,"ref":"土崩瓦解","id":1210},{"zh":"冰消瓦解","zhu":["ㄅㄧㄥ","ㄒㄧㄠ","ㄨㄚˇ","ㄐㄧㄝˇ"],"py":"bīng xiāo wǎ jiě","st":6,"m":1,"sem":"比喻事物潰敗分裂。＆比喻問題完全解決。","def":"像冰一樣融化了，像瓦一樣破碎了","story":"「冰消瓦解」原作「瓦解冰泮」","ex":["若能切斷敵軍的後援，必然可使敵軍士氣冰消瓦解。","這些連續而來的打擊，使他原有的雄心壯志為之冰消瓦解。"],"syn":["分崩離析","煙消雲散"],"lv":3,"id":1211},{"zh":"冰清玉潔","zhu":["ㄅㄧㄥ","ㄑㄧㄥ","ㄩˋ","ㄐㄧㄝˊ"],"py":"bīng qīng yù jié","st":6,"m":1,"sem":"如同冰一樣清澈晶瑩，如同玉一般潔淨無瑕。＆ 比喻品行高潔磊落。＆ 比喻女子堅守貞操。","def":"如同冰一樣清澈晶瑩，如同玉一般潔淨無瑕","story":"司馬遷〈與摯伯陵書〉見於晉皇甫謐所編《高士傳》，該書是一本記載品德高尚之士的傳記，書中所載人物從唐堯時的被衣到漢魏之間的焦先，總計有九十多人，他們大多避居於山林田野之間、不慕世俗的榮華富貴，不願出仕當官，漢代摯峻的故事就收錄在這本書裡","ex":["大雪過後的玉山，白雪皚皚，一片冰清玉潔。","荷塘裡冰清玉潔的荷花，沾滿露珠，更顯得氣質高雅。"],"syn":[],"lv":3,"id":1212},{"zh":"冰清玉粹","zhu":["ㄅㄧㄥ ":"宋玉是戰國時代楚國的著名文學家，善於辭賦，作品有〈九辯〉〈招魂〉等，與屈原並稱「屈宋」","ex":["這種無伴奏的清唱音樂，由於曲高和寡，根本沒有市場。","也許你的文章論點太過深奧了，曲高和寡，所以被退稿。"],"syn":["陽春白雪"],"lv":2,"id":1427},{"zh":"有備無患","zhu":["ㄧㄡˇ","ㄅㄟˋ","ㄨˊ","ㄏㄨㄢˋ"],"py":"yǒu bèi wú huàn","st":6,"m":1,"sem":"事先有準備，即可免除後患。","def":"事先有準備，即可免除後患","story":"「有備無患」就是事先若有準備，可以避免禍害的發生","ex":["你出門時得把氣喘藥帶著，好有備無患。","平時就應注意防颱工作，畢竟有備無患。"],"syn":["未雨綢繆","曲突徙薪","防患未然","居安思危"],"lv":1,"id":1428},{"zh":"有口皆碑","zhu":["ㄧㄡˇ","ㄎㄡˇ","ㄐㄧㄝ","ㄅㄟ"],"py":"yǒu kǒu jiē bēi","st":6,"m":0,"ref":"口碑載道","id":1429},{"zh":"有名亡實","zhu":["ㄧㄡˇ","ㄇㄧㄥˊ","ㄨˊ","ㄕˊ"],"py":"yǒu míng wú shí","st":6,"m":0,"ref":"有名無實","id":1430},{"zh":"有名無實","zhu":["ㄧㄡˇ","ㄇㄧㄥˊ","ㄨˊ","ㄕˊ"],"py":"yǒu míng wú shí","st":6,"m":1,"sem":"指虛有其名而無實際內容。","def":"指虛有其名而無實際內容","story":"「名」指名聲、名義，「實」指實際的情形，名和實如果一致，那就是「名副其實」，但是如果空有虛名，卻沒有實際的權力或能力，那就是「有名無實」了","ex":["這對夫妻分居已久，婚姻早就有名無實了。","他對公司事務毫無決定權，是個有名無實的總經理。"],"syn":["名不副實","名存實亡","徒有虛名"],"lv":1,"id":1431},{"zh":"有始有卒","zhu":["ㄧㄡˇ","ㄕˇ","ㄧㄡˇ","ㄗㄨˊ"],"py":"yǒu shǐ yǒu zú","st":6,"m":0,"ref":"有始有終","id":1432},{"zh":"有始有終","zhu":["ㄧㄡˇ","ㄕˇ","ㄧㄡˇ","ㄓㄨㄥ"],"py":"yǒu shǐ yǒu zhōng","st":6,"m":1,"sem":"指有開頭，有結尾。比喻做事能貫徹到底。","def":"「有始有終」本作「有始有卒」","story":"「有始有終」典源作「有始有卒」","ex":["他做事認真負責，總是能有始有終地完成任務。","他學過不少才藝，但總是三分鐘熱度，不能有始有終，堅持到底。"],"syn":[],"lv":1,"id":1433},{"zh":"有始無終","zhu":["ㄧㄡˇ","ㄕˇ","ㄨˊ","ㄓㄨㄥ"],"py":"yǒu shǐ wú zhōng","st":6,"m":1,"sem":"比喻做事半途而廢，不能貫徹到底。貶義。","def":"有開頭而無收尾","story":"《詩經．大雅．蕩》這篇詩的〈詩序〉作者，一般認為是召穆公所作","ex":["他優柔寡斷的個性，常使他做事有始無終。","自從他上任後，政策朝令夕改，弄得每件事都是有始無終。"],"syn":["半途而廢","有頭無尾","虎頭蛇尾"],"lv":1,"id":1434},{"zh":"有志竟成","zhu":["ㄧㄡˇ","ㄓˋ","ㄐㄧㄥˋ","ㄔㄥˊ"],"py":"yǒu zhì jìng chéng","st":6,"m":1,"sem":"立定志向去做，終必成功。","def":"立定志向去做，終必成功","story":"據《後漢書．卷一九．耿弇列傳》載，漢朝建威將軍耿弇（ㄧㄢˇ），曾立下多次輝煌的戰功，光武帝劉秀對他十分信任","ex":["鐵杵磨成繡花針，有志竟成語非假。","愚公移山這個寓言故事說的就是有志竟成的道理。"],"syn":[],"lv":2,"id":1435},{"zh":"有恃不恐","zhu":["ㄧㄡˇ","ㄕˋ","ㄅㄨˋ","ㄎㄨㄥˇ"],"py":"yǒu shì bù kǒng","st":6,"m":0,"ref":"有恃無恐","id":1436},{"zh":"有恃無恐","zhu":["ㄧㄡˇ","ㄕˋ","ㄨˊ","ㄎㄨㄥˇ"],"py":"yǒu shì wú kǒng","st":6,"m":1,"sem":"形容有依靠而無所顧忌。","def":"形容有依靠而無所顧忌","story":"《左傳》記載了魯僖公二十六年夏天，齊孝公親自率兵攻打魯國北部邊境","ex":["他有恃無恐地說：「有辦法你去告我呀！」","別以為家裡有錢，有恃無恐，就可以不事生產。"],"syn":["仗勢欺人","狗仗人勢","狐假虎威"],"lv":1,"id":1437},{"zh":"有教無類","zhu":["ㄧㄡˇ","ㄐㄧㄠˋ","ㄨˊ","ㄌㄟˋ"],"py":"yǒu jiào wú lèi","st":6,"m":1,"sem":"指施教的對象，沒有貴賤貧富的分別。","def":"指施教的對象，沒有貴賤貧富的分別","story":"無類，不分等第種類","ex":["王老師秉持有教無類的理念，盡心盡力地教導學生。","孔子的偉大之處，就在於他有教無類，嘉惠無數莘莘學子。"],"syn":["一視同仁"],"lv":1,"id":1438},{"zh":"有條不紊","zhu":["ㄧㄡˇ","ㄊㄧㄠˊ","ㄅㄨˋ","ㄨㄣˋ"],"py":"yǒu tiáo bù wèn","st":6,"m":1,"sem":"指條理分明，有次序而不雜亂。褒義。","def":"指條理分明，有次序而不雜亂","story":"這篇典源的背景是殷帝盤庚欲從河北遷都至河南，引起臣民不悅，內容是一篇盤庚安民的訓辭，他說：我如今遷都，並非荒廢了先王的美德，只是你們隱藏了這個美德，不畏懼我這個君王","ex":["他做事一向按部就班，有條不紊。","宴會裡的表演節目，正有條不紊地依序進行著。"],"syn":["井井有條","井然有序"],"lv":1,"id":1439},{"zh":"有條有理","zhu":["ㄧㄡˇ","ㄊㄧㄠˊ","ㄧㄡˇ","ㄌㄧˇ"],"py":"yǒu tiáo yǒu lǐ","st":6,"m":0,"ref":"有條不紊","id":1440},{"zh":"有目共睹","zhu":["ㄧㄡˇ","ㄇㄨˋ","ㄍㄨㄥˋ","ㄉㄨˇ"],"py":"yǒu mù gòng dǔ","st":6,"m":1,"sem":"指事實極為明顯，眾所周知。","def":"凡是有眼睛的人都看得見","story":"睹，看見。「有目共睹」原意指凡是有眼睛的人都看得見。漢朝徐幹在《中論．卷上．貴驗》一文指出，做人說話要有信用。想要別人信任自己，則要少說多做，確實履行自己所說過的話。時日一久，事情就變得顯明；事實顯明，則只要是有眼睛的人都看得見，有耳朵的人都聽的到，豈可用不實的言辭騙人！後來「有目共睹」這句成語就從這裡演變而出，用來指…","ex":["這位縣長的優良政績，縣民們有目共睹。","他的惡行，大家有目共睹，你不用再替他掩飾了。"],"syn":["眾所周知","顯而易見"],"lv":2,"id":1441},{"zh":"有目共見","zhu":["ㄧㄡˇ","ㄇㄨˋ","ㄍㄨㄥˋ","ㄐㄧㄢˋ"],"py":"yǒu mù gòng jiàn","st":6,"m":0,"ref":"有目共睹","id":1442},{"zh":"有目咸睹","zhu":["ㄧㄡˇ","ㄇㄨˋ","ㄒㄧㄢˊ","ㄉㄨˇ"],"py":"yǒu mù xián dǔ","st":6,"m":0,"ref":"有目共睹","id":1443},{"zh":"有眼共見","zhu":["ㄧㄡˇ","ㄧㄢˇ","ㄍㄨㄥˋ","ㄐㄧㄢˋ"],"py":"yǒu yǎn gòng jiàn","st":6,"m":0,"ref":"有目共睹","id":1444},{"zh":"有聲有色","zhu":["ㄧㄡˇ","ㄕㄥ","ㄧㄡˇ","ㄙㄜˋ"],"py":"yǒu shēng yǒu sè","st":6,"m":1,"sem":"形容事物精采，淋漓盡致。","def":"原指人擁有美好的名聲和榮顯的地位","story":"「有聲」本《詩經．大雅．文王有聲》：「文王有聲，遹駿有聲","ex":["他把晚會辦得有聲有色，真不簡單。","他們把相聲講得有聲有色，讓觀眾聽得如痴如醉。"],"syn":["繪聲繪色"],"lv":1,"id":1445},{"zh":"有色有聲","zhu":["ㄧㄡˇ","ㄙㄜˋ","ㄧㄡˇ","ㄕㄥ"],"py":"yǒu sè yǒu shēng","st":6,"m":0,"ref":"有聲有色","id":1446},{"zh":"有觸即發","zhu":["ㄧㄡˇ","ㄔㄨˋ","ㄐㄧˊ","ㄈㄚ"],"py":"yǒu chù jí fā","st":6,"m":0,"ref":"一觸即發","id":1 ,"ㄌㄨㄢˋ","ㄇㄚˊ"],"py":"kuài dāo duàn luàn má","st":7,"m":0,"ref":"快刀斬亂麻","id":1799},{"zh":"快口直腸","zhu":["ㄎㄨㄞˋ","ㄎㄡˇ","ㄓˊ","ㄔㄤˊ"],"py":"kuài kǒu zhí cháng","st":7,"m":0,"ref":"心直口快","id":1800},{"zh":"快婿乘龍","zhu":["ㄎㄨㄞˋ","ㄒㄩˋ","ㄔㄥˊ","ㄌㄨㄥˊ"],"py":"kuài xù chéng lóng","st":7,"m":0,"ref":"乘龍快婿","id":1801},{"zh":"快馬加鞭","zhu":["ㄎㄨㄞˋ","ㄇㄚˇ","ㄐㄧㄚ","ㄅㄧㄢ"],"py":"kuài mǎ jiā biān","st":7,"m":1,"sem":"形容快上加快。","def":"對跑很快的馬，再加以鞭策，使牠跑得更快","story":"馬本身即是一種善跑的動物，所以會用「快馬」來形容速度極快之義，若騎馬者再加以鞭策，則馬奔跑速度必定更快，「快馬加鞭」形容快上加快的意思","ex":["下午就要開會了，請你快馬加鞭把報告趕出來。","施工單位快馬加鞭，日夜不休，以求如期完工。"],"syn":["馬不停蹄"],"lv":2,"id":1802},{"zh":"我行我法","zhu":["ㄨㄛˇ","ㄒㄧㄥˊ","ㄨㄛˇ","ㄈㄚˇ"],"py":"wǒ xíng wǒ fǎ","st":7,"m":0,"ref":"我行我素","id":1803},{"zh":"我行我素","zhu":["ㄨㄛˇ","ㄒㄧㄥˊ","ㄨㄛˇ","ㄙㄨˋ"],"py":"wǒ xíng wǒ sù","st":7,"m":1,"sem":"形容人不受外界影響，仍然依照自己的心意行事。","def":"素，向來，指目前、現在","story":"〈中庸〉首章開宗明義說：「天命之謂性，率性之謂道」，意思是天所賦予人的叫做性，循性去做就稱為道","ex":["縱使上司一再提醒，他仍舊維持我行我素的穿搭風格。","他向來我行我素，從不管別人感受，經常惹出不少麻煩。"],"syn":[],"lv":3,"id":1804},{"zh":"我見猶憐","zhu":["ㄨㄛˇ","ㄐㄧㄢˋ","ㄧㄡˊ","ㄌㄧㄢˊ"],"py":"wǒ jiàn yóu lián","st":7,"m":1,"sem":"形容女子容貌美麗，惹人憐愛。","def":"我見了尚且覺得憐愛","story":"南朝宋．虞通之的《妒記》是一本記載兩晉時期妒婦事跡的書，內容主要在記述妒婦阻止丈夫納妾，並且限制丈夫與人交往等行為","ex":["那位女孩我見猶憐，難怪兒子會日夜思戀。","人們總說她美貌非凡，今日一見，果真是我見猶憐。"],"syn":[],"lv":2,"id":1805},{"zh":"扶搖直上","zhu":["ㄈㄨˊ","ㄧㄠˊ","ㄓˊ","ㄕㄤˋ"],"py":"fú yáo zhí shàng","st":7,"m":1,"sem":"比喻快速上升。＆比喻仕途得志。","def":"扶搖，自下盤旋而上的暴風","story":"莊子是先秦道家思想的代表人物，他的哲學宗旨是要人們超越世俗的價值觀，不要去計較那些是非、大小、有用無用等的判斷，因為這些都是人為的，並非恆常不變","ex":["那部電影叫好又叫座，票房因此扶搖直上。","建材成本近來扶搖直上，建商紛紛大喊吃不消。"],"syn":["平步青雲","青雲直上"],"lv":2,"id":1806},{"zh":"扶老將幼","zhu":["ㄈㄨˊ","ㄌㄠˇ","ㄐㄧㄤ","ㄧㄡˋ"],"py":"fú lǎo jiāng yòu","st":7,"m":0,"ref":"扶老攜幼","id":1807},{"zh":"扶老攜幼","zhu":["ㄈㄨˊ","ㄌㄠˇ","ㄒㄧ","ㄧㄡˋ"],"py":"fú lǎo xī yòu","st":7,"m":1,"sem":"指男女老幼全體出動的情況。","def":"扶著老人，牽著小孩","story":"《戰國策》一書所記，大部分是東周後期各國間的戰爭，以及縱橫家為其輔佐之國所提出的政治主張與外交策略，同時也反映了當時的社會風貌以及士人的精神風采","ex":["01.國家一旦戰亂頻傳，人民只能扶老攜幼，四處逃難。","02.每到陽明山花季，總有大批遊客扶老攜幼，上山賞花。"],"syn":[],"lv":3,"id":1808},{"zh":"投井下石","zhu":["ㄊㄡˊ","ㄐㄧㄥˇ","ㄒㄧㄚˋ","ㄕˊ"],"py":"tóu jǐng xià shí","st":7,"m":0,"ref":"落井下石","id":1809},{"zh":"投其所喜","zhu":["ㄊㄡˊ","ㄑㄧˊ","ㄙㄨㄛˇ","ㄒㄧˇ"],"py":"tóu qí suǒ xǐ","st":7,"m":0,"ref":"投其所好","id":1810},{"zh":"投其所好","zhu":["ㄊㄡˊ","ㄑㄧˊ","ㄙㄨㄛˇ","ㄏㄠˋ"],"py":"tóu qí suǒ hào","st":7,"m":1,"sem":"迎合他人的愛好。","def":"迎合他人的愛好","story":"「投其所好」原作「阿其所好」","ex":["如果想要制服對方，我們可以先投其所好，再窺其弱點。","他費盡心機，用投其所好的辦法取得了長官的寵信，於是青雲直上。"],"syn":["曲意逢迎","阿諛奉承","阿諛逢迎"],"lv":2,"id":1811},{"zh":"投刃皆虛","zhu":["ㄊㄡˊ","ㄖㄣˋ","ㄐㄧㄝ","ㄒㄩ"],"py":"tóu rèn jiē xū","st":7,"m":0,"ref":"遊刃有餘","id":1812},{"zh":"投桃報李","zhu":["ㄊㄡˊ","ㄊㄠˊ","ㄅㄠˋ","ㄌㄧˇ"],"py":"tóu táo bào lǐ","st":7,"m":1,"sem":"比喻朋友間友好往來或相互贈答。","def":"你送給我桃子，我回贈李子","story":"《詩經》是最早的詩歌總集，採集周初至春秋中葉五百年間的歌謠作品和宗廟樂章，非一時一地一人所作，共三百零五篇，分為風、雅、頌三大類，為文學總集之祖，也是當時北方文學的代表","ex":["自古禮尚往來，所以投桃報李本是應該。","我送她禮物只是投桃報李，請你不要另作聯想。"],"syn":["禮尚往來"],"lv":3,"id":1813},{"zh":"投機取巧","zhu":["ㄊㄡˊ","ㄐㄧ","ㄑㄩˇ","ㄑㄧㄠˇ"],"py":"tóu jī qǔ qiǎo","st":7,"m":1,"sem":"利用時機，獲取利益。貶義。","def":"利用時機，獲取利益","story":"「投機取巧」，就是利用時機，獲取利益","ex":["做事要務本踏實，不可投機取巧。","考試應憑實力，不可投機取巧，心存僥倖。"],"syn":[],"lv":2,"id":1814},{"zh":"投珠報玉","zhu":["ㄊㄡˊ","ㄓㄨ","ㄅㄠˋ","ㄩˋ"],"py":"tóu zhū bào yù","st":7,"m":0,"ref":"投桃報李","id":1815},{"zh":"投石填海","zhu":["ㄊㄡˊ","ㄕˊ","ㄊㄧㄢˊ","ㄏㄞˇ"],"py":"tóu shí tián hǎi","st":7,"m":0,"ref":"精衛填海","id":1816},{"zh":"投礫引珠","zhu":["ㄊㄡˊ","ㄌㄧˋ","ㄧㄣˇ","ㄓㄨ"],"py":"tóu lì yǐn zhū","st":7,"m":0,"ref":"拋磚引玉","id":1817},{"zh":"投筆從戎","zhu":["ㄊㄡˊ","ㄅㄧˇ","ㄘㄨㄥˊ","ㄖㄨㄥˊ"],"py":"tóu bǐ cóng róng","st":7,"m":1,"sem":"比喻棄文從軍，以衛國立功。褒義。","def":"戎，軍旅。「投筆從戎」指棄文從軍，以衛國立功。＃典出《東觀漢記．卷一六．班超列傳》。","story":"據《東觀漢記．卷一六．班超列傳》載，東漢時，班超因家境貧困，只好為官府抄寫書籍，賺取微薄薪水，以供養母親，貼補家用","ex":["好男兒，當自強，投筆從戎上戰場。","戰事一舉，他立即整裝返國投筆從戎。"],"syn":["棄文就武"],"lv":3,"id":1818},{"zh":"投鞭斷流","zhu":["ㄊㄡˊ","ㄅㄧㄢ","ㄉㄨㄢˋ","ㄌㄧㄡˊ"],"py":"tóu biān duàn liú","st":7,"m":1,"sem":"比喻軍旅眾多，兵力強大。","def":"把兵士的馬鞭都投到江裡，就能截斷水流","story":"據北魏．崔鴻《前秦錄》載，東晉孝武帝太元年間，前秦苻堅統一北方後，決心調集百萬大軍，乘勢一舉消滅東晉，統一全中國","ex":["我今揮軍出征，兵多將廣，具有投鞭斷流的氣概，何敵不摧！","我就不相信以百萬雄師，勢可投鞭斷流，會攻不下這座山頭！"],"syn":["兵多將廣","旌旗蔽空","舳艫千里","百萬雄師"],"lv":2,"id":1819},{"zh":"投鼠之忌","zhu":["ㄊㄡˊ","ㄕㄨˇ","ㄓ","ㄐㄧˋ"],"py":"tóu shǔ zhī jì","st":7,"m":0,"ref":"投鼠忌器","id":1820},{"zh":"投鼠忌器","zhu":["ㄊㄡˊ","ㄕㄨˇ","ㄐㄧˋ","ㄑㄧˋ"],"py":"tóu shǔ jì qì","st":7,"m":1,"sem":"比喻想要除害，但因有所顧忌而不敢下手。","def":"想投擊老鼠，卻怕擊中老鼠身旁的器物而不敢下手","story":"西漢時的政論家賈誼，因為看到皇上身旁被許多小人圍繞，但卻沒有人敢舉發，而任他們為所欲為，於是決定前去勸諫","ex":["這件事牽涉層面太廣，處理起來總有投鼠忌器之感。","歹徒抓著人質當盾牌，使得警方投鼠忌器，不敢輕易開槍。"],"syn":[],"lv":3,"id":1821},{"zh":"折衝俎豆","zhu":["ㄓㄜˊ","ㄔㄨㄥ","ㄗㄨˇ","ㄉㄡˋ"],"py":"zhé chōng zǔ dòu","st":7,"m":0,"ref":"折衝尊俎","id":1822},{"zh":"折衝尊俎","zhu":["ㄓㄜˊ","ㄔㄨㄥ","ㄗㄨㄣ","ㄗㄨˇ"],"py":"zhé chōng zūn zǔ","st":7,"m":1,"sem":"在酒宴談判間，不以武力制敵取勝。","def":"折衝，挫退敵人攻城的戰車","story":"《晏子春秋．內篇．雜上》中有一則關於晏子在酒宴上運用智慧制敵取勝的事：晉平公想要攻打齊國，先派遣范昭到齊國去觀察其政局","ex":["透過他折衝尊俎，這件事終於得到圓滿解決而不再繼續紛爭不已。","他雖然不斷地為公司折衝尊俎，可惜這個合約最後還是沒有談成。"],"syn":[],"lv":3,"id":1823},{"zh":"折衝樽俎","zhu":["ㄓㄜˊ","ㄔㄨㄥ","ㄗㄨㄣ","ㄗㄨˇ"],"py":"zhé chōng zūn zǔ","st":7,"m":0,"ref":"折衝尊俎","id":1824},{"zh":"折衝罇俎","zhu":["ㄓㄜˊ","ㄔㄨㄥ","ㄗㄨㄣ","ㄗㄨˇ"],"py":"zhé chōng zūn zǔ","st":7,"m":0,"ref":"折衝尊俎","id":1825},{"zh":"攸向靡披","zhu":["ㄧㄡ","ㄒㄧㄤˋ","ㄇㄧˇ","ㄆㄧ"],"py":"yōu xiàng mǐ pī","st":7,"m":0,"ref":"所向披靡","id":1826},{"zh":"改弦易轍","zhu":["ㄍㄞˇ","ㄒㄧㄢˊ","ㄧˋ","ㄔㄜˋ"],"py":"gǎi xián yì chè","st":7,"m":1,"sem":"比喻改變制度、做法或態度。","def":"「改弦」，改換樂弦","story":"「改弦易轍」係由「改弦」及「易轍」二語詞組合而成","ex":["經商一途既然行不通，他就改弦易轍地寫起小說來。","他都知道誤入歧途了，竟然不知改弦易轍，令人遺憾！"],"syn":["改弦更張","革故鼎新"],"lv":3,"id":1827},{"zh":"改弦更張","zhu":["ㄍㄞˇ","ㄒㄧㄢˊ","ㄍㄥ","ㄓㄤ"],"py":"gǎi xián gēng zhāng","st":7,"m":1,"sem":"比喻改革變更，重新做起。","def":"更，變換。張，給樂器上弦。指若琴瑟聲音不諧調，便得更換其弦。語本漢．董仲舒〈元光元年舉賢良對策〉。後用「改弦更張」比喻改革變更，重新做起。 △「改弦易轍」","story":"「改弦更張」的「更」，是更換的意思，「張」則指給樂器上弦","ex":["為了提升業績，公司決定將舊制度澈底地改弦更張。","既然投資這項生意賺不到錢，就應改弦更張，另謀出路。"],"syn":["改弦易轍","改轅易轍"],"lv":3,"id":1828},{"zh":"改張易調","zhu":["ㄍㄞˇ","ㄓㄤ","ㄧˋ","ㄉㄧㄠˋ"],"py":"gǎi zhāng yì diào","st":7,"m":0,"ref":"改弦更張","id":1829},{"zh":"改絃易張","zhu":["ㄍㄞˇ","ㄒㄧㄢˊ","ㄧˋ","ㄓㄤ"],"py":"gǎi xián yì zhāng","st":7,"m":0,"ref":"改弦更張","id":1830},{"zh":"改絃易調","zhu":["ㄍㄞˇ","ㄒㄧㄢˊ","ㄧˋ","ㄉㄧㄠˋ"],"py":"gǎi xián yì diào","st":7,"m":0,"ref":"改弦更張","id":183 :"沐猴而冠","id":1887},{"zh":"沐猴而冠","zhu":["ㄇㄨˋ","ㄏㄡˊ","ㄦˊ","ㄍㄨㄢˋ"],"py":"mù hóu ér guàn","st":7,"m":1,"sem":"比喻人虛有表象，卻不脫粗鄙的本質。＆比喻人性情急躁。","def":"沐猴，獼猴。「沐猴而冠」指性情急躁的獼猴學人穿戴冠帽。比喻人虛有表象，卻不脫粗鄙的本質。＃語本《史記．卷七．項羽本紀》。後用「沐猴而冠」諷刺無真才實學，依附權勢，竊取名位的人。亦或指獼猴性急，不能若人久著冠帶，以喻人性情…","story":"據《史記．卷七．項羽本紀》載，西楚霸王項羽率兵進入秦國首都咸陽後，屠殺城裡的百姓，殺害已經投降的秦王子嬰，並且放火燒掉宮殿，然後帶著到處搜括而來的財貨、珍寶和婦女要回故鄉去","ex":["他雖然穿西裝打領帶，不過是沐猴而冠，舉止談吐仍顯粗俗不堪。","他靠關係當上主管，但因能力不足，仍被批評是沐猴而冠，難當大任。"],"syn":["衣冠禽獸","馬牛襟裾","虛有其表"],"lv":2,"id":1888},{"zh":"沐猴衣冠","zhu":["ㄇㄨˋ","ㄏㄡˊ","ㄧ","ㄍㄨㄢ"],"py":"mù hóu yī guān","st":7,"m":0,"ref":"沐猴而冠","id":1889},{"zh":"沐雨櫛風","zhu":["ㄇㄨˋ","ㄩˇ","ㄐㄧㄝˊ","ㄈㄥ"],"py":"mù yǔ jié fēng","st":7,"m":0,"ref":"櫛風沐雨","id":1890},{"zh":"沒三沒四","zhu":["ㄇㄟˊ","ㄙㄢ","ㄇㄟˊ","ㄙˋ"],"py":"méi sān méi sì","st":7,"m":0,"ref":"不三不四","id":1891},{"zh":"沒法沒天","zhu":["ㄇㄟˊ","ㄈㄚˇ","ㄇㄟˊ","ㄊㄧㄢ"],"py":"méi fǎ méi tiān","st":7,"m":0,"ref":"無法無天","id":1892},{"zh":"牢不可拔","zhu":["ㄌㄠˊ","ㄅㄨˋ","ㄎㄜˇ","ㄅㄚˊ"],"py":"láo bù kě bá","st":7,"m":0,"ref":"牢不可破","id":1893},{"zh":"牢不可破","zhu":["ㄌㄠˊ","ㄅㄨˋ","ㄎㄜˇ","ㄆㄛˋ"],"py":"láo bù kě pò","st":7,"m":1,"sem":"形容事情或觀念已經固定，難以改變。","def":"牢固而無法破壞動搖","story":"唐代在安史之亂後，藩鎮割據的局面已經日漸嚴重","ex":["他們倆友誼牢不可破，任誰都無法撼動。","多年前他創造的世界紀錄，至今仍牢不可破。"],"syn":[],"lv":1,"id":1894},{"zh":"牢不可解","zhu":["ㄌㄠˊ","ㄅㄨˋ","ㄎㄜˇ","ㄐㄧㄝˇ"],"py":"láo bù kě jiě","st":7,"m":0,"ref":"牢不可破","id":1895},{"zh":"牢不破","zhu":["ㄌㄠˊ","ㄅㄨˋ","ㄆㄛˋ"],"py":"láo bù pò","st":7,"m":0,"ref":"牢不可破","id":1896},{"zh":"牢補羊亡","zhu":["ㄌㄠˊ","ㄅㄨˇ","ㄧㄤˊ","ㄨㄤˊ"],"py":"láo bǔ yáng wáng","st":7,"m":0,"ref":"亡羊補牢","id":1897},{"zh":"秀外惠中","zhu":["ㄒㄧㄡˋ","ㄨㄞˋ","ㄏㄨㄟˋ","ㄓㄨㄥ"],"py":"xiù wài huì zhōng","st":7,"m":0,"ref":"秀外慧中","id":1898},{"zh":"秀外慧中","zhu":["ㄒㄧㄡˋ","ㄨㄞˋ","ㄏㄨㄟˋ","ㄓㄨㄥ"],"py":"xiù wài huì zhōng","st":7,"m":1,"sem":"形容一個人容貌秀美，內心聰慧。","def":"「秀外慧中」之「慧」，典源作「惠」","story":"「秀外慧中」原作「秀外惠中」","ex":["她秀外慧中，是眾多男士追求的對象。","這位小姐秀外慧中，待人親切，難怪人緣這麼好！"],"syn":["才貌雙全","德容兼備"],"lv":3,"id":1899},{"zh":"肘捉衿見","zhu":["ㄓㄡˇ","ㄓㄨㄛ","ㄐㄧㄣ","ㄒㄧㄢˋ"],"py":"zhǒu zhuō jīn xiàn","st":7,"m":0,"ref":"捉襟見肘","id":1900},{"zh":"肝心塗地","zhu":["ㄍㄢ","ㄒㄧㄣ","ㄊㄨˊ","ㄉㄧˋ"],"py":"gān xīn tú dì","st":7,"m":0,"ref":"肝腦塗地","id":1901},{"zh":"肝腦塗地","zhu":["ㄍㄢ","ㄋㄠˇ","ㄊㄨˊ","ㄉㄧˋ"],"py":"gān nǎo tú dì","st":7,"m":1,"sem":"形容慘死之狀。＆比喻人盡忠竭力，不惜犧牲生命之意。","def":"肝腦濺灑在地上","story":"在《戰國策．燕策一》中記載了張儀為秦國破除合縱而行連橫之計，向燕王遊說道：「大王現在最親信的是趙國","ex":["恐怖分子的炸彈攻擊，不知使多少無辜民眾肝腦塗地。","這些車禍現場照片所呈現的肝腦塗地畫面，真是令人慘不忍睹。"],"syn":["出生入死","赴湯蹈火","粉身碎骨","奮不顧身"],"lv":2,"id":1902},{"zh":"肝膽塗地","zhu":["ㄍㄢ","ㄉㄢˇ","ㄊㄨˊ","ㄉㄧˋ"],"py":"gān dǎn tú dì","st":7,"m":0,"ref":"肝腦塗地","id":1903},{"zh":"肝膽相照","zhu":["ㄍㄢ","ㄉㄢˇ","ㄒㄧㄤ","ㄓㄠˋ"],"py":"gān dǎn xiāng zhào","st":7,"m":1,"sem":"比喻赤忱相處。","def":"以肝膽互相照見","story":"在秦末楚漢相爭之時，出現了一個軍事天才，蕭何曾經讚許他「國士無雙」，劉邦也認為他「連百萬之軍，戰必勝，攻必取」","ex":["他是我肝膽相照的至交，我絕對信得過。","宋江說：「武松是義氣兄弟，與我肝膽相照。」"],"syn":["披肝瀝膽","坦誠相待","推心置腹","推誠相與"],"lv":2,"id":1904},{"zh":"肝膽相見","zhu":["ㄍㄢ","ㄉㄢˇ","ㄒㄧㄤ","ㄐㄧㄢˋ"],"py":"gān dǎn xiāng jiàn","st":7,"m":0,"ref":"肝膽相照","id":1905},{"zh":"良莠不一","zhu":["ㄌㄧㄤˊ","ㄧㄡˋ","ㄅㄨˋ","ㄧ"],"py":"liáng yòu bù yī","st":7,"m":0,"ref":"良莠不齊","id":1906},{"zh":"良莠不分","zhu":["ㄌㄧㄤˊ","ㄧㄡˋ","ㄅㄨˋ","ㄈㄣ"],"py":"liáng yòu bù fēn","st":7,"m":0,"ref":"良莠不齊","id":1907},{"zh":"良莠不齊","zhu":["ㄌㄧㄤˊ","ㄧㄡˋ","ㄅㄨˋ","ㄑㄧˊ"],"py":"liáng yòu bù qí","st":7,"m":1,"sem":"好壞參差，素質不一。","def":"良，指禾苗。莠，惡草，俗稱狗尾草，葉與禾苗相似，難以辨認。「良莠不齊」，謂好壞參差，素質不一。※語或出清．紀昀《閱微草堂筆記．卷一○．如是我聞四》。 △「參差不齊」","story":"「良」指禾苗，「莠」指一種俗謂「狗尾草」的雜草，這種雜草常會混在禾苗之中生長，由於葉子相似，所以在未吐穗之前難以辨認","ex":["這些法拍物品的品質良莠不齊，要小心挑選。","臨時募來的人力，必然良莠不齊，得加強管理才行。"],"syn":["參差不齊","龍蛇混雜"],"lv":1,"id":1908},{"zh":"良莠淆雜","zhu":["ㄌㄧㄤˊ","ㄧㄡˋ","ㄧㄠˊ","ㄗㄚˊ"],"py":"liáng yòu yáo zá","st":7,"m":0,"ref":"良莠不齊","id":1909},{"zh":"良藥苦口","zhu":["ㄌㄧㄤˊ","ㄧㄠˋ","ㄎㄨˇ","ㄎㄡˇ"],"py":"liáng yào kǔ kǒu","st":7,"m":1,"sem":"表示能治病的藥，多味苦難嚥。＆比喻諫言多不順耳，但卻有益於人。","def":"能治好病的藥，多味苦難嚥","story":"戰國七雄中的韓國，因為飽受強鄰秦國的威脅，加上國君無能，人心渙散，以致內憂外患交迫，隨時都可能亡國","ex":["良藥苦口利於病，你還是忍耐著點，喝下去吧！","這些藥雖然難吃，但良藥苦口，你還是得按時服用，病才能早日痊癒。"],"syn":["忠言逆耳"],"lv":2,"id":1910},{"zh":"芒刺在背","zhu":["ㄇㄤˊ","ㄘˋ","ㄗㄞˋ","ㄅㄟˋ"],"py":"máng cì zài bèi","st":7,"m":1,"sem":"比喻因畏忌而極度不安。","def":"像是有許多細小的芒刺沾在背上","stor 67},{"zh":"拔萃出類","zhu":["ㄅㄚˊ","ㄘㄨㄟˋ","ㄔㄨ","ㄌㄟˋ"],"py":"bá cuì chū lèi","st":8,"m":0,"ref":"出類拔萃","id":2168},{"zh":"拔類超群","zhu":["ㄅㄚˊ","ㄌㄟˋ","ㄔㄠ","ㄑㄩㄣˊ"],"py":"bá lèi chāo qún","st":8,"m":0,"ref":"出類拔萃","id":2169},{"zh":"拖泥帶水","zhu":["ㄊㄨㄛ","ㄋㄧˊ","ㄉㄞˋ","ㄕㄨㄟˇ"],"py":"tuō ní dài shuǐ","st":8,"m":1,"sem":"身上被泥、水沾汙不利行動。 ＆比喻言辭或行為不乾脆。","def":"形容身上被泥、水沾汙，不利行動","story":"「拖泥帶水」原本的意思是身上被泥、水沾汙，不利行動","ex":["只見他拖泥帶水地走了過來，褲管又溼又髒。","因為外面街道都淹水了，大家進來屋子有哪個能不拖泥帶水的？"],"syn":["牽絲攀藤"],"lv":2,"id":2170},{"zh":"招搖撞騙","zhu":["ㄓㄠ","ㄧㄠˊ","ㄓㄨㄤˋ","ㄆㄧㄢˋ"],"py":"zhāo yáo zhuàng piàn","st":8,"m":1,"sem":"形容借名炫耀，到處詐騙。","def":"形容憑藉他人名聲，到處炫耀、詐騙","story":"「招搖」一詞出現得相當早，在《史記．卷四七．孔子世家》就有一段記載︰衛靈公帶著夫人，要孔子隨行，故意讓車駕經過市集，在人多的地方，以引人注意，誇耀自己，這就是「招搖過市」一語的典源","ex":["這是招搖撞騙的老鼠會，你可別上當受騙。","這些歹徒虛設行號，到處招搖撞騙，許多商家因此受害。"],"syn":[],"lv":3,"id":2171},{"zh":"招搖過市","zhu":["ㄓㄠ","ㄧㄠˊ","ㄍㄨㄛˋ","ㄕˋ"],"py":"zhāo yáo guò shì","st":8,"m":1,"sem":"指故意在人多的地方炫耀自己，以引人注意。","def":"指故意在人多的地方炫耀自己，以引人注意","story":"孔子，名丘，字仲尼，春秋魯國人","ex":["穿了這一身睡衣招搖過市，豈非丟人現眼？","他經常開著法拉利的跑車招搖過市，十分惹眼。"],"syn":["大搖大擺","前呼後擁"],"lv":3,"id":2172},{"zh":"招花惹草","zhu":["ㄓㄠ","ㄏㄨㄚ","ㄖㄜˇ","ㄘㄠˇ"],"py":"zhāo huā rě cǎo","st":8,"m":0,"ref":"拈花惹草","id":2173},{"zh":"放浪不羈","zhu":["ㄈㄤˋ","ㄌㄤˋ","ㄅㄨˋ","ㄐㄧ"],"py":"fàng làng bù jī","st":8,"m":0,"ref":"放蕩不羈","id":2174},{"zh":"放浪形跡","zhu":["ㄈㄤˋ","ㄌㄤˋ","ㄒㄧㄥˊ","ㄐㄧ"],"py":"fàng làng xíng jī","st":8,"m":0,"ref":"放浪形骸","id":2175},{"zh":"放浪形骸","zhu":["ㄈㄤˋ","ㄌㄤˋ","ㄒㄧㄥˊ","ㄏㄞˊ"],"py":"fàng làng xíng hái","st":8,"m":1,"sem":"形容縱情放任，不受世俗禮教約束。","def":"放浪，放縱、不受拘束","story":"修禊是古代的一種民間習俗，陰曆三月上巳日（三國魏以後固定為三月三日），人們會在水邊洗濯，藉此以除不祥和祈福","ex":["他才華洋溢卻不被賞識，於是放浪形骸，寄情山水。","有些藝術家不喜被束縛，往往放浪形骸，遊走四方。"],"syn":[],"lv":3,"id":2176},{"zh":"放浪無羈","zhu":["ㄈㄤˋ","ㄌㄤˋ","ㄨˊ","ㄐㄧ"],"py":"fàng làng wú jī","st":8,"m":0,"ref":"放蕩不羈","id":2177},{"zh":"放蕩不羈","zhu":["ㄈㄤˋ","ㄉㄤˋ","ㄅㄨˋ","ㄐㄧ"],"py":"fàng dàng bù jī","st":8,"m":1,"sem":"指豪放而不受拘束。＆形容行為放縱隨便，不加檢點。貶義。","def":"「放蕩」，放縱，行為不加檢束","story":"「放蕩不羈」係由「放蕩」及「不羈」二語組合而成","ex":["我放蕩不羈慣了，很難適應官場的生活。","他生性放蕩不羈，所以不太注意生活細節。"],"syn":["放浪形骸","放縱不拘", hàng","st":8,"m":0,"ref":"掌上明珠","id":2192},{"zh":"明珠暗投","zhu":["ㄇㄧㄥˊ","ㄓㄨ","ㄢˋ","ㄊㄡˊ"],"py":"míng zhū àn tóu","st":8,"m":1,"sem":"比喻懷才不遇，高才屈居下位。＆比喻好人誤入歧途。","def":"珍貴的寶珠落入不明價值的人手裡，而得不到賞識或珍愛","story":"明珠，珍貴的寶珠，引申為珍貴的物品，也指懷有才能的人","ex":["你雖然急著找工作，但也要找對公司，才不會有明珠暗投之嘆。","古代文人遇到明主，自是遇合之美，若遇到昏君，那也只能自嘆明珠暗投。"],"syn":["懷才不遇"],"lv":2,"id":2193},{"zh":"明珠生蚌","zhu":["ㄇㄧㄥˊ","ㄓㄨ","ㄕㄥ","ㄅㄤˋ"],"py":"míng zhū shēng bàng","st":8,"m":0,"ref":"老蚌生珠","id":2194},{"zh":"明目張膽","zhu":["ㄇㄧㄥˊ","ㄇㄨˋ","ㄓㄤ","ㄉㄢˇ"],"py":"míng mù zhāng dǎn","st":8,"m":1,"sem":"比喻肆無忌憚地公然做壞事。","def":"張大眼，壯著膽","story":"「明目張膽」原作「瞋目張膽」","ex":["考試時，他竟然明目張膽作弊，一點羞恥心都沒有。","這隻小老鼠竟然敢明目張膽地在大花貓面前跑來跑去。"],"syn":["明火執仗","肆無忌憚","膽大包天"],"lv":2,"id":2195},{"zh":"明眸皓齒","zhu":["ㄇㄧㄥˊ","ㄇㄡˊ","ㄏㄠˋ","ㄔˇ"],"py":"míng móu hào chǐ","st":8,"m":1,"sem":"形容女子容貌明麗。褒義。","def":"明亮的眼睛，潔白的牙齒","story":"「明眸皓齒」，常用來形容美人容貌明麗，因為二者長在娟秀的臉上，更加引人注目","ex":["她生來明眸皓齒，十足是個美人胚子。","她豐潤高挑，明眸皓齒，十分美麗迷人。"],"syn":["朱脣皓齒","蛾眉皓齒"],"lv":3,"id":2196},{"zh":"明知故犯","zhu":["ㄇㄧㄥˊ","ㄓ","ㄍㄨˋ","ㄈㄢˋ"],"py":"míng zhī gù fàn","st":8,"m":1,"sem":"形容明明知道不對，卻故意去做。","def":"形容明明知道不對，卻故意去做","story":"「明知故犯」的意思是明明知道是錯的，卻故意去違犯","ex":["無心之過，情有可原；假如是明知故犯，那可要加重處罰了。","學校三令五申禁止學生抽菸，他卻明知故犯，當然要被記過處分了。"],"syn":["知法犯法"],"lv":2,"id":2197},{"zh":"明知明犯","zhu":["ㄇㄧㄥˊ","ㄓ","ㄇㄧㄥˊ","ㄈㄢˋ"],"py":"míng zhī míng fàn","st":8,"m":0,"ref":"明知故犯","id":2198},{"zh":"明若指掌","zhu":["ㄇㄧㄥˊ","ㄖㄨㄛˋ","ㄓˇ","ㄓㄤˇ"],"py":"míng ruò zhǐ zhǎng","st":8,"m":0,"ref":"瞭如指掌","id":2199},{"zh":"明若觀火","zhu":["ㄇㄧㄥˊ","ㄖㄨㄛˋ","ㄍㄨㄢ","ㄏㄨㄛˇ"],"py":"míng ruò guān huǒ","st":8,"m":0,"ref":"洞若觀火","id":2200},{"zh":"明鏡高懸","zhu":["ㄇㄧㄥˊ","ㄐㄧㄥˋ","ㄍㄠ","ㄒㄩㄢˊ"],"py":"míng jìng gāo xuán","st":8,"m":1,"sem":"比喻官吏執法能公正嚴明。褒義。＆比喻辦事能明察無私。褒義。","def":"傳說秦宮有方鏡，能照見人的五臟六腑，鑑別人心邪正","story":"根據《西京雜記》的記載，劉邦攻入咸陽宮時，尋獲寶物一方明鏡，它能照見人的五臟六腑，也能鑑別人心正邪","ex":["這位法官果真是明鏡高懸，平反不少冤情。","陳法官判案一向公正嚴謹，真可說是明鏡高懸。"],"syn":["大公無私","執法如山","洞燭姦邪"],"lv":2,"id":2201},{"zh":"易俗移風","zhu":["ㄧˋ","ㄙㄨˊ","ㄧˊ","ㄈㄥ"],"py":"yì sú yí fēng","st":8,"m":0,"ref":"移風易俗","id":2202},{"zh":"易如反掌","zhu":["ㄧˋ","ㄖㄨˊ","ㄈㄢˇ"," def":"形容在字句上推敲琢磨","story":"「咬文嚼字」表面的意思就是把文字在口中咬嚼，形容人在字句上推敲琢磨","ex":["這篇咬文嚼字的文章，讀起來頗費周折。","他寫這篇自傳時，真是咬文嚼字，一點也不敢馬虎。"],"syn":["字斟句酌","尋行數墨"],"lv":3,"id":2497},{"zh":"咬牙切齒","zhu":["ㄧㄠˇ","ㄧㄚˊ","ㄑㄧㄝˋ","ㄔˇ"],"py":"yǎo yá qiè chǐ","st":9,"m":1,"sem":"形容非常悲痛憤恨。","def":"咬緊牙齒，表示非常悲痛憤恨","story":"「切齒」的「切」，音ㄑㄧㄝˋ，是「密合」、「咬緊」的意思，所以與「咬牙」同義，因而組合成「咬牙切齒」","ex":["一提起仇人，只見他咬牙切齒地罵個不停。","他怒氣沖沖，咬牙切齒，要去找對方算帳。"],"syn":["切齒腐心","恨之入骨","痛心疾首","深惡痛絕"],"lv":3,"id":2498},{"zh":"咬牙恨齒","zhu":["ㄧㄠˇ","ㄧㄚˊ","ㄏㄣˋ","ㄔˇ"],"py":"yǎo yá hèn chǐ","st":9,"m":0,"ref":"咬牙切齒","id":2499},{"zh":"哀鴻遍地","zhu":["ㄞ","ㄏㄨㄥˊ","ㄅㄧㄢˋ","ㄉㄧˋ"],"py":"āi hóng biàn dì","st":9,"m":0,"ref":"哀鴻遍野","id":2500},{"zh":"哀鴻遍野","zhu":["ㄞ","ㄏㄨㄥˊ","ㄅㄧㄢˋ","ㄧㄝˇ"],"py":"āi hóng biàn yě","st":9,"m":1,"sem":"比喻到處都是流離失所的難民。","def":"找不到棲身之所的鴻鴈，悲傷哀痛地鳴叫","story":"「哀鴻遍野」是由《詩經．小雅．鴻鴈》：「鴻鴈于飛，哀鳴嗷嗷」兩句句義擴大而來，原意是找不到棲身之所的鴻鴈，悲傷哀痛地鳴叫","ex":["在兵荒馬亂的年歲，往往哀鴻遍野，民不聊生。","天災人禍，讓世界許多地區陷入哀鴻遍野的慘況。"],"syn":["生靈塗炭"],"lv":3,"id":2501},{"zh":"垂不朽","zhu":["ㄔㄨㄟˊ","ㄅㄨˋ","ㄒㄧㄡˇ"],"py":"chuí bù xiǔ","st":9,"m":0,"ref":"永垂不朽","id":2502},{"zh":"垂涎三尺","zhu":["ㄔㄨㄟˊ","ㄒㄧㄢˊ","ㄙㄢ","ㄔˇ"],"py":"chuí xián sān chǐ","st":9,"m":1,"sem":"形容非常貪饞。＆比喻看見別人的東西極想據為己有。","def":"口水流下三尺長","story":"「垂涎」就是流口水，「三尺」形容口水之長","ex":["只要聽到「萬巒豬腳」，就會讓人垂涎三尺。","他垂涎三尺地說：「老婆！牛肉燉好了沒？」"],"syn":["食指大動","饞涎欲滴"],"lv":2,"id":2503},{"zh":"垂頭喪氣","zhu":["ㄔㄨㄟˊ","ㄊㄡˊ","ㄙㄤˋ","ㄑㄧˋ"],"py":"chuí tóu sàng qì","st":9,"m":1,"sem":"形容失意沮喪的樣子。","def":"低垂著頭，意氣消沉","story":"「垂頭喪氣」就是垂下頭，失掉應有氣勢，是人困挫失意時的表情狀態","ex":["人生難免遭遇挫折，與其垂頭喪氣，不如振作精神，重新再幹。","這次考試落榜，並不代表你這輩子就沒出息，何必因此而垂頭喪氣呢？"],"syn":["灰心喪氣","萎靡不振","愁眉苦臉"],"lv":2,"id":2504},{"zh":"垂首喪氣","zhu":["ㄔㄨㄟˊ","ㄕㄡˇ","ㄙㄤˋ","ㄑㄧˋ"],"py":"chuí shǒu sàng qì","st":9,"m":0,"ref":"垂頭喪氣","id":2505},{"zh":"垢面蓬頭","zhu":["ㄍㄡˋ","ㄇㄧㄢˋ","ㄆㄥˊ","ㄊㄡˊ"],"py":"gòu miàn péng tóu","st":9,"m":0,"ref":"蓬頭垢面","id":2506},{"zh":"城下之盟","zhu":["ㄔㄥˊ","ㄒㄧㄚˋ","ㄓ","ㄇㄥˊ"],"py":"chéng xià zhī méng","st":9,"m":1,"sem":"泛指被迫簽訂的屈辱性條約。","def":"敵國軍隊兵臨城下，抵擋不住，被迫與敵人簽訂的和約","story":"「城下之盟」原意是：敵國軍隊兵臨城下，抵擋不住，被迫與敵人簽訂的和約","ex":["戰爭結束後，失敗的國家，也只有簽訂城下之 "id":3150},{"zh":"紛至沓來","zhu":["ㄈㄣ","ㄓˋ","ㄊㄚˋ","ㄌㄞˊ"],"py":"fēn zhì tà lái","st":10,"m":1,"sem":"形容事物紛紛不斷地到來。","def":"紛，眾多。沓，重覆。「紛至沓來」形容事物紛紛不斷地到來。＃語出宋．朱熹〈答何叔京書〉其六。 △「接踵而來」","story":"紛，眾多。沓，重覆。「紛至沓來」本意是用來形容事情接連不斷地到來。宋朝理學家朱熹在寫給何叔京的書信中指出，孟子以為「浩然之氣」是集義而養成。這種正大剛直的精神，要發自內心確實去實踐，不要預期成效，心裡不可以忘記，但也不可以助長。只要心性矜莊、嚴謹恭敬，平常確實去做，則雖然事物「紛至沓來」紛亂地到來，也無法擾亂智慧和想法…","ex":["他考上了第一志願，親戚朋友的道賀紛至沓來，十分熱鬧。","老王最近真是流年不利，倒楣的事兒紛至沓來，讓他不知所措。"],"syn":["川流不息","接二連三","接踵而來","絡繹不絕","熙來攘往"],"lv":3,"id":3151},{"zh":"素餐尸位","zhu":["ㄙㄨˋ","ㄘㄢ","ㄕ","ㄨㄟˋ"],"py":"sù cān shī wèi","st":10,"m":0,"ref":"尸位素餐","id":3152},{"zh":"耿耿丹心","zhu":["ㄍㄥˇ","ㄍㄥˇ","ㄉㄢ","ㄒㄧㄣ"],"py":"gěng gěng dān xīn","st":10,"m":0,"ref":"忠心耿耿","id":3153},{"zh":"胸中無墨","zhu":["ㄒㄩㄥ","ㄓㄨㄥ","ㄨˊ","ㄇㄛˋ"],"py":"xiōng zhōng wú mò","st":10,"m":0,"ref":"胸無點墨","id":3154},{"zh":"胸有成竹","zhu":["ㄒㄩㄥ","ㄧㄡˇ","ㄔㄥˊ","ㄓㄨˊ"],"py":"xiōng yǒu chéng zhú","st":10,"m":1,"sem":"比喻處事有定見。","def":"指畫竹之前，心中早已有了竹子的完整形象","story":"文同（西元１０１８∼１０７９），字與可，北宋梓州永泰（今四川鹽亭縣東）人","ex":["如何應付這次考試，他早就胸有成竹。","他最大特色就是遇事沉著，顯得胸有成竹。"],"syn":[],"lv":2,"id":3155},{"zh":"胸無點墨","zhu":["ㄒㄩㄥ","ㄨˊ","ㄉㄧㄢˇ","ㄇㄛˋ"],"py":"xiōng wú diǎn mò","st":10,"m":1,"sem":"比喻人毫無學識。","def":"胸中沒有一滴墨水","story":"王勃，唐代詩人，字子安，絳州龍門人","ex":["這種財大氣粗、胸無點墨的人，最令人生厭。","這篇文章絕非是他那種胸無點墨的人寫得出來的。"],"syn":["不學無術","不識之無","目不識丁","腹笥甚窘"],"lv":1,"id":3156},{"zh":"草廬三顧","zhu":["ㄘㄠˇ","ㄌㄨˊ","ㄙㄢ","ㄍㄨˋ"],"py":"cǎo lú sān gù","st":10,"m":0,"ref":"三顧茅廬","id":3157},{"zh":"草木皆兵","zhu":["ㄘㄠˇ","ㄇㄨˋ","ㄐㄧㄝ","ㄅㄧㄥ"],"py":"cǎo mù jiē bīng","st":10,"m":1,"sem":"形容疑神疑鬼、驚恐不安。","def":"見到風吹草動，都以為是敵兵","story":"據《晉書．卷一一四．苻堅載記下》載，東晉時，野心勃勃的前秦苻堅想要征服中原","ex":["每天躲警報，真是心驚膽戰，草木皆兵。","逃犯坦承在逃亡過程中，終日心神不寧，草木皆兵。"],"syn":["杯弓蛇影","風聲鶴唳","疑神疑鬼"],"lv":2,"id":3158},{"zh":"草率了事","zhu":["ㄘㄠˇ","ㄕㄨㄞˋ","ㄌㄧㄠˇ","ㄕˋ"],"py":"cǎo shuài liǎo shì","st":10,"m":0,"ref":"草草了事","id":3159},{"zh":"草草了事","zhu":["ㄘㄠˇ","ㄘㄠˇ","ㄌㄧㄠˇ","ㄕˋ"],"py":"cǎo cǎo liǎo shì","st":10,"m":1,"sem":"指匆忙隨便地解決事情。","def":"「草草」，匆促、急忙的樣子","story":"「草草了事」指草草地把事情給做完","ex":["做任何事情都要盡心盡力，絕對不可草草了事。","我們如草草了事、不負責任，接手的人會很辛苦。"],"syn":[" :"堂堂，壯盛；正正，嚴整。「堂堂正正」指軍陣強大整齊。語本《孫子．軍爭》。後用「堂堂正正」形容光明正大。 △「以逸待勞」","story":"《孫子》一書為春秋孫武所撰，為古代兵書之一，內容分析戰爭形勢，探討軍事作戰策略、方式，為歷代兵書之祖","ex":["每個人都應該堂堂正正地做人，不要有辱所生。","你平時行事若是堂堂正正，現在就不會讓人起疑心。"],"syn":["光明正大","光明磊落"],"lv":2,"id":3302},{"zh":"堂皇冠冕","zhu":["ㄊㄤˊ","ㄏㄨㄤˊ","ㄍㄨㄢ","ㄇㄧㄢˇ"],"py":"táng huáng guān miǎn","st":11,"m":0,"ref":"冠冕堂皇","id":3303},{"zh":"堂間處燕","zhu":["ㄊㄤˊ","ㄐㄧㄢ","ㄔㄨˇ","ㄧㄢˋ"],"py":"táng jiān chǔ yàn","st":11,"m":0,"ref":"燕雀處堂","id":3304},{"zh":"堅城清野","zhu":["ㄐㄧㄢ","ㄔㄥˊ","ㄑㄧㄥ","ㄧㄝˇ"],"py":"jiān chéng qīng yě","st":11,"m":0,"ref":"堅壁清野","id":3305},{"zh":"堅壁清野","zhu":["ㄐㄧㄢ","ㄅㄧˋ","ㄑㄧㄥ","ㄧㄝˇ"],"py":"jiān bì qīng yě","st":11,"m":1,"sem":"一種作戰策略，使敵人即使在攻下據點之後，也無法長期占領。","def":"堅壁，堅固堡壁，使敵人不易攻破","story":"「堅壁清野」是一種作戰策略，使敵人即使在攻下據點之後，也毫無物資、設施可用","ex":["為了不讓敵軍得逞，統帥決定實施堅壁清野的策略。","堅壁清野，是為了使敵人即使攻下據點後也毫無物資、設施可用。"],"syn":[],"lv":3,"id":3306},{"zh":"婆心苦口","zhu":["ㄆㄛˊ","ㄒㄧㄣ","ㄎㄨˇ","ㄎㄡˇ"],"py":"pó xīn kǔ kǒu","st":11,"m":0,"ref":"苦口婆心","id":3307},{"zh":"寄人籬下","zhu":["ㄐㄧˋ","ㄖㄣˊ","ㄌㄧˊ","ㄒㄧㄚˋ"],"py":"jì rén lí xià","st":11,"m":1,"sem":"寄居他人屋下生活，不能自立。＆比喻作品因襲守舊，不能自創一格。","def":"寄居他人屋下生活，不能自立","story":"「寄人籬下」原是指寄居在別人屋下，不能自主","ex":["我雖是寄人籬下，但姑父母對我都很好。","自從父母雙亡後，他就過著寄人籬下的生活。"],"syn":["仰人鼻息","依人作嫁"],"lv":1,"id":3308},{"zh":"寅吃卯糧","zhu":["ㄧㄣˊ","ㄔ","ㄇㄠˇ","ㄌㄧㄤˊ"],"py":"yín chī mǎo liáng","st":11,"m":1,"sem":"比喻收入不夠支出，預支以後的用項。","def":"寅年就吃掉了後一年卯年的食糧","story":"「寅吃卯糧」原作「寅支卯糧」","ex":["像你這樣寅吃卯糧，難怪存不了錢。","這種寅吃卯糧的日子，你怎麼過得下去？"],"syn":["入不敷出"],"lv":3,"id":3309},{"zh":"寅支卯糧","zhu":["ㄧㄣˊ","ㄓ","ㄇㄠˇ","ㄌㄧㄤˊ"],"py":"yín zhī mǎo liáng","st":11,"m":0,"ref":"寅吃卯糧","id":3310},{"zh":"將信將疑","zhu":["ㄐㄧㄤ","ㄒㄧㄣˋ","ㄐㄧㄤ","ㄧˊ"],"py":"jiāng xìn jiāng yí","st":11,"m":1,"sem":"形容對事情的真假，無法明確判斷。","def":"將，又、且。「將信將疑」表示又有點相信，又有點疑惑。形容對事情的真假，無法明確判斷。語出唐．李華〈弔古戰場文〉。 △「半信不信」","story":"〈弔古戰場文〉是唐代文學家李華憑弔古戰場所寫，描寫古戰場的悲涼景象，遙想當年戰事的慘烈以及人民因戰爭所受到的苦難","ex":["聽了這離奇古怪的故事，他們倆都將信將疑。","她邊看電視，邊自言自語，臉上流露出將信將疑的表情。"],"syn":[],"lv":3,"id":3311},{"zh":"將李代桃","zhu":["ㄐㄧㄤ","ㄌㄧˇ","ㄉㄞˋ","ㄊㄠˊ"],"py":"jiāng lǐ dài táo","st":11,"m":0,"ref":"李代桃僵","id":3312},{"zh":"將無作 坡曾自喻如：「水銀瀉地，無孔不入","ex":["商場上的謠言無孔不入，你可要小心分辨。","犯罪集團無孔不入，每個人都應該提高警覺。"],"syn":["無所不至","鑽頭覓縫"],"lv":1,"id":3928},{"zh":"無孔不鑽","zhu":["ㄨˊ","ㄎㄨㄥˇ","ㄅㄨˋ","ㄗㄨㄢ"],"py":"wú kǒng bù zuān","st":12,"m":0,"ref":"無孔不入","id":3929},{"zh":"無微不到","zhu":["ㄨˊ","ㄨㄟˊ","ㄅㄨˋ","ㄉㄠˋ"],"py":"wú wéi bù dào","st":12,"m":0,"ref":"無微不至","id":3930},{"zh":"無微不至","zhu":["ㄨˊ","ㄨㄟˊ","ㄅㄨˋ","ㄓˋ"],"py":"wú wéi bù zhì","st":12,"m":1,"sem":"形容做事非常細心周到。褒義。","def":"沒有細節不照顧到的，形容做事非常細心周到","story":"「無微不至」典源作「靡微不周」","ex":["老王對待朋友無微不至，所以人緣極好。","由於母親無微不至的照顧，小明終於康復了。"],"syn":["無所不至"],"lv":1,"id":3931},{"zh":"無忌憚","zhu":["ㄨˊ","ㄐㄧˋ","ㄉㄢˋ"],"py":"wú jì dàn","st":12,"m":0,"ref":"肆無忌憚","id":3932},{"zh":"無懈可擊","zhu":["ㄨˊ","ㄒㄧㄝˋ","ㄎㄜˇ","ㄐㄧˊ"],"py":"wú xiè kě jí","st":12,"m":1,"sem":"形容非常嚴密，沒有缺失。褒義。","def":"沒有任何破綻可讓人攻擊","story":"春秋時代孫武所撰的《孫子》，是一本兵書，內容分析戰爭形勢，探討軍事作戰策略、方式","ex":["這計畫十分周詳嚴謹，簡直是無懈可擊。","這場總決賽非常精彩，雙方的守備幾乎都無懈可擊。"],"syn":["天衣無縫","無隙可乘"],"lv":1,"id":3933},{"zh":"無所事事","zhu":["ㄨˊ","ㄙㄨㄛˇ","ㄕˋ","ㄕˋ"],"py":"wú suǒ shì shì","st":12,"m":1,"sem":"形容閒蕩無事的樣子。","def":"事事，做事。前一個「事」是動詞，後一個是名詞。「無所事事」，什麼事也不做，形容閒蕩無事的樣子。語本《史記．卷五四．曹相國世家》。","story":"曹參在西漢時是個位高權重、聲譽良好的人，他過去隨著高祖劉邦打天下，戰功豐碩，因而被封為平陽侯，同時還被任命為齊地的相國，輔佐齊王治理封地","ex":["他整日無所事事，除了吃睡，什麼正事也不幹。","暑假不知妥善安排，終究是無所事事就過去了。"],"syn":["遊手好閒"],"lv":1,"id":3934},{"zh":"無所可否","zhu":["ㄨˊ","ㄙㄨㄛˇ","ㄎㄜˇ","ㄈㄡˇ"],"py":"wú suǒ kě fǒu","st":12,"m":0,"ref":"不置可否","id":3935},{"zh":"無所措手","zhu":["ㄨˊ","ㄙㄨㄛˇ","ㄘㄨㄛˋ","ㄕㄡˇ"],"py":"wú suǒ cuò shǒu","st":12,"m":0,"ref":"手足無措","id":3936},{"zh":"無所適從","zhu":["ㄨˊ","ㄙㄨㄛˇ","ㄕˋ","ㄘㄨㄥˊ"],"py":"wú suǒ shì cóng","st":12,"m":1,"sem":"不知聽從誰才好。＆比喻不知如何是好。","def":"適，古音ㄉㄧˊ，專主","story":"據《左傳．僖公五年》載，春秋時，晉獻公愛寵妾驪姬，立她為夫人","ex":["太多人對他提出建議，把他弄得無所適從。","兩位經理的意見不同，弄得屬下無所適從。"],"syn":["不知所措"],"lv":1,"id":3937},{"zh":"無有倫比","zhu":["ㄨˊ","ㄧㄡˇ","ㄌㄨㄣˊ","ㄅㄧˇ"],"py":"wú yǒu lún bǐ","st":12,"m":0,"ref":"無與倫比","id":3938},{"zh":"無法無天","zhu":["ㄨˊ","ㄈㄚˇ","ㄨˊ","ㄊㄧㄢ"],"py":"wú fǎ wú tiān","st":12,"m":1,"sem":"形容人肆意妄為毫無顧忌。貶義。","def":"沒有法紀、天理","story":"無法，目無法紀","ex":["這些飆車族居然在鬧區裡當街砍人，簡直是無法無天！","這幾個無法無天的流氓作惡多端，已經被警察逮捕，移送法辦了。"],"syn":["目無王法","目無法紀","肆無忌憚"],"lv":1,"id":3939},{"zh":"無濟於事","zhu":["ㄨˊ","ㄐㄧˋ","ㄩˊ","ㄕˋ"],"py":"wú jì yú shì","st":12,"m":1,"sem":"對事情毫無幫助。","def":"「無濟於事」之「濟」，典源作「補」","story":"「無濟於事」原作「無補於事」","ex":["事情既然已經發生，你再怎麼怪他也無濟於事了。","今天的會議大家各說各話，對於問題的解決無濟於事。"],"syn":["杯水車薪","於事無補"],"lv":1,"id":3940},{"zh":"無獨有偶","zhu":["ㄨˊ","ㄉㄨˊ","ㄧㄡˇ","ㄡˇ"],"py":"wú dú yǒu ǒu","st":12,"m":1,"sem":"某種少見的人、事、物，偏有類同者出現恰巧湊成一對的情況，或兩項事物恰巧相同或類似。","def":"指某種少見的人、事、物，偏有類同者出現恰巧湊成一對的情況","story":"「無獨有偶」是指事物出現往往成雙成對","ex":["本公司同時有兩對雙胞胎，真是無獨有偶。","王先生和林小姐無獨有偶的同時中了二彩。"],"syn":[],"lv":1,"id":3941},{"zh":"無理取鬧","zhu":["ㄨˊ","ㄌㄧˇ","ㄑㄩˇ","ㄋㄠˋ"],"py":"wú lǐ qǔ nào","st":12,"m":1,"sem":"比喻不合情理的吵鬧或故意搗亂。貶義。","def":"原指蛙無理由地鳴叫喧鬧","story":"「無理取鬧」原是指蛙的鳴叫沒有什麼理由，只是為了喧鬧","ex":["他無理取鬧地拿著麥克風大吼大叫。","這裡是公共場所，你別在這裡無理取鬧。"],"syn":[],"lv":1,"id":3942},{"zh":"無病呻吟","zhu":["ㄨˊ","ㄅㄧㄥˋ","ㄕㄣ","ㄧㄣˊ"],"py":"wú bìng shēn yín","st":12,"m":1,"sem":"比喻人故作憂戚狀或妄發牢騷。＆諷喻文辭的矯揉造作，言不由衷。","def":"沒有生病但卻發出呻吟聲","story":"「呻吟」是病痛或哀傷所發出的聲音","ex":["別替他操心，他不過是無病呻吟罷了！","不要整天無病呻吟，應該振作起來，為將來打拚才是。"],"syn":["裝腔作勢","矯揉造作"],"lv":1,"id":3943},{"zh":"無的放矢","zhu":["ㄨˊ","ㄉㄧˋ","ㄈㄤˋ","ㄕˇ"],"py":"wú dì fàng shǐ","st":12,"m":1,"sem":"比喻言語或行動沒有目的。＆比喻毫無事實根據而胡亂的指責、攻擊別人。","def":"沒有目標而胡亂放箭，比喻言語或行動沒有目的","story":"這篇〈答容州竇中丞書〉是唐代大詩人和文學家的劉禹錫，寫給容州竇中丞的回信","ex":["總經理開會向來言必有據，從不無的放矢。","他們談了半天都只是無的放矢，什麼問題也沒說明。"],"syn":["飛短流長","無事生非"],"lv":1,"id":3944},{"zh":"無益於事","zhu":["ㄨˊ","ㄧˋ","ㄩˊ","ㄕˋ"],"py":"wú yì yú shì","st":12,"m":0,"ref":"無濟於事","id":3945},{"zh":"無穴可入","zhu":["ㄨˊ","ㄒㄩㄝˋ","ㄎㄜˇ","ㄖㄨˋ"],"py":"wú xuè kě rù","st":12,"m":0,"ref":"無地自容","id":3946},{"zh":"無縫天衣","zhu":["ㄨˊ","ㄈㄥˋ","ㄊㄧㄢ","ㄧ"],"py":"wú fèng tiān yī","st":12,"m":0,"ref":"天衣無縫","id":3947},{"zh":"無翼而飛","zhu":["ㄨˊ","ㄧˋ","ㄦˊ","ㄈㄟ"],"py":"wú yì ér fēi","st":12,"m":0,"ref":"不翼而飛","id":3948},{"zh":"無能為力","zhu":["ㄨˊ","ㄋㄥˊ","ㄨㄟˊ","ㄌㄧˋ"],"py":"wú néng wéi lì","st":12,"m":1,"sem":"指沒有能力做好某事。","def":"「無能為力」，典源作「無能為」","story":"「無能為力」原作「無能為」","ex":["這事任何人都無能為力，你就別再白費力氣了。","這件事情已經積非成是，每個人都感到無能為力。"],"syn":["力不勝任", ㄣˊ","ㄕㄣ","ㄌㄩˇ","ㄅㄧㄥ"],"py":"lín shēn lǚ bīng","st":17,"m":0,"ref":"臨深履薄","id":5138},{"zh":"臨深履薄","zhu":["ㄌㄧㄣˊ","ㄕㄣ","ㄌㄩˇ","ㄅㄛˊ"],"py":"lín shēn lǚ bó","st":17,"m":1,"sem":"比喻戒慎恐懼，十分小心。","def":"臨，靠近。履，踩踏。「臨深履薄」指走近深淵，踩在薄冰上。比喻戒慎恐懼，十分小心。語本《詩經．小雅．小旻》。 △「如臨深淵」、「如履薄冰」、「暴虎馮河」、「戰戰兢兢」","story":"「臨深履薄」是指像走近深淵、踩在薄冰上，十分小心，出自於《詩經．小雅．小旻》","ex":["儘管身居高位，他的處事仍如臨深履薄，絲毫不敢大意。","初到新環境，凡事皆當臨深履薄，仔細觀察，再作打算。"],"syn":["小心翼翼","如履薄冰","如臨深淵","朝乾夕愓"],"lv":3,"id":5139},{"zh":"臨淵之羨","zhu":["ㄌㄧㄣˊ","ㄩㄢ","ㄓ","ㄒㄧㄢˋ"],"py":"lín yuān zhī xiàn","st":17,"m":0,"ref":"臨淵羨魚","id":5140},{"zh":"臨淵履冰","zhu":["ㄌㄧㄣˊ","ㄩㄢ","ㄌㄩˇ","ㄅㄧㄥ"],"py":"lín yuān lǚ bīng","st":17,"m":0,"ref":"臨深履薄","id":5141},{"zh":"臨淵結網","zhu":["ㄌㄧㄣˊ","ㄩㄢ","ㄐㄧㄝˊ","ㄨㄤˇ"],"py":"lín yuān jié wǎng","st":17,"m":0,"ref":"臨淵羨魚","id":5142},{"zh":"臨淵羨魚","zhu":["ㄌㄧㄣˊ","ㄩㄢ","ㄒㄧㄢˋ","ㄩˊ"],"py":"lín yuān xiàn yú","st":17,"m":1,"sem":"比喻雖有欲望，卻沒有實際行動。","def":"站在水邊想得到魚","story":"「臨淵羨魚」原或作「臨河欲魚」","ex":["考試想得第一名，卻止於臨淵羨魚，那麼最終將只是妄想。","與其臨淵羨魚，不如退而結網，唯有動手去做，才會有收穫。"],"syn":[],"lv":3,"id":5143},{"zh":"臨渴之掘","zhu":["ㄌㄧㄣˊ","ㄎㄜˇ","ㄓ","ㄐㄩㄝˊ"],"py":"lín kě zhī jué","st":17,"m":0,"ref":"臨渴掘井","id":5144},{"zh":"臨渴掘井","zhu":["ㄌㄧㄣˊ","ㄎㄜˇ","ㄐㄩㄝˊ","ㄐㄧㄥˇ"],"py":"lín kě jué jǐng","st":17,"m":1,"sem":"比喻事到臨頭才著手準備，為時已晚，無濟於事。","def":"等到口渴時才挖井取水","story":"「臨渴掘井」原作「渴而穿井」","ex":["這種臨渴掘井的作法，怎麼能周全呢？","與其迫在眉睫才臨渴掘井，不如早點準備，免得慌亂。"],"syn":["江心補漏","鬥而鑄錐","臨陣磨槍"],"lv":3,"id":5145},{"zh":"臨渴穿井","zhu":["ㄌㄧㄣˊ","ㄎㄜˇ","ㄔㄨㄢ","ㄐㄧㄥˇ"],"py":"lín kě chuān jǐng","st":17,"m":0,"ref":"臨渴掘井","id":5146},{"zh":"舉一反三","zhu":["ㄐㄩˇ","ㄧ","ㄈㄢˇ","ㄙㄢ"],"py":"jǔ yī fǎn sān","st":17,"m":1,"sem":"形容人於學習中善於觸類旁通。褒義。","def":"反，推論。「舉一反三」指從一件事情類推，而知道其他同類的事情。語本《論語．述而》。後用「舉一反三」形容人於學習中善於觸類旁通。 △「聞一知十」","story":"在《論語．述而》篇中，孔子曾說過他教導學生的方法，十分重視求知動機和啟發，他要學生主動地去思辨事理，而不只是被動地依循或死記","ex":["凡事能舉一反三，正是他學習快速的原因。","真正聰敏的人，往往能告往知來，舉一反三。"],"syn":["聞一知十","觸類旁通"],"lv":1,"id":5147},{"zh":"舉案齊眉","zhu":["ㄐㄩˇ","ㄢˋ","ㄑㄧˊ","ㄇㄟˊ"],"py":"jǔ àn qí méi","st":17,"m":1,"sem":"比喻夫妻相敬如賓。褒義。","def":"將放置飯菜的木盤高舉，與眉平齊，為東漢孟光對其夫梁鴻敬愛的表示","story":"東漢有個讀書人梁鴻，個性耿介","ex":["夫妻之間能舉案齊眉，更見一份親密。","祝每對新人從此舉案齊眉，互敬互諒，共築美滿家庭。"],"syn":["相敬如賓","魚水和諧","琴瑟和鳴"],"lv":3,"id":5148},{"zh":"舉棋不定","zhu":["ㄐㄩˇ","ㄑㄧˊ","ㄅㄨˋ","ㄉㄧㄥˋ"],"py":"jǔ qí bù dìng","st":17,"m":1,"sem":"拿著棋子，不能決定下一步怎樣下。＆比喻做事猶豫不決，拿不定主意。","def":"本指拿著棋子，不能決定下一步怎樣下","story":"「舉棋不定」本指下棋時，不能決定下一步怎樣下","ex":["正式棋賽，對弈者舉棋不定，也是要扣時間的。","請你快走下一步，別老是舉棋不定，否則這盤棋下不完了。"],"syn":["猶豫不決","優柔寡斷"],"lv":1,"id":5149},{"zh":"舉目無依","zhu":["ㄐㄩˇ","ㄇㄨˋ","ㄨˊ","ㄧ"],"py":"jǔ mù wú yī","st":17,"m":0,"ref":"舉目無親","id":5150},{"zh":"舉目無相識","zhu":["ㄐㄩˇ","ㄇㄨˋ","ㄨˊ","ㄒㄧㄤ","ㄕˋ"],"py":"jǔ mù wú xiāng shì","st":17,"m":0,"ref":"舉目無親","id":5151},{"zh":"舉目無親","zhu":["ㄐㄩˇ","ㄇㄨˋ","ㄨˊ","ㄑㄧㄣ"],"py":"jǔ mù wú qīn","st":17,"m":1,"sem":"指孤單無依。","def":"放眼望去，沒有一個親人","story":"《太平廣記》是李昉等人奉宋太宗敕命編著的大型類書，全書五百卷，書中保存了很多六朝志怪小說以及唐人傳奇，對於後世文學影響很大","ex":["他隻身到海外求職，舉目無親，受到委屈也只能往肚裡吞。","孤自在異國生活，因語言不通又舉目無親，他的臉上始終不見笑容。"],"syn":[],"lv":1,"id":5152},{"zh":"舉眼無相識","zhu":["ㄐㄩˇ","ㄧㄢˇ","ㄨˊ","ㄒㄧㄤ","ㄕˋ"],"py":"jǔ yǎn wú xiāng shì","st":17,"m":0,"ref":"舉目無親","id":5153},{"zh":"舉眼無親","zhu":["ㄐㄩˇ","ㄧㄢˇ","ㄨˊ","ㄑㄧㄣ"],"py":"jǔ yǎn wú qīn","st":17,"m":0,"ref":"舉目無親","id":5154},{"zh":"舉綱持領","zhu":["ㄐㄩˇ","ㄍㄤ","ㄔˊ","ㄌㄧㄥˇ"],"py":"jǔ gāng chí lǐng","st":17,"m":0,"ref":"提綱挈領","id":5155},{"zh":"舉足輕重","zhu":["ㄐㄩˇ","ㄗㄨˊ","ㄑㄧㄥ","ㄓㄨㄥˋ"],"py":"jǔ zú qīng zhòng","st":17,"m":1,"sem":"形容所居地位極為重要，一舉一動皆足以影響全局。","def":"一舉腳就會影響兩邊的輕重","story":"據《後漢書．卷二三．竇融列傳》載，更始年間，竇融據河西，後來劉玄兵敗，得知東漢光武帝劉秀在洛陽即位，而天水的隗（ㄨㄟˇ）囂這時也派人來遊說他加入，於是他與河西五郡太守商議後決定歸附漢朝，便派長史劉鈞送信到洛陽","ex":["他是政壇的大老，一言九鼎，舉足輕重。","他在公司裡具有舉足輕重的地位，可不能小看他。"],"syn":[],"lv":2,"id":5156},{"zh":"舉軍盡沒","zhu":["ㄐㄩˇ","ㄐㄩㄣ","ㄐㄧㄣˋ","ㄇㄛˋ"],"py":"jǔ jūn jìn mò","st":17,"m":0,"ref":"全軍覆沒","id":5157},{"zh":"舉隅反三","zhu":["ㄐㄩˇ","ㄩˊ","ㄈㄢˇ","ㄙㄢ"],"py":"jǔ yú fǎn sān","st":17,"m":0,"ref":"舉一反三","id":5158},{"zh":"薪桂米珠","zhu":["ㄒㄧㄣ","ㄍㄨㄟˋ","ㄇㄧˇ","ㄓㄨ"],"py":"xīn guì mǐ zhū","st":17,"m":0,"ref":"米珠薪桂","id":5159},{"zh":"虧於一簣","zhu":["ㄎㄨㄟ","ㄩˊ","ㄧ","ㄎㄨㄟˋ"],"py":"kuī yú yī kuì","st":17,"m":0,"ref":"功虧一簣","id":5160},{"zh":"螳臂拒輪","zhu":["ㄊㄤˊ","ㄅㄧˋ","ㄐㄩˋ","ㄌㄨㄣˊ"],"py":"táng bì jù lún","st":17,"m":0,"ref":"螳臂當車","id":5161},{"zh":"螳臂當車","zhu":["ㄊㄤˊ","ㄅㄧˋ","ㄉㄤ","ㄔㄜ"],"py":"táng bì dāng chē","st":17,"m":1,"sem":"比喻不自量力。","def":"當車，音ㄉㄤ ㄔㄜ，立於車道中，後世或將「當」解為「擋」之假借，讀作ㄉㄤˇ","story":"春秋時代魯國賢人顏闔很有才學，衛靈公聘他為太子的老師，但是太子仗著自己是未來的國君，不理會顏闔的管教，於是顏闔去請教衛國大夫蘧伯玉說：「如果放任太子為所欲為，未來國家就會遭殃，但是如果嚴格管教太子，又怕他懷恨在心，我該怎麼辦才好？」蘧伯玉為顏闔分析利弊，並打了這樣一個比喻：「你知道螳螂嗎？一隻螳螂站在車道中奮舉雙臂，想…","ex":["他這種螳臂當車的作法十分不智。","看他螳臂當車，力抗惡勢力，我真的由衷佩服。"],"syn":["以卵擊石","自不量力","夸父逐日","蚍蜉撼樹"],"lv":3,"id":5162},{"zh":"螳螂捕蟬","zhu":["ㄊㄤˊ","ㄌㄤˊ","ㄅㄨˇ","ㄔㄢˊ"],"py":"táng láng bǔ chán","st":17,"m":1,"sem":"比喻眼光短淺，只貪圖眼前的利益而不顧後患。","def":"螳螂只顧著捕蟬，不知有大鳥在身後正要啄食牠","story":"有一天，莊子在雕陵閒遊，看到一隻奇特的大鳥飛進別人的栗園裡，停在樹上","ex":["他一心都在算計別人，沒想到這次竟然螳螂捕蟬，被人暗算了。","做人如果太過短視近利，瞻前不顧後，就會像螳螂捕蟬一樣，招來其他的禍患。"],"syn":[],"lv":3,"id":5163},{"zh":"螳螂捕蟬，黃雀在後","zhu":["ㄊㄤˊ","ㄌㄤˊ","ㄅㄨˇ","ㄔㄢˊ","ㄏㄨㄤˊ","ㄑㄩㄝˋ","ㄗㄞˋ","ㄏㄡˋ"],"py":"táng láng bǔ chán huáng què zài hòu","st":17,"m":0,"ref":"螳螂捕蟬","id":5164},{"zh":"螳螂當車","zhu":["ㄊㄤˊ","ㄌㄤˊ","ㄉㄤ","ㄔㄜ"],"py":"táng láng dāng chē","st":17,"m":0,"ref":"螳臂當車","id":5165},{"zh":"螳螂黃雀","zhu":["ㄊㄤˊ","ㄌㄤˊ","ㄏㄨㄤˊ","ㄑㄩㄝˋ"],"py":"táng láng huáng què","st":17,"m":0,"ref":"螳螂捕蟬","id":5166},{"zh":"豁然貫通","zhu":["ㄏㄨㄛˋ","ㄖㄢˊ","ㄍㄨㄢˋ","ㄊㄨㄥ"],"py":"huò rán guàn tōng","st":17,"m":1,"sem":"因對事理領悟通曉，而能全盤理解。","def":"因對事理領悟通曉，而能全盤理解","story":"朱熹（西元１１３０∼１２００），字元晦，一字仲晦，號晦庵、晦翁，南宋婺源人","ex":["經過大師的指點，我對這套魔術的訣竅才豁然貫通。","老子「無為」的哲理經老師講解後，我便豁然貫通了。"],"syn":["恍然大悟","茅塞頓開","豁然大悟","豁然開朗"],"lv":2,"id":5167},{"zh":"豁然開朗","zhu":["ㄏㄨㄛˋ","ㄖㄢˊ","ㄎㄞ","ㄌㄤˇ"],"py":"huò rán kāi lǎng","st":17,"m":1,"sem":"眼前頓時變得開闊明亮。＆形容心境忽然變得開闊暢快。＆形容突然領悟到某個道理。","def":"眼前頓時開闊明亮起來","story":"晉朝陶潛所寫的〈桃花源記〉，內容是敘述在東晉太元年間，武陵郡有個漁夫，有一天沿著溪水划船捕漁，不知道划了多久，忽然到了一個開滿桃花、景色非常優美的地方","ex":["火車穿越山洞後，眼前豁然開朗，真是柳暗花明又一村啊！","等我們爬上山頂後，立刻豁然開朗起來，映入眼簾的是一望無際的大海。"],"syn":["恍然大悟","茅塞頓開","頓開茅塞","豁然大悟","豁然貫通"],"lv":2,"id":5168},{"zh":"豁達大度","zhu":["ㄏㄨㄛˋ","ㄉㄚˊ","ㄉㄚˋ","ㄉㄨˋ"],"py":"huò dá dà dù","st":17,"m":1,"sem":"形容心胸寬闊、度量宏大，能容人。","def":"形容心胸寬闊、度量宏大，能容人","story":"劉邦本名劉季，籍貫沛縣豐邑（地在今江蘇省豐縣一帶）","ex":["歷經官場多次起伏，他依舊豁達大度，從不以為意。","他表面
