<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>中文家族字</title>
<style>
  :root{--bg:#fff;--ink:#1a1a1a;--muted:#6b7280;--line:#e5e7eb;--brand:#0d7a6f;--brandbg:#e6f4f1;--chip:#f3f4f6}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 system-ui,"Noto Sans TC","PingFang TC",sans-serif}
  #app{max-width:1000px;margin:0 auto;padding:20px 16px 64px}
  /* 置頂固定列：標題＋搜尋，捲到哪都看得到 */
  .topbar{position:sticky;top:0;background:var(--bg);z-index:10;padding:8px 0 10px;border-bottom:1px solid var(--line)}
  .tbrow{display:flex;gap:12px;align-items:center}
  .brand{font-size:18px;font-weight:800;color:var(--brand);white-space:nowrap}
  .tbrow input{flex:1;min-width:0;font-size:20px;padding:10px 14px;border:2px solid var(--brand);border-radius:12px;outline:none}
  /* 只顯常用字開關 */
  .tbrow2{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .switch{position:relative;display:inline-block;width:40px;height:22px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;cursor:pointer;inset:0;background:#c7cbd1;border-radius:22px;transition:.15s}
  .slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked+.slider{background:var(--brand)}
  .switch input:checked+.slider:before{transform:translateX(18px)}
  .commonlabel{font-size:14px;color:var(--ink);cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px}
  .commonlabel .note{color:var(--muted);font-size:12px}
  .intro{color:var(--muted);font-size:14px;margin:12px 0 0}
  .hint{color:var(--muted);font-size:14px;margin:8px 0 0}
  .examples{margin:10px 0 0;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .examples b{font-size:14px;color:var(--muted);font-weight:600}
  .chip{cursor:pointer;border:1px solid var(--line);background:var(--chip);border-radius:999px;padding:5px 12px;font-size:16px;user-select:none}
  .chip:hover{background:var(--brandbg);border-color:var(--brand)}
  .chip.big{font-size:20px;padding:6px 14px}
  section{margin-top:22px}
  .rescount{font-size:15px;color:var(--muted);margin:2px 0 12px}
  .rescount b{color:var(--brand);font-size:18px}
  .group{margin:0 0 16px}
  .group-h{font-size:14px;color:var(--muted);margin:0 0 6px;border-left:3px solid var(--brand);padding-left:8px}
  .group-h .k{color:var(--ink);font-weight:700;font-size:18px}
  .rescount .rc-note{float:right;font-size:12px;color:var(--muted);font-weight:400}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px;margin-top:6px}
  .grid .card{min-width:0}
  .cards{display:flex;flex-wrap:wrap;gap:8px}
  .card{cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center;background:#fff}
  .card:hover{border-color:var(--brand);background:var(--brandbg)}
  .card .c{font-size:26px;line-height:1.1}
  .card .z{font-size:12px;color:var(--muted);margin-top:2px}
  .empty{color:var(--muted);padding:20px 0}
  /* 部件索引 */
  .idx-toggle{cursor:pointer;user-select:none;font-size:16px;font-weight:700;color:var(--brand);display:inline-flex;align-items:center;gap:6px}
  .idx-body{display:none;margin-top:12px}
  .idx-body.open{display:block}
  .idx-filter{font-size:16px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;width:100%;max-width:280px;margin-bottom:10px}
  .idx-sub{font-size:14px;color:var(--muted);margin:14px 0 6px;font-weight:600}
  .pchip{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 4px;text-align:center;min-width:0;display:block}
  .pchip:hover{background:var(--brandbg);border-color:var(--brand)}
  .pchip .pc{font-size:21px;line-height:1.1}
  .pchip .n{font-size:11px;color:var(--muted);display:block;margin-top:1px}
  .idxwrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:7px}
  /* 字詳情 */
  .detail{border:1px solid var(--brand);background:var(--brandbg);border-radius:12px;padding:14px 16px;margin:0 0 16px}
  .detail .big{font-size:40px;line-height:1}
  .detail .row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .detail .z{font-size:18px;color:var(--brand)}
  .detail .ids{font-size:15px;color:var(--muted);margin-top:8px}
  .detail .ids .p{cursor:pointer;color:var(--brand);border-bottom:1px dashed var(--brand)}
  .detail .close{float:right;cursor:pointer;color:var(--muted);font-size:14px}
  footer{margin-top:40px;color:var(--muted);font-size:13px;border-top:1px solid var(--line);padding-top:12px}
  .loaderr{padding:16px;border:1px solid #e33;color:#c00;border-radius:8px;background:#fff5f5}
</style>
</head>
<body>
<div id="app"><div class="loading">載入中…</div></div>
<script>
// 所有資料來自 window.DECOMP_DATA（build 產出），勿寫死在 HTML。
var IDX=null;         // part -> [chars]（一律全字池，不受開關影響；篩選在渲染時做，確保單一事實來源）
var PARTS=null;       // [{p,count,countCommon,isChar,st}]（依筆畫遞增；count=全字池、countCommon=只算常用字）
var CH=null;          // chars 字典
var PSTROKE=null;     // 偏旁筆畫
var COMMON=null;      // Set：教育部常用國字標準字體表 4808 字
var ONLY_COMMON=true; // 「只顯常用字」開關狀態，預設 true（一進來只看常用字）
var CURRENT_PART=null;// 目前查詢中的部件，供切換開關時重繪
function strokeOf(c){ return (CH[c]&&CH[c].s) || (PSTROKE&&PSTROKE[c]) || 99; }
function isCommon(c){ return !COMMON || COMMON.has(c); }

function isIDC(c){ return /[⿰-⿿]/.test(c); }
// cjkvi-ids 用了一些「佔位符」代替無法編碼的部件（圈碼②③、片假名コ、全形符號、PUA）——非真部件，一律跳過
function isJunk(c){
  var cp=c.codePointAt(0);
  return (cp>=0x2460&&cp<=0x24FF) ||   // 圈碼 ①②③…
         (cp>=0x3000&&cp<=0x303F) ||   // CJK 符號（〢…）
         (cp>=0x30A0&&cp<=0x30FF) ||   // 片假名（コ ユ…）
         (cp>=0xFF00&&cp<=0xFFEF) ||   // 全形
         (cp>=0xE000&&cp<=0xF8FF) ||   // 私用區
         (cp>=0xF0000);                // 補充私用區
}
// 部件索引「偏旁」區只顯示常見字型必渲染的碼段（避開 ext-A/B 豆腐）
function paletteOK(c){
  if(CH[c]) return true;               // 成字部件必留
  var cp=c.codePointAt(0);
  return (cp>=0x2E80&&cp<=0x2EFF) ||   // CJK 部首補充 ⺊…
         (cp>=0x2F00&&cp<=0x2FDF) ||   // 康熙部首
         (cp>=0x31C0&&cp<=0x31EF) ||   // CJK 筆畫 ㇀…
         (cp>=0x4E00&&cp<=0x9FFF);     // CJK 基本（扌氵亻糹忄阝辶…）
}
// 取一個字的頂層部件（去 IDC、去自己、去佔位垃圾、去重）
function partsOf(ch){
  var ids=(CH[ch]&&CH[ch].i)||'';
  var seen={},out=[];
  for(var i=0;i<ids.length;i++){var c=ids[i]; if(isIDC(c)||c===ch||isJunk(c)||seen[c])continue; seen[c]=1; out.push(c);}
  return out;
}
function zhuyin(ch){ var z=CH[ch]&&CH[ch].z; return (z&&z.length)?z.join('、'):''; }

function buildIndex(){
  IDX={}; var cnt={}, cntCommon={};
  for(var ch in CH){
    var ps=partsOf(ch);
    for(var i=0;i<ps.length;i++){
      var p=ps[i];
      (IDX[p]=IDX[p]||[]).push(ch);
      cnt[p]=(cnt[p]||0)+1;
      if(isCommon(ch)) cntCommon[p]=(cntCommon[p]||0)+1;
    }
  }
  PARTS=Object.keys(cnt).map(function(p){return {p:p,count:cnt[p],countCommon:cntCommon[p]||0,isChar:!!CH[p],st:strokeOf(p)};})
        .sort(function(a,b){return a.st-b.st || b.count-a.count || a.p.localeCompare(b.p);}); // 依筆畫遞增（排序固定用全字池數，切換開關不跳動）
}

function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

// 含某部件的所有字：一眼可見的整齊格子，依筆畫遞增排列
function renderResults(part){
  var full=(IDX[part]||[]);
  var list=full.filter(function(c){return !ONLY_COMMON || isCommon(c);})
               .slice().sort(function(a,b){return strokeOf(a)-strokeOf(b) || a.localeCompare(b);});
  var host=document.getElementById('results');
  if(!list.length){
    var msg='找不到含「'+esc(part)+'」的字。';
    if(ONLY_COMMON && full.length){ msg='「'+esc(part)+'」只有非常用字（'+full.length+' 個），已被「只顯常用字」隱藏。關掉開關可看到全部。'; }
    else { msg+='試試展開下方部件索引，或換一個部件。'; }
    host.innerHTML='<div class="empty">'+msg+'</div>';
    return;
  }
  var hiddenNote=(ONLY_COMMON && full.length>list.length)?('　（另有 '+(full.length-list.length)+' 個非常用字已隱藏，關掉開關可看全部 '+full.length+' 個）'):'';
  var html='<div class="rescount">含「'+esc(part)+'」的字共 <b>'+list.length+'</b> 個'
          +(CH[part]?'　（「'+esc(part)+'」注音：'+esc(zhuyin(part)||'—')+'，'+strokeOf(part)+' 畫）':'')
          +'<span class="rc-note">依筆畫排序'+hiddenNote+'</span></div>';
  html+='<div class="grid">';
  list.forEach(function(ch){
    html+='<div class="card" data-ch="'+esc(ch)+'"><div class="c">'+esc(ch)+'</div><div class="z">'+esc(zhuyin(ch)||' ')+'</div></div>';
  });
  html+='</div>';
  host.innerHTML=html;
  host.querySelectorAll('.card').forEach(function(el){el.onclick=function(){showDetail(el.getAttribute('data-ch'));};});
}

function showDetail(ch){
  if(!CH[ch]) return;
  var ids=CH[ch].i||'';
  var idsHtml=ids.split('').map(function(c){
    if(isIDC(c)) return '<span style="color:#9ca3af">'+esc(c)+'</span>';
    return '<span class="p" data-p="'+esc(c)+'">'+esc(c)+'</span>';
  }).join('');
  var d=document.getElementById('detail');
  d.style.display='block';
  d.innerHTML='<span class="close" id="dclose">✕ 關閉</span>'
    +'<div class="row"><span class="big">'+esc(ch)+'</span><span class="z">'+esc(zhuyin(ch)||'—')+'</span></div>'
    +'<div class="ids">拆解：'+idsHtml+'　（點部件可查同部件的字）</div>';
  d.querySelector('#dclose').onclick=function(){d.style.display='none';};
  d.querySelectorAll('.p').forEach(function(el){el.onclick=function(){doSearch(el.getAttribute('data-p'));};});
  d.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function collapseIndex(){
  var ib=document.getElementById('idxbody');
  if(ib&&ib.classList.contains('open')){
    ib.classList.remove('open');
    var tg=document.getElementById('idxToggle'); if(tg)tg.textContent='▸ 部件索引（可輸入的部件總表，依筆畫排序）';
  }
}
function doSearch(part){
  part=(part||'').trim();
  var box=document.getElementById('q'); if(box.value!==part) box.value=part;
  document.getElementById('detail').style.display='none';
  collapseIndex();                       // 選好部件即自動收起索引，直接看結果
  if(!part){ CURRENT_PART=null; document.getElementById('results').innerHTML='<div class="empty">在上面輸入一個部件開始查詢。</div>'; return; }
  // 只取第一個字元當部件
  CURRENT_PART=Array.from(part)[0];
  renderResults(CURRENT_PART);
}

// 部件索引（輸入資源總表）。字數統計與「只顯常用字」開關口徑一致：
// 開關開＝只算 countCommon（避免顯示 N 但點進去因過濾變空的落差）。
function renderPartIndex(filter){
  filter=(filter||'').trim();
  function n(x){ return ONLY_COMMON ? x.countCommon : x.count; }
  var chars=PARTS.filter(function(x){return x.isChar && n(x)>=2;});
  var rads =PARTS.filter(function(x){return !x.isChar && paletteOK(x.p) && n(x)>=1;});
  function chips(arr){
    if(filter){arr=arr.filter(function(x){return x.p===filter;});}
    return '<div class="idxwrap">'+arr.slice(0,600).map(function(x){
      return '<span class="pchip" data-p="'+esc(x.p)+'"><span class="pc">'+esc(x.p)+'</span><span class="n">'+n(x)+'</span></span>';
    }).join('')+'</div>'+(arr.length>600?'<div class="hint">（僅顯示前 600 個，用上方搜尋框直接查其他部件）</div>':'');
  }
  var host=document.getElementById('idxbody');
  host.innerHTML=
     '<input class="idx-filter" id="idxf" placeholder="篩選部件…" value="'+esc(filter)+'">'
    +(ONLY_COMMON?'<div class="hint">字數統計已套用「只顯常用字」，與下方查詢結果口徑一致。</div>':'')
    +'<div class="idx-sub">🈶 成字部件（本身也是字，可點看注音）— 依筆畫排序</div>'+chips(chars)
    +'<div class="idx-sub">⺊ 偏旁部件（扌氵辶阝艹…只當搜尋鍵）— 依筆畫排序</div>'+chips(rads);
  host.querySelectorAll('.pchip').forEach(function(el){el.onclick=function(){doSearch(el.getAttribute('data-p'));};});
  var f=host.querySelector('#idxf');
  f.oninput=function(){renderPartIndex(f.value); var nf=document.querySelector('#idxbody #idxf'); if(nf){nf.focus();nf.setSelectionRange(nf.value.length,nf.value.length);} };
}

function boot(){
  var d=window.DECOMP_DATA;
  if(!d||!d.chars){document.getElementById('app').innerHTML='<div class="loaderr">⚠ 無資料</div>';return;}
  CH=d.chars; PSTROKE=d.pstroke||{};
  COMMON=new Set(Array.from(d.common||''));   // 教育部常用國字標準字體表，供「只顯常用字」開關
  buildIndex();                                // 需在 COMMON 就緒後才算，PARTS 才會有正確的 countCommon
  var m=d.meta||{};
  var solitary=m.solitaryCount||0;
  var commonCount=m.commonCount||COMMON.size;
  var commonHit=m.commonHit||COMMON.size;
  document.getElementById('app').innerHTML=
     '<div class="topbar"><div class="tbrow"><span class="brand">中文家族字</span>'
    +'<input id="q" inputmode="text" autocomplete="off" placeholder="輸入一個部件，例如：是、青、扌、氵"></div>'
    +'<div class="tbrow2"><label class="commonlabel" for="onlyCommon"><span class="switch"><input type="checkbox" id="onlyCommon" checked><span class="slider"></span></span>'
      +'只顯常用字（教育部 4,808 字）<span class="note">關掉可看全部 '+(m.charCount||0)+' 字（含罕用字）</span></label></div>'
    +'<div class="examples"><b>試試：</b>'
      +['是','青','包','扌','氵','木','古','侖'].map(function(p){return '<span class="chip big" data-p="'+p+'">'+p+'</span>';}).join('')
    +'</div></div>'
    +'<p class="intro">輸入一個部件，一眼看到所有含它的字（依筆畫排列）。例如查「是」→ 提、堤、題、匙…</p>'
    +'<section><span class="idx-toggle" id="idxToggle">▸ 部件索引（可輸入的部件總表，依筆畫排序）</span><div class="idx-body" id="idxbody"></div></section>'
    +'<div id="detail" class="detail" style="display:none"></div>'
    +'<section id="results"><div class="empty">在上面輸入一個部件開始查詢。</div></section>'
    +'<footer>字集：教育部《重編國語辭典修訂本》單字 <b>'+(m.charCount||0)+'</b> 字（其中獨體字 '+solitary+' 個），純繁體無簡體；'
      +'常用字：教育部《常用國字標準字體表》<b>'+commonCount+'</b> 字（其中 '+commonHit+' 字落在本字集內，供「只顯常用字」開關使用）；'
      +'拆解：CHISE／cjkvi-ids。部件索引（輸入資源）共 <b>'+PARTS.length+'</b> 個。<br>'
      +'口徑：分組鍵為「拆解後的另一部件」，屬識字／檢索輔助，非文字學嚴格聲符考據。資料時間 '+esc((m.generatedAt||'').slice(0,10))+'。</footer>';

  document.getElementById('q').addEventListener('input',function(e){doSearch(e.target.value);});
  document.querySelectorAll('.chip[data-p]').forEach(function(el){el.onclick=function(){doSearch(el.getAttribute('data-p'));};});
  var tog=document.getElementById('idxToggle'), body=document.getElementById('idxbody'), built=false;
  tog.onclick=function(){
    var open=body.classList.toggle('open');
    tog.textContent=(open?'▾':'▸')+' 部件索引（可輸入的部件總表，依筆畫排序）';
    if(open&&!built){renderPartIndex('');built=true;}
  };
  // 「只顯常用字」開關：即時生效，無需重載——重繪目前查詢結果，索引若已建過也重繪（維持展開狀態）
  document.getElementById('onlyCommon').addEventListener('change',function(e){
    ONLY_COMMON=e.target.checked;
    if(CURRENT_PART){ renderResults(CURRENT_PART); }
    if(built){ renderPartIndex(''); }
