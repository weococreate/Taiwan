<style>
  :root{
    --bg:#f3f6f2; --panel:#ffffff; --ink:#1e2a22; --muted:#6a7a70; --line:#e0e8e1;
    --accent:#2e7d4f; --accent2:#c47f2a;
    --g1:#2e7d32; --g3:#1565c0; --g4:#c62828; --g5:#212121; --gx:#9e9e9e;
    --r-n:#4e79a7; --r-z:#59a14f; --r-c:#e1a54f; --r-s:#e15759; --r-k:#b07aa1; --r-e:#76b7b2; --r-i:#8c8c8c;
    --fam:#d9007e;
    --shadow:0 2px 10px rgba(20,50,30,.09);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Noto Sans TC",system-ui,-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55}
  header{background:linear-gradient(120deg,#1f5136,#2e7d4f);color:#fff;padding:14px 20px;position:relative}
  header h1{margin:0;font-size:20px;font-weight:800;letter-spacing:.5px}
  header .sub{font-size:12px;opacity:.92;margin-top:3px}
  header .meta{font-size:11px;opacity:.78;margin-top:2px}
  /* 語言切換 */
  .langsw{position:absolute;top:12px;right:16px;display:flex;gap:0;border:1px solid rgba(255,255,255,.45);border-radius:8px;overflow:hidden}
  .langsw button{border:none;background:transparent;color:#fff;font-size:12px;font-weight:700;padding:5px 10px;cursor:pointer;opacity:.75}
  .langsw button+button{border-left:1px solid rgba(255,255,255,.35)}
  .langsw button.on{background:rgba(255,255,255,.92);color:#1f5136;opacity:1}
  @media(max-width:860px){.langsw{position:static;margin-top:6px;display:inline-flex}}
  .wrap{display:flex;gap:0;height:calc(100vh - 76px);min-height:520px;position:relative}
  @media(max-width:860px){.wrap{flex-direction:column;height:auto}}
  .side{width:400px;min-width:344px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden}
  @media(max-width:860px){.side{width:100%;min-width:0;height:auto;max-height:none;border-right:none;border-bottom:1px solid var(--line)}}
  /* 親子樂齡模式大按鈕 */
  .familybar{padding:9px 12px;border-bottom:1px solid var(--line);background:#fff}
  .familybar button{width:100%;padding:10px;border:2px solid var(--fam);border-radius:11px;background:#fff;
    color:var(--fam);font-size:14.5px;font-weight:800;cursor:pointer;letter-spacing:.3px}
  .familybar button.on{background:var(--fam);color:#fff}
  .familybar .hint{font-size:10.5px;color:var(--muted);margin-top:4px;text-align:center}
  .controls{padding:10px 12px;border-bottom:1px solid var(--line);background:#fafdfa}
  .typechips{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px}
  .typechips .chip{border-left-width:1px}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
  .chip{font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--line);
    background:#fff;cursor:pointer;user-select:none;white-space:nowrap;color:var(--muted);text-align:center}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .row input[type=text]{flex:1;min-width:120px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px}
  .row select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;background:#fff}
  .count{font-size:11px;color:var(--muted);margin-top:6px}
  .modeswitch{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 12px;border-bottom:1px solid var(--line);background:#fff}
  .modeswitch button{padding:9px 4px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;font-size:12.5px;font-weight:800;color:var(--muted)}
  .modeswitch button.on{background:linear-gradient(120deg,#1f5136,#2e7d4f);color:#fff;border-color:var(--accent);box-shadow:var(--shadow)}
  .rank-tabs{display:flex;gap:5px;flex-wrap:wrap;padding:8px 10px;border-bottom:1px solid var(--line);background:#fafdfa}
  .rank-tabs button{padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;font-size:11.5px}
  .rank-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .list{overflow-y:auto;flex:1;padding:6px}
  @media(max-width:860px){.list{max-height:46vh}}
  .card{padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;cursor:pointer;
    background:#fff;transition:.12s;position:relative;border-left-width:5px}
  .card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(46,125,79,.18)}
  .card .nm{font-weight:700;font-size:13.5px;padding-right:56px}
  .card .tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;color:#fff;vertical-align:middle;margin-left:2px}
  .card .specs{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .card .elev{position:absolute;top:9px;right:10px;font-weight:800;font-size:13px;color:var(--accent)}
  .card .elev small{font-weight:500;color:var(--muted);font-size:9px;display:block;text-align:right}
  .card .fam{position:absolute;bottom:8px;right:10px;font-size:14px}
  .badge{font-size:9.5px;padding:1px 5px;border-radius:4px;background:#eef6ef;color:#2e7d32;border:1px solid #c9e3cd}
  .badge.warn{background:#fff3d6;color:#9a6b00;border-color:#f0dca0}
  .badge.fam{background:#ffe3f1;color:var(--fam);border-color:#f4b6d6}
  .mapwrap{flex:1;position:relative;min-height:360px}
  #map{position:absolute;inset:0}
  @media(max-width:860px){.mapwrap{height:52vh}}
  .legend{position:absolute;bottom:12px;left:12px;z-index:500;background:rgba(255,255,255,.94);
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:11px;box-shadow:var(--shadow)}
  .legend b{font-size:11px}
  .legend .lg{display:flex;align-items:center;gap:5px;margin-top:3px}
  .legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  .fab{position:absolute;top:10px;right:10px;z-index:500;display:flex;gap:6px;flex-direction:column;width:128px}
  .fab button{width:100%;text-align:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:12px;
    cursor:pointer;box-shadow:var(--shadow);font-weight:700;color:var(--ink)}
  .fab button:hover{border-color:var(--accent);color:var(--accent)}
  .fab button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .side-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 12px;border-top:1px solid var(--line);background:#fafdfa}
  .side-actions button{padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink)}
  .side-actions button:hover{border-color:var(--accent);color:var(--accent)}
  .detail{position:absolute;top:0;right:0;height:100%;width:352px;background:var(--panel);z-index:600;
    border-left:1px solid var(--line);box-shadow:-4px 0 18px rgba(20,50,30,.12);
    transform:translateX(105%);transition:.22s;overflow-y:auto;padding:16px}
  .detail.open{transform:translateX(0)}
  @media(max-width:860px){.detail{width:100%}}
  .detail h2{margin:0 26px 2px 0;font-size:18px}
  .detail .x{position:absolute;top:12px;right:12px;border:none;background:#eef2ee;border-radius:8px;
    width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:3px 12px;margin:10px 0;font-size:13px}
  .kv dt{color:var(--muted)}
  .kv dd{margin:0;font-weight:600;text-align:right}
  .sec{border-top:1px solid var(--line);margin-top:12px;padding-top:10px}
  .sec h3{margin:0 0 6px;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.5px}
  .permit{border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700}
  .permit.free{background:#eef6ef;border:1px solid #c9e3cd;color:#2e7d32}
  .permit.need{background:#fdf0e6;border:1px solid #f0cba0;color:#b5651d}
  .fambox{background:#fff0f7;border:1px solid #f4b6d6;border-radius:10px;padding:10px 12px}
  .fambox .fg{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:12.5px}
  .fambox .fg dt{color:var(--fam);font-weight:700}
  .fambox .fg dd{margin:0}
  .fambox .famtag{display:inline-block;background:#0a66c2;color:#fff;font-size:11.5px;font-weight:700;
    padding:3px 9px;border-radius:8px;margin-bottom:7px}
  .btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .btns button,.btns a{flex:1;min-width:96px;text-align:center;padding:8px;border-radius:8px;border:1px solid var(--line);
    background:#fff;cursor:pointer;font-size:12px;font-weight:700;text-decoration:none;color:var(--ink)}
  .btns .primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btns button:hover{border-color:var(--accent)}
  .wx{font-size:12px;color:var(--muted)}
  .wx .big{font-size:18px;font-weight:800;color:var(--ink)}
  .note{font-size:10.5px;color:var(--muted);margin-top:4px}
  .modal{position:fixed;inset:0;background:rgba(15,30,20,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
  .modal.open{display:flex}
  .modal .box{background:#fff;border-radius:14px;max-width:840px;width:100%;max-height:86vh;overflow-y:auto;padding:20px;position:relative}
  .modal .x{position:absolute;top:12px;right:12px;border:none;background:#eef2ee;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:17px}
  .modal h2{margin:0 0 12px;font-size:18px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--muted);font-weight:700;font-size:11px;position:sticky;top:0;background:#fff}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .cmp-rm{color:var(--g4);cursor:pointer;font-weight:700}
  .empty{color:var(--muted);font-size:13px;padding:20px;text-align:center}
  .foot{font-size:10.5px;color:var(--muted);padding:6px 12px;border-top:1px solid var(--line);background:#fafdfa}
  .prog{padding:8px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);background:#fafdfa}
  .prog b{color:var(--accent);font-size:15px}
  .progbar{height:8px;border-radius:5px;background:#e6efe7;overflow:hidden;margin-top:5px}
  .progbar i{display:block;height:100%;background:var(--accent)}
  /* 親子樂齡模式：加大字級、簡化 */
  body.family-mode{font-size:15.5px}
  body.family-mode .card .nm{font-size:15px}
  body.family-mode .card .specs{font-size:12.5px}
  body.family-mode header{background:linear-gradient(120deg,#a30060,#d9007e)}
  .disc{background:#fffbe8;border:1px solid #f0e2a8;color:#7a6410;border-radius:8px;padding:7px 10px;font-size:11px;margin:8px 12px 0}
</style>

<header>

  </div>
</header>

<div class="wrap">
  <div class="side">
    <div class="familybar">
      <button id="famBtn">👨‍👩‍👧 親子樂齡模式</button>

    </div>
    <div class="controls">
      <div class="typechips" id="typeChips"></div>
      <div class="chips" id="regionChips"></div>
      <div class="row">
        <input type="text" id="q" placeholder="搜尋山名／步道…">
        <select id="sort">
          <option value="elev">標高▼</option>
          <option value="elevAsc">標高▲</option>
          <option value="level">難度▼</option>
          <option value="dist">里程▼</option>
          <option value="name">名稱</option>
        </select>
      </div>
      <div class="count" id="count"></div>
    </div>
    <div class="modeswitch">
      <button data-mode="list" class="on">🗺️ 清單</button>
      <button data-mode="rank">🏆 排行榜</button>
      <button data-mode="progress">✅ 完登進度</button>
    </div>
    <div class="rank-tabs" id="rankTabs" style="display:none"></div>
    <div class="prog" id="progBox" style="display:none"></div>
    <div class="list" id="list"></div>
    <div class="side-actions">
      <button id="btnCmp">⚖️ 比較 (<span id="cmpN">0</span>)</button>
      <button id="btnWish">⭐ 願望 (<span id="wishN">0</span>)</button>
    </div>
    <div class="foot" id="foot">資料載入中…</div>
  </div>

  <div class="mapwrap">
    <div id="map"></div>
    <div class="fab">
      <button id="fabTrack">🥾 有軌跡圖</button>
      <button id="fabFree">🆓 免申請</button>
      <button id="fabFam">👨‍👩‍👧 親子樂齡</button>
      <button id="fabAcc">♿ 樂齡無障礙</button>
    </div>
    <div class="legend" id="legend">
      <b>步道難度</b>
      <div class="lg"><span class="sw" style="background:var(--g1)"></span>1–2級 郊山健行</div>
      <div class="lg"><span class="sw" style="background:var(--g3)"></span>3級 中級山</div>
      <div class="lg"><span class="sw" style="background:var(--g4)"></span>4級 高山百岳</div>
      <div class="lg"><span class="sw" style="background:var(--g5)"></span>5級 技術路線</div>
      <div class="lg" style="margin-top:4px"><span style="color:#0a66c2;font-weight:700">♿</span> 樂齡無障礙　<span style="color:#d9007e;font-weight:700">👨‍👩‍👧</span> 親子友善</div>
    </div>
  </div>

  <div class="detail" id="detail"></div>
</div>

<div class="modal" id="cmpModal"><div class="box">
  <button class="x" data-close>×</button>
  <h2 id="cmpTitle">⚖️ 路線比較</h2>
  <div id="cmpBody"></div>
</div></div>

<div class="modal" id="wishModal"><div class="box">
  <button class="x" data-close>×</button>
  <h2 id="wishTitle">⭐ 我的願望清單</h2>
  <div id="wishBody"></div>
</div></div>

<div class="disc" id="disc">⚠️ 本站資訊僅供行程規劃參考。登山有其風險，實際路況、天氣、步道開放與申請規定請以中央氣象署、各國家公園、林業保育署官方公告為準。</div>

function t(k){var d=I18N[state.lang]||I18N.zh;return (k in d)?d[k]:I18N.zh[k];}
function fmt(s,o){return s.replace(/\{(\w+)\}/g,function(_,k){return o[k];});}
function regionName(r){if(r==='全部')return t('typeAll');var m=t('regions');return (m&&m[r])||r;}
function countyName(c){if(!c)return c;
  if(state.lang==='en')return COUNTY_EN[c]||c;
  if(state.lang==='ja')return c.replace('臺','台');
  if(state.lang==='ko')return COUNTY_KO[c]||c;
  return c;}
function gradeName(g){if(!g)return g;var m=t('grades');return (m&&m[g])||g;}
function rangeName(r){if(!r)return r;var m=t('ranges');return (m&&m[r])||r;}
function permitName(p){if(!p)return p;var m=t('permits');return (m&&m[p])||p;}

var GEO,INFO,ITEMS,BYID={},map,markerLayer,trackLayer;
var TYPES={baiyue:{color:'--g4'},xiaobaiyue:{color:'--r-z'},trail:{color:'--r-e'},citytrail:{color:'--r-n'}};
var REGION_ORDER=['北北基桃','竹苗','中彰投','雲嘉南','高屏','宜花東','離島','其他'];
var REGION_COLORS={'北北基桃':'--r-n','竹苗':'--r-c','中彰投':'--r-z','雲嘉南':'--r-s','高屏':'--r-k','宜花東':'--r-e','離島':'--r-i','其他':'--r-i'};
var LEVEL_COLORS={1:'#2e7d32',2:'#2e7d32',3:'#1565c0',4:'#c62828',5:'#212121',0:'#9e9e9e'};
var state={type:'全部',region:'全部',q:'',track:false,free:false,fam:false,acc:false,familyMode:false,sort:'elev',mode:'list',
  lang:localStorage.getItem('taiwantrails_lang')||'zh'};
if(!I18N[state.lang])state.lang='zh';
var cmp=[], wish=[], done=[];

function cv(v){return getComputedStyle(document.documentElement).getPropertyValue(v||'--r-i').trim();}
function rc(region){return cv(REGION_COLORS[region]||'--r-i');}
function lc(lv){return LEVEL_COLORS[lv||0]||'#9e9e9e';}
function info(a){return (INFO&&INFO.items)?(INFO.items[a.id]||null):null;}
function typeLabel(a){return t('type_'+a.type)||a.type;}
function isFam(a){var inf=info(a);return a.fam===true||(inf&&inf.family_friendly===true);}
function famLevel(a){var inf=info(a);return (inf&&inf.family&&inf.family.level)||(isFam(a)?'family':null);} // 'wheelchair'♿ / 'family'👨‍👩‍👧
function isAcc(a){return famLevel(a)==='wheelchair';} // 樂齡無障礙（輪椅／推車可）
function famBadge(a){var lv=famLevel(a);return lv==='wheelchair'?t('famAcc'):(lv==='family'?t('famKid'):'');}
function famIcon(a){var lv=famLevel(a);return lv==='wheelchair'?'♿':(lv==='family'?'👨‍👩‍👧':'');}
function isFree(p){return typeof p==='string'&&p.indexOf('免申請')===0;} // 判斷用原始資料字串（「免申請」或「免申請（需門票）」都算免登山申請）
function needPermit(a){var inf=info(a);if(inf&&inf.permit)return !isFree(inf.permit);return a.type==='baiyue';}

function boot(){
  GEO=window.TAIWANTRAILS_GEO||{items:[],generated:'—',count:0};
  INFO=window.TAIWANTRAILS_INFO||{items:{}};
  ITEMS=GEO.items||[];
  ITEMS.forEach(function(a){BYID[a.id]=a;});
  wish=JSON.parse(localStorage.getItem('taiwantrails_wish')||'[]');
  done=JSON.parse(localStorage.getItem('taiwantrails_done')||'[]');
  initMap(); bindUI(); applyLang(); updBadges();
}

/* 套用語言：靜態文字＋動態區塊全數重繪 */

  document.getElementById('btnWish').innerHTML=t('btnWish')+' (<span id="wishN">'+wish.length+'</span>)';
  document.getElementById('fabTrack').textContent=t('fabTrack');
  document.getElementById('fabFree').textContent=t('fabFree');
  document.getElementById('fabFam').textContent=t('fabFam');
  document.getElementById('fabAcc').textContent=t('fabAcc');

    '<b>'+t('legendTitle')+'</b>'+
    '<div class="lg"><span class="sw" style="background:var(--g1)"></span>'+t('leg12')+'</div>'+
    '<div class="lg"><span class="sw" style="background:var(--g3)"></span>'+t('leg3')+'</div>'+
    '<div class="lg"><span class="sw" style="background:var(--g4)"></span>'+t('leg4')+'</div>'+
    '<div class="lg"><span class="sw" style="background:var(--g5)"></span>'+t('leg5')+'</div>'+
    '<div class="lg" style="margin-top:4px"><span style="color:#0a66c2;font-weight:700">♿</span> '+t('legAcc')+'　<span style="color:#d9007e;font-weight:700">👨‍👩‍👧</span> '+t('legKid')+'</div>';
  document.getElementById('cmpTitle').textContent=t('cmpTitle');
  document.getElementById('wishTitle').textContent=t('wishTitle');
  [].forEach.call(document.querySelectorAll('#langSw button'),function(b){b.classList.toggle('on',b.dataset.lang===lang);});
  if(GEO&&ITEMS){
    var nb=ITEMS.filter(function(a){return a.type==='baiyue';}).length;
    var nx=ITEMS.filter(function(a){return a.type==='xiaobaiyue';}).length;
    var nt=ITEMS.filter(function(a){return a.type==='trail';}).length;
    var nc=ITEMS.filter(function(a){return a.type==='citytrail';}).length;
    document.getElementById('hmeta').textContent=fmt(t('meta'),
      {d:GEO.generated||'—',b:nb,x:nx,t:nt,c:nc,f:ITEMS.filter(isFam).length,a:ITEMS.filter(isAcc).length});
    document.getElementById('foot').innerHTML=t('foot');
    buildTypeChips(); buildRegionChips(); render();
    if(curDetail)openDetail(curDetail);
    if(document.getElementById('cmpModal').classList.contains('open'))openCmp();
    if(document.getElementById('wishModal').classList.contains('open'))openWish();
  }
}

function buildTypeChips(){
  var el=document.getElementById('typeChips');el.innerHTML='';
  var types=['全部'].concat(Object.keys(TYPES).filter(function(t2){return ITEMS.some(function(a){return a.type===t2;});}));
  types.forEach(function(t2){
    var c=document.createElement('span');c.className='chip'+(t2===state.type?' on':'');
    var n=t2==='全部'?ITEMS.length:ITEMS.filter(function(a){return a.type===t2;}).length;
    c.textContent=(t2==='全部'?t('typeAll'):t('type_'+t2))+' '+n;
    c.onclick=function(){state.type=t2;buildTypeChips();render();};
    el.appendChild(c);
  });
}
function buildRegionChips(){
  var el=document.getElementById('regionChips');el.innerHTML='';
  var regs=['全部'].concat(REGION_ORDER.filter(function(r){return ITEMS.some(function(a){return a.region===r;});}));
  regs.forEach(function(r){
    var c=document.createElement('span');c.className='chip'+(r===state.region?' on':'');
    var n=r==='全部'?ITEMS.length:ITEMS.filter(function(a){return a.region===r;}).length;
    c.textContent=regionName(r)+' '+n;
    if(r!=='全部')c.style.borderLeft='4px solid '+rc(r);
    c.onclick=function(){state.region=r;buildRegionChips();render();fitRegion(r);};
    el.appendChild(c);
  });
}

function initMap(){
  map=L.map('map',{zoomControl:true}).setView([23.7,120.95],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap',maxZoom:17}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
  trackLayer=L.layerGroup().addTo(map);
}

function bindUI(){
  document.getElementById('q').oninput=function(e){state.q=e.target.value.trim().toLowerCase();render();};
  document.getElementById('sort').onchange=function(e){state.sort=e.target.value;render();};
  // 語言切換：中／英／日
  [].forEach.call(document.querySelectorAll('#langSw button'),function(b){b.onclick=function(){
    if(state.lang===b.dataset.lang)return;
    state.lang=b.dataset.lang;
    localStorage.setItem('taiwantrails_lang',state.lang);
    applyLang();
  };});
  function fab(id,key){var el=document.getElementById(id);el.onclick=function(){state[key]=!state[key];el.classList.toggle('on',state[key]);render();};}
  fab('fabTrack','track'); fab('fabFree','free'); fab('fabFam','fam'); fab('fabAcc','acc');
  document.getElementById('famBtn').onclick=toggleFamilyMode;
  [].forEach.call(document.querySelectorAll('.modeswitch button'),function(b){b.onclick=function(){
    state.mode=b.dataset.mode;
    [].forEach.call(document.querySelectorAll('.modeswitch button'),function(x){x.classList.remove('on');});b.classList.add('on');
    document.getElementById('rankTabs').style.display=state.mode==='rank'?'flex':'none';
    document.getElementById('progBox').style.display=state.mode==='progress'?'block':'none';
    render();
  };});
  document.getElementById('btnCmp').onclick=openCmp;
  document.getElementById('btnWish').onclick=openWish;
  [].forEach.call(document.querySelectorAll('[data-close]'),function(b){b.onclick=function(){b.closest('.modal').classList.remove('open');};});
  [].forEach.call(document.querySelectorAll('.modal'),function(m){m.onclick=function(e){if(e.target===m)m.classList.remove('open');};});
}

function toggleFamilyMode(){
  state.familyMode=!state.familyMode;
  document.body.classList.toggle('family-mode',state.familyMode);
  document.getElementById('famBtn').classList.toggle('on',state.familyMode);
  if(state.familyMode){state.fam=true;document.getElementById('fabFam').classList.add('on');state.type='全部';buildTypeChips();}
  else{state.fam=false;document.getElementById('fabFam').classList.remove('on');}
  render();
}

function filtered(){
  return ITEMS.filter(function(a){
    if(state.familyMode&&!isFam(a))return false;
    if(state.type!=='全部'&&a.type!==state.type)return false;
    if(state.region!=='全部'&&a.region!==state.region)return false;
    if(state.track&&!a.hasTrack)return false;
    if(state.free&&needPermit(a))return false;
    if(state.fam&&!isFam(a))return false;
    if(state.acc&&!isAcc(a))return false;
    if(state.q){var s=(a.name+' '+(a.range||'')+' '+(a.county||'')+' '+(a.district||'')).toLowerCase();if(s.indexOf(state.q)<0)return false;}
    return true;
  });
}
function dist(a){var inf=info(a);return inf&&inf.distance_km!=null?inf.distance_km:(a.length_km!=null?a.length_km:null);}
function sortItems(arr){
  var s=state.sort;
  return arr.slice().sort(function(a,b){
    if(s==='name')return a.name.localeCompare(b.name,'zh-Hant');
    if(s==='elevAsc')return (a.elev||0)-(b.elev||0);
    if(s==='level')return (b.level||0)-(a.level||0);
    if(s==='dist'){var da=dist(a),db=dist(b);if(da==null&&db==null)return (b.elev||0)-(a.elev||0);if(da==null)return 1;if(db==null)return -1;return db-da;}
    return (b.elev||0)-(a.elev||0); // elev desc
  });
}

function render(){
  var arr=sortItems(filtered());
  var list=document.getElementById('list');
  if(state.mode==='rank'){renderRank(list);}
  else if(state.mode==='progress'){renderProgress(list);}
  else{
    list.innerHTML='';
    document.getElementById('count').textContent=fmt(t('countShow'),{n:arr.length});
    if(!arr.length){list.innerHTML='<div class="empty">'+t('emptyList')+'</div>';}
    arr.slice(0,500).forEach(function(a){list.appendChild(cardEl(a));});
    if(arr.length>500){var m=document.createElement('div');m.className='count';m.style.textAlign='center';m.textContent=t('over500');list.appendChild(m);}
  }
  markerLayer.clearLayers();
  arr.forEach(function(a){
    var fam=isFam(a),acc=isAcc(a);
    var r=a.type==='baiyue'?6:(a.type==='xiaobaiyue'?5:4);
    var m=L.circleMarker([a.lat,a.lng],{radius:r,color:acc?'#0a66c2':(fam?'#d9007e':'#fff'),weight:fam?2:1,
      fillColor:lc(a.level),fillOpacity:.85});
    m.bindTooltip(a.name+(a.elev?' '+a.elev+'m':'')+(fam?' '+famIcon(a):''),{direction:'top'});
    m.on('click',function(){openDetail(a);});
    markerLayer.addLayer(m);
  });
}

function levelName(lv){return {1:t('level1'),2:t('level2'),3:t('level3'),4:t('level4'),5:t('level5')}[lv]||t('levelNone');}
function cardEl(a){
  var d=document.createElement('div');d.className='card';d.dataset.id=a.id;
  d.style.borderLeftColor=lc(a.level);
  var fam=isFam(a), inf=info(a), dk=dist(a);
  d.innerHTML=
    '<div class="nm">'+a.name+
      ' <span class="tag" style="background:'+cv((TYPES[a.type]||{}).color)+'">'+typeLabel(a)+'</span>'+
      (a.rank?' <span class="badge">'+t('baiyueRank')+a.rank+'</span>':'')+
      (fam?' <span class="badge fam">'+famBadge(a)+'</span>':'')+'</div>'+
    '<div class="specs">'+
      (a.range?rangeName(a.range):(a.district?countyName(a.county)+'・'+a.district:(countyName(a.county)||'')))+
      (a.grade?'　'+gradeName(a.grade):(a.level?'　'+levelName(a.level):''))+
      (dk!=null?'　'+t('specDist')+' '+dk+'km':'')+
      (inf&&inf.permit?'　'+(isFree(inf.permit)?t('freeShort'):t('permitShort')):'')+
    '</div>'+
    (a.elev?'<div class="elev">'+a.elev+'<small>'+t('elevUnit')+'</small></div>':'')+
    (fam?'<div class="fam">'+famIcon(a)+'</div>':'');
  d.onclick=function(){openDetail(a);};
  return d;
}

var curDetail=null;
function openDetail(a){
  curDetail=a;
  [].forEach.call(document.querySelectorAll('.card'),function(c){c.classList.toggle('sel',c.dataset.id===a.id);});
  map.panTo([a.lat,a.lng]);
  var inf=info(a), fam=isFam(a), dk=dist(a), inDone=done.indexOf(a.id)>=0;
  var permitHtml='';
  if(inf&&inf.permit){
    var need=!isFree(inf.permit);
    permitHtml='<div class="sec"><h3>'+t('secPermit')+'</h3><div class="permit '+(need?'need':'free')+'">'+
      (need?'📋 '+permitName(inf.permit):'🆓 '+permitName(inf.permit))+'</div>'+
      (inf.permit_url?'<div class="btns"><a class="primary" href="'+inf.permit_url+'" target="_blank" rel="noopener">'+t('permitGo')+'</a></div>':'')+
      '</div>';
  }
  var famHtml='';
  if(fam&&inf&&inf.family){
    var f=inf.family;
    var isW=f.level==='wheelchair';
    var toi=(f.toilets===true)?(f.accessible_toilet===true?t('toiletAccYes'):t('toiletYes')):(f.toilets===false?t('toiletNo'):null);
    famHtml='<div class="sec"><h3>'+(isW?t('secAccInfo'):t('secKidInfo'))+'</h3><div class="fambox">'+
      (isW?'<div class="famtag">'+t('wheelOk')+(f.wheelchair_len_m?fmt(t('wheelLen'),{v:f.wheelchair_len_m}):'')+'</div>':'')+
      '<dl class="fg">'+
      (f.grade?'<dt>'+t('fGrade')+'</dt><dd>'+gradeName(f.grade)+'</dd>':'')+
      (f.surface?'<dt>'+t('fSurface')+'</dt><dd>'+f.surface+'</dd>':'')+
      (toi!=null?'<dt>'+t('fToilet')+'</dt><dd>'+toi+'</dd>':'')+
      (f.shade?'<dt>'+t('fShade')+'</dt><dd>'+f.shade+'</dd>':'')+
      (f.stroller_ok!=null?'<dt>'+t('fStroller')+'</dt><dd>'+(f.stroller_ok?t('strollerOk'):t('strollerNo'))+'</dd>':'')+
      (f.rest_points?'<dt>'+t('fRest')+'</dt><dd>'+f.rest_points+'</dd>':'')+
      (f.parking_bus?'<dt>'+t('fTransport')+'</dt><dd>'+f.parking_bus+'</dd>':'')+
      '</dl>'+
      (f.family_source_url?'<div class="note" style="margin-top:6px">'+t('evidence')+'<a href="'+f.family_source_url+'" target="_blank" rel="noopener">'+t('officialPage')+'</a>'+t('evidenceNote')+'</div>':'')+
      '</div></div>';
  } else if(fam){
    famHtml='<div class="sec"><h3>'+famBadge(a)+'</h3><div class="fambox">'+t('famPending')+'</div></div>';
  }
  var el=document.getElementById('detail');
  el.innerHTML=
    '<button class="x" onclick="closeDetail()">×</button>'+
    '<h2>'+a.name+'</h2>'+
    '<div><span class="tag" style="background:'+cv((TYPES[a.type]||{}).color)+';font-size:11px;padding:2px 9px;color:#fff">'+typeLabel(a)+'</span> '+
      '<span class="badge" style="border-left:4px solid '+rc(a.region)+'">'+regionName(a.region)+(a.county?'・'+countyName(a.county):'')+'</span>'+
      (a.rank?' <span class="badge">'+t('baiyueRank')+a.rank+'</span>':'')+
      (a.no?' <span class="badge">'+t('xbRank')+a.no+'</span>':'')+
      (a.district?' <span class="badge">'+a.district+'</span>':'')+
      (fam?' <span class="badge fam">'+famBadge(a)+'</span>':'')+
      (a.coord_approx?' <span class="badge warn">'+t('coordApprox')+'</span>':'')+'</div>'+
    ((inf&&inf.note)?'<div class="permit need" style="margin:8px 0">⚠️ '+inf.note+'</div>':'')+
    '<dl class="kv">'+
      (a.elev?'<dt>'+t('kvElev')+'</dt><dd>'+a.elev+' m</dd>':'')+
      (a.range?'<dt>'+t('kvRange')+'</dt><dd>'+rangeName(a.range)+'</dd>':'')+
      (a.grade?'<dt>'+t('kvGrade')+'</dt><dd>'+gradeName(a.grade)+'</dd>':'')+
      (a.level?'<dt>'+t('kvLevel')+'</dt><dd>'+levelName(a.level)+'</dd>':'')+
      (dk!=null?'<dt>'+t('kvDist')+'</dt><dd>'+dk+' km'+(inf&&inf.roundtrip?t('roundtrip'):(a.type==='citytrail'?t('oneway'):''))+'</dd>':'')+
      (inf&&inf.ascent_m!=null?'<dt>'+t('kvAscent')+'</dt><dd>'+inf.ascent_m+' m</dd>':'')+
      (inf&&inf.duration?'<dt>'+t('kvDuration')+'</dt><dd>'+inf.duration+'</dd>':'')+
      (inf&&inf.huts?'<dt>'+t('kvHuts')+'</dt><dd>'+inf.huts+'</dd>':'')+
    '</dl>'+
    permitHtml+
    famHtml+
    (inf&&inf.trailhead_access?'<div class="sec"><h3>'+t('secAccess')+'</h3><div class="wx">'+inf.trailhead_access+'</div></div>':'')+
    '<div class="sec"><h3>'+t('secWx')+'</h3><div class="wx" id="wxBox">'+t('wxLoading')+'</div></div>'+
    '<div class="btns">'+
      (a.hasTrack?'<button class="primary" onclick="showTrack(\''+a.id+'\')">'+t('btnTrack')+'</button>':'')+
      ((inf&&inf.official_url)?'<a href="'+inf.official_url+'" target="_blank" rel="noopener">'+t('btnOfficial')+'</a>':'')+
    '</div>'+
    '<div class="btns">'+
      '<button onclick="toggleDone(\''+a.id+'\')">'+(inDone?t('doneIn'):t('doneMark'))+'</button>'+
      '<button onclick="toggleWish(\''+a.id+'\')">'+(wish.indexOf(a.id)>=0?t('wishIn'):t('wishAdd'))+'</button>'+
      '<button onclick="toggleCmp(\''+a.id+'\')">'+(cmp.indexOf(a.id)>=0?t('cmpIn'):t('cmpAdd'))+'</button>'+
    '</div>'+
    '<div class="btns"><a href="https://www.google.com/maps/search/?api=1&query='+a.lat+','+a.lng+'" target="_blank" rel="noopener">'+t('btnNav')+'</a></div>'+
    (inf&&inf.source_url?'<div class="note">'+fmt(t('noteChecked'),{d:inf.last_checked||'—'})+'　<a href="'+inf.source_url+'" target="_blank" rel="noopener">'+t('noteSource')+'</a>'+t('noteOfficial')+'</div>':'<div class="note">'+t('noteDefault')+'</div>');
  el.classList.add('open');
  loadWeather(a);
}
function closeDetail(){document.getElementById('detail').classList.remove('open');curDetail=null;
  [].forEach.call(document.querySelectorAll('.card'),function(c){c.classList.remove('sel');});}

function showTrack(id){
  var a=BYID[id];
  window.__ldTracks(function(){
    trackLayer.clearLayers();
    var coords=(window.TAIWANTRAILS_TRACKS||{})[id]||[];
    if(!coords.length){alert(t('trackNone'));return;}
    var latlngs=coords.map(function(p){return [p[1],p[0]];});
    L.polyline(latlngs,{color:lc(a.level),weight:4,opacity:.85}).addTo(trackLayer);
    map.fitBounds(latlngs,{padding:[40,40],maxZoom:15});
  });
}

function loadWeather(a){
  var box=document.getElementById('wxBox');if(!box)return;
  var url='https://api.open-meteo.com/v1/forecast?latitude='+a.lat+'&longitude='+a.lng+
    '&current=temperature_2m,apparent_temperature,precipitation,weather_code&daily=precipitation_probability_max&timezone=Asia%2FTaipei&forecast_days=3';
  fetch(url).then(function(r){return r.json();}).then(function(d){
    if(!box||curDetail!==a)return;
    var c=d.current||{};
    var pop=(d.daily&&d.daily.precipitation_probability_max)?d.daily.precipitation_probability_max:[];
    box.innerHTML='<span class="big">'+(c.temperature_2m!=null?c.temperature_2m+'°C':'—')+'</span> '+t('wxTemp')+
      (c.apparent_temperature!=null?'　'+t('wxFeel')+' '+c.apparent_temperature+'°C':'')+
      (c.precipitation!=null?'　'+fmt(t('wxRain'),{v:c.precipitation}):'')+
      (pop.length?'<br>'+t('wxPop')+pop.map(function(x){return (x==null?'—':x+'%');}).join(' / '):'')+
      '<br><span style="font-size:10px">'+t('wxNote')+'</span>';
  }).catch(function(){if(box&&curDetail===a)box.innerHTML='<span style="font-size:11px">'+t('wxFail')+'</span>';});
}

/* 完登進度（百岳打卡） */
function toggleDone(id){var i=done.indexOf(id);if(i>=0)done.splice(i,1);else done.push(id);
  localStorage.setItem('taiwantrails_done',JSON.stringify(done));if(curDetail)openDetail(curDetail);if(state.mode==='progress')render();}
function renderProgress(list){
  var box=document.getElementById('progBox');
  var baiyue=ITEMS.filter(function(a){return a.type==='baiyue';});
  var xb=ITEMS.filter(function(a){return a.type==='xiaobaiyue';});
  var db=baiyue.filter(function(a){return done.indexOf(a.id)>=0;}).length;
  var dx=xb.filter(function(a){return done.indexOf(a.id)>=0;}).length;
  box.innerHTML=t('progBaiyue')+' <b>'+db+'</b> / '+baiyue.length+
    '<div class="progbar"><i style="width:'+(baiyue.length?db/baiyue.length*100:0)+'%"></i></div>'+
    '<div style="margin-top:8px">'+t('progXb')+' <b>'+dx+'</b> / '+xb.length+
    '<div class="progbar"><i style="width:'+(xb.length?dx/xb.length*100:0)+'%"></i></div></div>';
  var mine=ITEMS.filter(function(a){return done.indexOf(a.id)>=0;});
  document.getElementById('count').textContent=fmt(t('progCount'),{n:mine.length});
  if(!mine.length){list.innerHTML='<div class="empty">'+t('progEmpty')+'</div>';return;}
  list.innerHTML='';mine.forEach(function(a){list.appendChild(cardEl(a));});
}

/* 願望清單 */
function toggleWish(id){var i=wish.indexOf(id);if(i>=0)wish.splice(i,1);else wish.push(id);
  localStorage.setItem('taiwantrails_wish',JSON.stringify(wish));updBadges();if(curDetail)openDetail(curDetail);}
function updBadges(){document.getElementById('wishN').textContent=wish.length;document.getElementById('cmpN').textContent=cmp.length;}
function openWish(){
  var b=document.getElementById('wishBody');
  if(!wish.length){b.innerHTML='<div class="empty">'+t('wishEmpty')+'</div>';}
  else{
    var rows=wish.map(function(id){var a=BYID[id];if(!a)return '';var dk=dist(a);
      return '<tr onclick="openDetail(BYID[\''+id+'\']);document.getElementById(\'wishModal\').classList.remove(\'open\')"><td><b>'+a.name+'</b><br><small style="color:var(--muted)">'+regionName(a.region)+'・'+typeLabel(a)+'</small></td>'+
        '<td class="num">'+(a.elev||'—')+'</td><td class="num">'+(dk!=null?dk+'km':'—')+'</td>'+
        '<td><span class="cmp-rm" onclick="event.stopPropagation();rmWish(\''+id+'\')">'+t('remove')+'</span></td></tr>';}).join('');
    b.innerHTML='<table><thead><tr><th>'+t('thRoute')+'</th><th class="num">'+t('thElev')+'</th><th class="num">'+t('thDist')+'</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  document.getElementById('wishModal').classList.add('open');
}
function rmWish(id){var i=wish.indexOf(id);if(i>=0)wish.splice(i,1);localStorage.setItem('taiwantrails_wish',JSON.stringify(wish));updBadges();openWish();}

/* 比較器 */
function toggleCmp(id){var i=cmp.indexOf(id);if(i>=0)cmp.splice(i,1);else{if(cmp.length>=4){alert(t('cmpMax'));return;}cmp.push(id);}
  updBadges();if(curDetail)openDetail(curDetail);}
function openCmp(){
  var b=document.getElementById('cmpBody');
  if(!cmp.length){b.innerHTML='<div class="empty">'+t('cmpEmpty')+'</div>';}
  else{
    var rows=[
      [t('rowType'),function(a){return typeLabel(a);}],
      [t('rowRegion'),function(a){return regionName(a.region)+(a.county?'・'+countyName(a.county):'');}],
      [t('thElev'),function(a){return a.elev?a.elev+' m':'—';}],
      [t('kvRange'),function(a){return a.range?rangeName(a.range):'—';}],
      [t('kvLevel'),function(a){return a.level?levelName(a.level):'—';}],
      [t('kvDist'),function(a){var dk=dist(a);return dk!=null?dk+' km':'—';}],
      [t('kvAscent'),function(a){var inf=info(a);return inf&&inf.ascent_m!=null?inf.ascent_m+' m':'—';}],
      [t('kvDuration'),function(a){var inf=info(a);return inf&&inf.duration?inf.duration:'—';}],
      [t('rowPermit'),function(a){var inf=info(a);return inf&&inf.permit?permitName(inf.permit):(needPermit(a)?t('needPermitTxt'):'—');}],
      [t('rowFam'),function(a){return isFam(a)?famBadge(a):'—';}],
    ];
    var head='<tr><th>'+t('thItem')+'</th>'+cmp.map(function(id){return '<th>'+BYID[id].name+' <span class="cmp-rm" onclick="rmCmp(\''+id+'\')">×</span></th>';}).join('')+'</tr>';
    var body=rows.map(function(r){return '<tr><td style="color:var(--muted)">'+r[0]+'</td>'+cmp.map(function(id){return '<td>'+r[1](BYID[id])+'</td>';}).join('')+'</tr>';}).join('');
    b.innerHTML='<table><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
  }
  document.getElementById('cmpModal').classList.add('open');
}
function rmCmp(id){var i=cmp.indexOf(id);if(i>=0)cmp.splice(i,1);updBadges();openCmp();}

/* 排行榜 */
function rankDefs(){
  return [
    [t('rankTop'),'elev',function(a){return a.elev!=null;},function(a){return a.elev+' m';}],
    [t('rankEasyB'),'_lowB',function(a){return a.type==='baiyue'&&a.elev!=null;},function(a){return a.elev+' m';}],
    [t('rankAcc'),'_acc',function(a){return isAcc(a);},function(a){return dist(a)!=null?dist(a)+' km':t('accVal');}],
    [t('rankKid'),'_kid',function(a){return isFam(a);},function(a){return dist(a)!=null?dist(a)+' km':t('kidVal');}],
    [t('rankLong'),'_dist',function(a){return dist(a)!=null;},function(a){return dist(a)+' km';}],
  ];
}
var rankIdx=0;
function renderRank(list){
  var RANKS=rankDefs();
  var tabs=document.getElementById('rankTabs');tabs.innerHTML='';
  RANKS.forEach(function(r,i){var b=document.createElement('button');b.textContent=r[0];b.className=i===rankIdx?'on':'';
    b.onclick=function(){rankIdx=i;render();};tabs.appendChild(b);});
  var r=RANKS[rankIdx];
  var arr=ITEMS.filter(r[2]);
  arr.sort(function(a,b){
    if(r[1]==='_lowB')return (a.elev||0)-(b.elev||0);
    if(r[1]==='_dist')return (dist(b)||0)-(dist(a)||0);
    if(r[1]==='_acc'||r[1]==='_kid'){var da=dist(a),db=dist(b);return (da==null?999:da)-(db==null?999:db);}
    return (b.elev||0)-(a.elev||0);
  });
  document.getElementById('count').textContent=t('rankTitle')+r[0];
  var rows=arr.slice(0,20).map(function(a,i){
    var rk=i<3?['🥇','🥈','🥉'][i]:(i+1);
    return '<tr onclick="openDetail(BYID[\''+a.id+'\'])"><td class="num">'+rk+'</td>'+
      '<td><b>'+a.name+'</b> <span class="tag" style="background:'+cv((TYPES[a.type]||{}).color)+';font-size:10px">'+typeLabel(a)+'</span></td>'+
      '<td class="num" style="font-weight:800;color:var(--accent)">'+r[3](a)+'</td></tr>';}).join('');
  list.innerHTML='<table><thead><tr><th class="num">#</th><th>'+t('thRoute')+'</th><th class="num">'+r[0]+'</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function fitRegion(r){
  if(r==='全部'){map.setView([23.7,120.95],7);return;}
  var pts=ITEMS.filter(function(a){return a.region===r;}).map(function(a){return [a.lat,a.lng];});
  if(pts.length)map.fitBounds(pts,{padding:[40,40],maxZoom:11});
}
boot();
</script>
</body>
</html>
