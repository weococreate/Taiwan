<style>
  :root{--ink:#1a2733;--sub:#5b6b7a;--line:#e3e9ef;--teal:#0f8b8d;--blue:#2563a8;--amber:#d98324;--red:#c0392b;--green:#2e9e5b;--bg:#f6f9fb;--card:#fff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.65 system-ui,"Noto Sans TC","PingFang TC",sans-serif;-webkit-text-size-adjust:100%}
  #app{max-width:1000px;margin:0 auto;padding:20px 18px 80px}
  header.hd{padding:26px 0 10px}
  .hd h1{font-size:26px;margin:0 0 6px;letter-spacing:.5px}
  .hd .sub{color:var(--sub);font-size:14.5px}
  .hd .stamp{color:var(--sub);font-size:12.5px;margin-top:8px}
  nav.toc{position:sticky;top:0;z-index:20;background:rgba(246,249,251,.94);backdrop-filter:blur(6px);display:flex;flex-wrap:wrap;gap:6px;padding:10px 0;margin-bottom:8px;border-bottom:1px solid var(--line)}
  nav.toc a{font-size:13.5px;text-decoration:none;color:var(--blue);background:#eaf1f8;padding:5px 11px;border-radius:20px;white-space:nowrap}
  nav.toc a:hover{background:#d8e6f4}
  section{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 18px;margin:16px 0;box-shadow:0 1px 3px rgba(20,40,60,.04)}
  section h2{font-size:20px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  section h2 .n{font-size:13px;color:#fff;background:var(--teal);width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex:none}
  section .lead{color:var(--sub);font-size:14.5px;margin:2px 0 14px}
  .grid{display:grid;gap:14px}
  @media(min-width:680px){.g2{grid-template-columns:1fr 1fr}}
  .kpis{display:flex;flex-wrap:wrap;gap:12px;margin:6px 0 14px}
  .kpi{flex:1 1 150px;background:#f3f8f8;border:1px solid #dcecec;border-radius:12px;padding:12px 14px}
  .kpi .lab{font-size:12.5px;color:var(--sub)}
  .kpi .v{font-size:24px;font-weight:700;line-height:1.2;margin-top:2px}
  .kpi .u{font-size:13px;color:var(--sub);font-weight:400}
  .kpi.pos .v{color:var(--green)} .kpi.neg .v{color:var(--red)}
  .chartbox{position:relative;height:300px;margin:4px 0}
  .chartbox.tall{height:360px}
  .chartbox.top20{height:560px}
  .chartbox.pyr{height:460px}
  .note{font-size:12.5px;color:var(--sub);margin-top:10px;line-height:1.55}
  .note b{color:var(--ink)}
  .src{font-size:11.5px;color:#8395a4;margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
  .toggle{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 10px}
  .toggle button{font:13.5px system-ui;border:1px solid var(--line);background:#fff;color:var(--sub);padding:5px 13px;border-radius:20px;cursor:pointer}
  .toggle button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  input.search{width:100%;font-size:14.5px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin:4px 0 8px}
  .tblwrap{max-height:420px;overflow:auto;border:1px solid var(--line);border-radius:10px}
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th,td{padding:7px 9px;text-align:right;border-bottom:1px solid #eef2f6;white-space:nowrap}
  th{position:sticky;top:0;background:#f0f5f9;color:var(--sub);font-weight:600;z-index:1;cursor:pointer}
  td.name,th.name{text-align:left;white-space:normal;min-width:150px}
  td.rk{color:var(--sub)} .lv{font-size:11.5px;color:#fff;padding:1px 6px;border-radius:9px}
  .lv.醫學中心{background:#0f8b8d}.lv.區域醫院{background:#2563a8}.lv.地區醫院{background:#7a869a}.lv.其他醫院{background:#b0b8c2}
  .up{color:var(--red)}.down{color:var(--green)}
  .facts{display:grid;gap:10px;margin:8px 0}
  .fact{background:#f3f8f8;border-left:4px solid var(--teal);border-radius:0 10px 10px 0;padding:10px 14px;font-size:14px}
  .honest{background:#fff8ec;border:1px solid #f0dcbb;border-radius:12px;padding:12px 15px;font-size:13.5px;margin-top:12px}
  .honest b{color:var(--amber)}
  .pill{display:inline-block;font-size:11.5px;background:#eef2f6;color:var(--sub);padding:2px 9px;border-radius:20px;margin-left:6px;vertical-align:middle}
  .loaderr{padding:16px;border:1px solid #e33;color:#c00;border-radius:8px;background:#fff5f5}
  footer{color:var(--sub);font-size:12px;text-align:center;padding:24px 0 0;line-height:1.7}
</style>
</head>
<body>
<div id="app"><div class="loading" style="padding:40px;text-align:center;color:#5b6b7a">載入中…</div></div>
<script>
// 所有數字來自 window.NHI_DATA（build-taiwannhi.js 產出），勿寫死在 HTML。
var POINT_VALUE = 0.9; // 浮動點值約 0.9 元/點（各季各分區不同，僅供點→元粗略換算，標明估計）
var CH; // 已建立的 chart 實例集合，供重繪釋放

// ── 格式工具 ──
function fmt(x){ return (x==null||isNaN(x))?'—':Number(x).toLocaleString('en-US'); }
function yiYuan(yuan,dp){ return (yuan/1e8).toFixed(dp==null?0:dp); }      // 元 → 億元
function yiPt(pt,dp){ return (pt/1e8).toFixed(dp==null?1:dp); }           // 點 → 億點
function kptYi(kpt,dp){ return (kpt/1e5).toFixed(dp==null?0:dp); }        // 千點 → 億點
function pct(a,b){ return b?(a/b*100):0; }
var C={teal:'#0f8b8d',blue:'#2563a8',amber:'#d98324',red:'#c0392b',green:'#2e9e5b',grey:'#7a869a',lgrey:'#b8c2cd',purple:'#7d5ba6'};

function baseOpts(extra){
  var o={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:12},boxWidth:14}}},
    scales:{x:{ticks:{font:{size:11}}},y:{ticks:{font:{size:11}},grid:{color:'#eef2f6'}}}};
  return Object.assign(o,extra||{});
}
function mk(id,cfg){ var el=document.getElementById(id); if(!el)return; if(CH[id])CH[id].destroy(); CH[id]=new Chart(el,cfg); }

// ══════════════════════════════════════════
function boot(){
  var d = window.NHI_DATA;
  var app = document.getElementById('app');
  if(!d){ app.innerHTML='<div class="loaderr">⚠ 無資料（taiwannhi-data.js 未載入）</div>'; return; }
  CH={};
  app.innerHTML = render(d);
  drawOverview(d.overview);
  drawMoney(d.money);
  drawHospitals(d.hospitals);
  drawWho(d.who);
  drawUsage(d.usage);
  if(d.meta.fetchError){
    var w=document.getElementById('fetchwarn'); if(w){w.style.display='block';w.textContent='⚠ '+d.meta.fetchError;}
  }
}

function render(d){
  var m=d.meta;
  return ''+
  '<header class="hd"><h1>🏥 健保財務儀表板</h1>'+
  '<div class="sub">健保的錢從哪來、到哪去、哪些醫院用掉、誰在用、用在哪類醫療 — 一頁看懂全民健保財務</div>'+
  '<div class="stamp">承保資料：'+m.latestBaoxian+'　院所點數：'+m.latestHosp+'　｜　資料來源：衛福部中央健康保險署／統計處（開放資料）</div>'+
  '<div id="fetchwarn" class="loaderr" style="display:none;margin-top:10px;font-size:13px"></div></header>'+
  '<nav class="toc">'+
    '<a href="#c1">① 收支總覽</a><a href="#c2">② 錢從哪來</a><a href="#c3">③ 醫院排行</a>'+
    '<a href="#c4">④ 誰在用</a><a href="#c5">⑤ 用在哪</a>'+
  '</nav>'+
  sec1()+sec2()+sec3()+sec4()+sec6()+
  '<footer>本儀表板數字均來自政府開放資料，經程式解析彙整，非官方發布物。<br>'+

  ]},options:baseOpts({scales:{y:{title:{display:true,text:'億元',font:{size:11}},ticks:{font:{size:11}},grid:{color:'#eef2f6'}},y1:{position:'right',title:{display:true,text:'餘絀(億元)',font:{size:11}},grid:{drawOnChartArea:false},ticks:{font:{size:11}}},x:{ticks:{font:{size:11}}}},plugins:{legend:{labels:{font:{size:12},boxWidth:14}},tooltip:{callbacks:{label:function(c){return c.dataset.label+'：'+fmt(Math.round(c.parsed.y))+' 億元';}}}}})});

// ── Ch2 錢從哪來 ──
function drawMoney(mo){
  var t=mo.threeWay;
  var kp='';
  kp+=kpi('當月應收保險費', yiYuan(t.total), '億元　('+mo.latestYm+')');
  kp+=kpi('保險對象人數', (mo.people/1e4).toFixed(0), '萬人');
  kp+=kpi('投保單位數', (mo.units/1e4).toFixed(1), '萬個');
  document.getElementById('mn_kpis').innerHTML=kp;

  mk('mn_threeway',{type:'doughnut',data:{labels:['保險對象（民眾自付）','投保單位（雇主）','政府補助'],
    datasets:[{data:[t.obj,t.unit,t.gov],backgroundColor:[C.teal,C.blue,C.amber]}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:12}}},
    tooltip:{callbacks:{label:function(c){return c.label+'：'+yiYuan(c.parsed)+' 億元（'+pct(c.parsed,t.total).toFixed(1)+'%）';}}}}}});

  var catNames=['第一類\n(受雇者等)','第二類\n(職業工會)','第三類\n(農漁民)','第四類\n(役軍等)','第五類\n(低收入戶)','第六類\n(榮民/地區人口)'];
  mk('mn_cats',{type:'bar',data:{labels:catNames,datasets:[{label:'人數(萬人)',
    data:mo.categories.map(function(x){return +(x/1e4).toFixed(1);}),backgroundColor:C.teal}]},
    options:baseOpts({indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return fmt(mo.categories[c.dataIndex])+' 人';}}}},scales:{x:{title:{display:true,text:'萬人',font:{size:11}},ticks:{font:{size:11}}},y:{ticks:{font:{size:10}}}}})});

  // 保費兩大來源：一般 vs 補充（SEMI）
  var sup=mo.supplement;
  if(sup){
    var sp=sup.split;
    mk('mn_premtype',{type:'doughnut',data:{labels:['一般保險費','補充保險費'],
      datasets:[{data:[sp.general_pct,sp.supplement_pct],backgroundColor:[C.blue,C.amber]}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:12}}},
      tooltip:{callbacks:{label:function(c){return c.label+'：約 '+c.parsed+'%';}}}}}});
    var byY=sup.byYear[sup.byYear.length-1];
    var srcItems=sup.sources.items.map(function(i){return i.name+' '+i.pct+'%';}).join('、');
    document.getElementById('mn_supnote').innerHTML='<b>『應收保險費』只是一般保險費。</b>另有<b>補充保險費</b>（二代健保對薪資以外所得加收）：'+byY.year+' 年約收 <b>'+byY.amount_100m+' 億元</b>，約占保費收入 '+sp.supplement_pct+'%。補充保費來源（'+sup.sources._asOf+'）以 '+srcItems+' 為主——<b>股利與獎金合計逾 7 成</b>，主要由高所得者負擔。';
  }

  // 六類組成 + 「第六類是否用很多」誠實回答
  var comp=sup&&sup.composition;
  if(comp){
    document.getElementById('mn_cat6note').innerHTML=
      '<b>第六類為何人多（約 385 萬，第二大類）？</b>它其實混了兩種人：<b>第一目</b>＝榮民、榮眷（保費由退輔會補助）；<b>第二目</b>＝其他地區人口（不屬前五類的無職業者、家管、退休無職者、部分學生等，政府負擔 40%）。人多是因為「其他地區人口」涵蓋所有沒有職業、不屬前五類的居民，並非單一族群。<br>'+
      '<b>那第六類是不是「用很多」醫療？</b>'+comp.medicalByCategoryNote;
  }

  var st=mo.avgSalaryTrend;
  mk('mn_salary',{type:'line',data:{labels:st.map(function(s){return s.ym;}),datasets:[{label:'平均投保金額(元)',
    data:st.map(function(s){return s.v;}),borderColor:C.purple,backgroundColor:'rgba(125,91,166,.08)',fill:true,tension:.25,pointRadius:0}]},
    options:baseOpts({plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+'：'+fmt(c.parsed.y)+' 元';}}}},scales:{y:{ticks:{font:{size:11},callback:function(v){return fmt(v);}}},x:{ticks:{maxTicksLimit:8,font:{size:10}}}}})});

  document.getElementById('mn_src').innerHTML='資料來源：'+mo.source+(sup?'；補充保費與六類組成為 SEMI 查證值：'+sup.sourceRefs.join('／'):'');
}

var HP; // 保存 hospitals 資料供 toggle/search 重用
function drawHospitals(h){
  HP=h; var metric='total';
  document.getElementById('hp_cnt').textContent=h.list.length;
  var tot=h.total;
  var kp='';
  kp+=kpi('西醫醫院月總點數', yiPt(tot.totalPoints,0), '億點　('+h.latestYm+')');
  kp+=kpi('門診', yiPt(tot.opdPoints,0), '億點');
  kp+=kpi('住診', yiPt(tot.ipdPoints,0), '億點');
  document.getElementById('hp_kpis').innerHTML=kp;

  function metricVal(x,k){ return k==='total'?x.totalPoints:(k==='opd'?x.opdPoints:x.ipdPoints); }
  function drawTop(k){
    var arr=h.list.slice().sort(function(a,b){return metricVal(b,k)-metricVal(a,k);}).slice(0,20);
    mk('hp_top',{type:'bar',data:{labels:arr.map(function(x){return shortName(x.name);}),
      datasets:[{label:'醫療點數(億點)',data:arr.map(function(x){return +yiPt(metricVal(x,k),2);}),
        backgroundColor:arr.map(function(x){return lvColor(x.level);})}]},
      options:baseOpts({indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{
        title:function(c){return arr[c[0].dataIndex].name;},
        label:function(c){var x=arr[c.dataIndex];return [ (k==='total'?'合計':k==='opd'?'門診':'住診')+'：'+yiPt(metricVal(x,k),2)+' 億點', x.level+'／'+x.zone+'　年增率 '+(x.yoy==null?'—':x.yoy+'%')];}}}},
      scales:{x:{title:{display:true,text:'億點',font:{size:11}},ticks:{font:{size:11}}},y:{ticks:{autoSkip:false,font:{size:10.5}}}}})});
  }
  drawTop(metric);
  var tg=document.getElementById('hp_toggle');
  tg.addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;
    [].forEach.call(tg.children,function(x){x.classList.remove('on');});b.classList.add('on');drawTop(b.dataset.k);});

  // 前三大醫院「用在哪」：門診 vs 住診結構（醫院層級公開資料僅到門住診，無疾病別）
  var t3=h.list.slice(0,3);
  mk('hp_top3',{type:'bar',data:{labels:t3.map(function(x){return shortName(x.name);}),datasets:[
    {label:'門診',data:t3.map(function(x){return +yiPt(x.opdPoints,2);}),backgroundColor:C.teal},
    {label:'住診',data:t3.map(function(x){return +yiPt(x.ipdPoints,2);}),backgroundColor:C.amber}
  ]},options:baseOpts({indexAxis:'y',plugins:{legend:{labels:{font:{size:12},boxWidth:14}},tooltip:{callbacks:{
    label:function(c){var x=t3[c.dataIndex];var tp=x.totalPoints;return c.dataset.label+'：'+c.parsed.x+' 億點（'+pct(c.dataset.label==='門診'?x.opdPoints:x.ipdPoints,tp).toFixed(0)+'%）';}}}},
    scales:{x:{stacked:true,title:{display:true,text:'億點',font:{size:11}},ticks:{font:{size:11}}},y:{stacked:true,ticks:{font:{size:11}}}}})});
  var top1=h.list[0];
  document.getElementById('hp_top3note').innerHTML='<b>'+top1.name.replace(/醫療財團法人|財團法人/g,'')+'</b> 用最多，其中住診占 <b>'+pct(top1.ipdPoints,top1.totalPoints).toFixed(0)+'%</b>、門診占 '+pct(top1.opdPoints,top1.totalPoints).toFixed(0)+'%。'+
    '<b>醫院層級的公開資料只拆到「門診／住診」，並無單一醫院的疾病別／科別費用</b>（涉去識別化，健保署未開放到此顆粒度）；全國疾病別分布見第 6 章。住診占比高者多為承接重症住院的醫學中心。';

  // 層級占比趨勢（%堆疊）
  var lt=h.levelTrend, lv=['醫學中心','區域醫院','地區醫院','其他醫院'], lc=[C.teal,C.blue,C.grey,C.lgrey];
  mk('hp_level',{type:'line',data:{labels:lt.map(function(x){return x.ym;}),datasets:lv.map(function(name,i){
    return {label:name,data:lt.map(function(x){var s=x.醫學中心+x.區域醫院+x.地區醫院+x.其他醫院;return +(pct(x[name],s)).toFixed(1);}),
      borderColor:lc[i],backgroundColor:lc[i],fill:false,tension:.25,pointRadius:0,borderWidth:2};})},
    options:baseOpts({plugins:{legend:{labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:function(c){return c.dataset.label+'：'+c.parsed.y+'%';}}}},
    scales:{y:{title:{display:true,text:'占比 %',font:{size:11}},ticks:{font:{size:11}}},x:{ticks:{maxTicksLimit:8,font:{size:10}}}}})});

  // 六分區
  var zn=h.byZone, zk=Object.keys(zn);
  mk('hp_zone',{type:'doughnut',data:{labels:zk,datasets:[{data:zk.map(function(k){return +yiPt(zn[k],1);}),

    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}},
    tooltip:{callbacks:{label:function(c){return c.label+'：'+c.parsed+' 億點';}}}}}});

  // 明細表
  renderTable(h.list);

  });
  document.getElementById('hp_src').textContent='資料來源：'+h.source+'（單位 '+h.unit+'）';
}
function renderTable(list){
  var tb=document.getElementById('hp_tbody');
  tb.innerHTML=list.map(function(x,i){
    var yoy=x.yoy==null?'—':(x.yoy>=0?'<span class="up">▲'+x.yoy+'%</span>':'<span class="down">▼'+Math.abs(x.yoy)+'%</span>');
    return '<tr><td class="rk">'+(i+1)+'</td><td class="name">'+x.name+'</td>'+
      '<td><span class="lv '+x.level+'">'+x.level+'</span></td><td>'+x.zone+'</td>'+
      '<td>'+yiPt(x.opdPoints,2)+'</td><td>'+yiPt(x.ipdPoints,2)+'</td><td><b>'+yiPt(x.totalPoints,2)+'</b></td><td>'+yoy+'</td></tr>';
  }).join('');
}

    scales:{x:{title:{display:true,text:'億點',font:{size:11}},ticks:{font:{size:11}}},y:{ticks:{font:{size:10}}}}})});

  // 每人急診費用（總費用÷患者數，點/人）——凸顯重症單價高

function kpi(lab,v,u,cls){return '<div class="kpi '+(cls||'')+'"><div class="lab">'+lab+'</div><div class="v">'+v+' <span class="u">'+(u||'')+'</span></div></div>';}
function lvColor(l){return l==='醫學中心'?C.teal:l==='區域醫院'?C.blue:l==='地區醫院'?C.grey:C.lgrey;}
function shortName(nm){
  var s=nm.replace(/醫療財團法人|醫療社團法人|財團法人|學校法人|社團法人|國立|私立/g,'')
          .replace(/.*?醫藥基金會|.*?基金會/,'')      // 徐元智先生醫藥基金會亞東 → 亞東
          .replace(/紀念醫院/g,'').replace(/附設醫院/g,'附醫').replace(/綜合醫院/g,'');
  s=s.replace(/醫院$/,'');
  s=s.replace(/(.{2,5})\1/g,'$1');           // 彰化基督教彰化基督教→彰化基督教、奇美奇美→奇美
  s=s.replace(/^長庚(?=.*長庚)/,'');          // 長庚林口長庚→林口長庚
  return s.length>12?s.slice(0,12):s;
}
